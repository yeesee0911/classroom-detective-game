      .clue-wrap {
        height: calc(100% - 26px);
      }
    }

    @media (max-width: 1024px), (pointer: coarse) {
      .game-layout {
        grid-template-rows: minmax(0, 2fr) minmax(0, 1fr);
      }

      .validation-page .panel.stack,
      .case-lobby-page .panel.stack,
      .intro-page .panel.stack {
        min-height: 0;
        overflow: hidden;
      }

      .validation-page .panel.stack {
        overflow-y: auto;
        overflow-x: hidden;
      }

      .validation-page .two-col {
        min-height: 0;
        overflow: hidden;
      }

      .validation-check-pane,
      .validation-data-pane {
        min-height: 0;
        overflow: visible;
        padding-bottom: 8px;
      }

      .case-lobby-page .card-grid {
        min-height: 0;
        grid-auto-rows: minmax(clamp(214px, 28dvh, 300px), max-content);
        overflow: auto;
      }

      .case-lobby-page .item-card {
        min-height: clamp(214px, 28dvh, 300px);
        padding: 13px;
      }

      .case-lobby-page .item-card .subtle,
      .case-lobby-page .item-card .notice {
        line-height: 1.32;
      }

      .intro-page .panel.stack {
        grid-template-rows: auto auto minmax(0, 1fr) auto auto;
      }

      .intro-page .panel.stack > .item-card {
        min-height: 0;
        overflow: auto;
        overscroll-behavior: contain;
      }

      .intro-page .result-grid {
        min-height: 0;
      }

      .intro-page .actions {
        align-self: end;
      }

      .archive-scroll-mode .archive-grid {
        gap: var(--table-gap, 5px);
      }

      .archive-scroll-mode .table-cell {
        overflow: hidden;
      }

      .archive-scroll-mode .entity-cell {
        grid-template-columns: auto minmax(0, 1fr);
        align-content: center;
      }

      .archive-scroll-mode .table-cell.header {
        font-size: max(var(--table-header-font, 1rem), 0.96rem);
        line-height: 1.08;
        padding-top: 4px;
        padding-bottom: 4px;
      }

      .archive-scroll-mode .entity-name {
        font-size: max(var(--entity-name-font, 1rem), 0.96rem);
      }

      .archive-scroll-mode .entity-title {
        font-size: max(var(--entity-title-font, 0.9rem), 0.82rem);
      }

      .archive-scroll-mode .cell {
        font-size: max(var(--cell-font, 1rem), 0.96rem);
      }

      .inline-options {
        width: var(--option-width, min(420px, calc(100vw - 16px)));
        min-width: min(280px, calc(100vw - 16px));
        max-width: calc(100vw - 16px);
        padding: 10px;
        gap: 8px;
      }

      .archive-inline-options {
        min-width: min(180px, calc(100vw - 16px));
        max-width: calc(100vw - 16px);
      }

      .inline-options-title {
        font-size: clamp(1rem, 2.9vw, 1.16rem);
      }

      .inline-option-grid {
        grid-template-columns: repeat(auto-fit, minmax(108px, 1fr));
      }

      .inline-option {
        min-height: 52px;
        padding: 10px 12px;
        font-size: max(var(--option-font, 1.04rem), 1.02rem);
      }

      .answer-cell-wrap.open .inline-options {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }

      .clue-text {
        font-size: clamp(0.9rem, 1.9vw, 1.06rem);
        line-height: 1.18;
      }

      .clue-extra {
        font-size: clamp(0.74rem, 1.5vw, 0.86rem);
      }
    }

    @media (hover: none) and (pointer: coarse) {
      .answer-cell-wrap:not(.open):hover .inline-options {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        animation: none;
      }

      .answer-cell-wrap.open .inline-options {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }
    }

    @media (max-width: 760px) {
      .game-layout {
        grid-template-rows: minmax(0, 20fr) minmax(0, 9fr);
      }

      .source-choice-card {
        width: 100%;
      }

      .library-controls {
        grid-template-columns: 1fr;
      }

      .course-grid {
        grid-template-columns: 1fr;
      }

      .intro-page .topbar {
        min-height: 0;
        padding: 6px 8px;
        gap: 5px;
      }

      .intro-page .topbar .subtle {
        line-height: 1.12;
      }

      .intro-page .topbar .actions.end {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
      }

      .intro-page .topbar .actions.end button {
        min-height: 34px;
        padding: 5px 6px;
        line-height: 1.08;
      }

      .intro-meta-compact {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 4px;
      }

      .intro-meta-compact .result-cell {
        min-height: 38px;
        padding: 5px 3px;
      }

      .intro-meta-compact .result-label {
        font-size: clamp(0.58rem, 2vw, 0.72rem);
      }

      .intro-meta-compact .result-value {
        font-size: clamp(0.82rem, 2.8vw, 1rem);
      }

      .completion-hero {
        grid-template-columns: 1fr;
      }

      .completion-stats-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .validation-page .panel.stack {
        grid-template-rows: auto auto;
        align-content: start;
        overflow-x: hidden;
        overflow-y: auto;
        overscroll-behavior: contain;
      }

      .validation-page .two-col.validation-layout {
        display: block;
        height: auto;
        min-height: 0;
        overflow: visible;
      }

      .validation-check-pane,
      .validation-data-pane {
        position: relative;
        z-index: auto;
        overflow: hidden;
        padding-bottom: 0;
      }

      .validation-check-pane {
        margin-bottom: 12px;
      }

      .validation-report-head {
        align-items: center;
      }

      .validation-report-toggle {
        display: inline-flex;
        flex: 0 0 auto;
        min-height: 42px;
        white-space: nowrap;
      }

      .validation-collapsed-note {
        display: block;
        margin: 0;
      }

      .validation-check-pane.validation-collapsed .validation-report-body {
        max-height: 0;
      }

      .validation-data-pane .actions {
        align-items: stretch;
      }

      .validation-data-pane .actions button {
        flex: 1 1 160px;
      }
    }

    @media (max-height: 620px) {
      .topbar {
        min-height: 48px;
      }

      .panel {
        padding: 8px;
      }

      .notice,
      button,
      .file-button {
        min-height: 40px;
        padding-top: 7px;
        padding-bottom: 7px;
      }

      .cell {
        min-height: 38px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
      }

      body::before,
      body::after,
      #bgCanvas {
        display: none;
      }
    }
  </style>
</head>
<body>
  <canvas id="bgCanvas" aria-hidden="true"></canvas>
  <main id="app" aria-live="polite">
    <section class="page single">
      <div class="center-shell">
        <div class="panel stack">
          <h1>请上传游戏资料包</h1>
        </div>
      </div>
    </section>
  </main>
  <div id="modalLayer" class="modal-layer" role="dialog" aria-modal="true" aria-hidden="true"></div>
  <div id="toastLayer" class="toast-layer" aria-live="polite" aria-hidden="true"></div>

  <script>
    (() => {
      "use strict";

      const STORAGE_PREFIX = "classArchiveEngine.";
      const STORE = {
        package: STORAGE_PREFIX + "package",
        packageHash: STORAGE_PREFIX + "packageHash",
        packageSource: STORAGE_PREFIX + "packageSource",
        progress: STORAGE_PREFIX + "progress.",
        sound: STORAGE_PREFIX + "soundEnabled"
      };
      const GITHUB_LIBRARY_CONFIG = {
        owner: "yeesee0911",
        repo: "classroom-detective-game",
        branch: "main",
        folder: "game-data"
      };
      const MAX_ACTIVE_CLUES = 3;
      const HIGHLIGHT_DURATION = 3360;
      const SHAPES = ["circle", "rounded-square", "hexagon", "shield", "ticket", "blob"];
      const PATTERNS = ["plain", "dots", "stripes", "rings", "waves", "grid", "rays", "bubbles", "sparkles", "checker", "diagonal"];
      const WRONG_MESSAGES = [
        "证据不吻合，请重新检查线索。",
        "证据不吻合，这项结果暂时无法成立。",
        "证据不吻合，请回到证据卡重新核对。"
      ];
      const FALLBACK_PALETTES = [
        ["#F4E7C5", "#C79A4B", "#17233C"],
        ["#3C8D87", "#F4E7C5", "#17233C"],
        ["#8C3B4A", "#F4E7C5", "#FFF9ED"],
        ["#C79A4B", "#26344F", "#17233C"],
        ["#FFF9ED", "#8C3B4A", "#17233C"],
        ["#26344F", "#C79A4B", "#FFF9ED"],
        ["#287A5B", "#F4E7C5", "#17233C"],
        ["#B64242", "#F4E7C5", "#FFF9ED"]
      ];

      const app = document.getElementById("app");
      const modalLayer = document.getElementById("modalLayer");
      const toastLayer = document.getElementById("toastLayer");
      const bgCanvas = document.getElementById("bgCanvas");

      let packageData = null;
      let packageHash = "";
      let packageSource = { source: "local" };
      let validation = null;
      let currentCaseId = "";
      let currentCase = null;
      let progress = null;
      let view = "data";
      let parseError = "";
      let dataInputText = "";
      let validationPage = 0;
      let validationReportExpanded = false;
      let githubLibrary = { loading: false, error: "", items: [], filterText: "", subject: "", level: "", notice: "" };
      let casePage = 0;
      let narrativePage = 0;
      let tableEntityPage = 0;
      let tableCategoryPage = 0;
      let cluePage = 0;
      let optionPage = 0;
      let resultPage = 0;
      let summaryPage = 0;
      let entityDetailPage = 0;
      let selectedCell = null;
      let lastFocused = null;
      let inlineCloseTimer = 0;
      let activeInlineHoverHolder = null;
      const inlineHoverTimers = new WeakMap();
      const memoryProgressStore = {};
      let highlight = { cells: new Set(), entities: new Set(), categories: new Set(), timer: 0 };
      let newClueIds = new Set();
      let toastTimer = 0;
      let timerHandle = 0;
      let audio = { ctx: null, ok: false, enabled: true };

      const blankTemplate = {
        schemaVersion: "1.0",
        packageId: "",
        packageTitle: "",
        subject: "",
        level: "",
        contentLanguage: "",
        description: "",
        settings: {
          defaultDifficulty: "",
          timerEnabled: false,
          timeLimitSeconds: 0,
          maxHints: 3,
          soundEnabled: true
        },
        cases: [
          {
            id: "",
            title: "",
            story: "",
            goal: "",
            difficulty: "",
            narrative: {
              theme: "",
              opening: "",
              problem: "",
              mission: "",
              completion: ""
            },
            storyEvents: [],
            entityType: "",
            entityLabel: "",
            entities: [],
            categories: [],
            solution: {},
            clues: [],
            knowledgeSummary: []
          }
        ],
        audit: {
          sourceSummary: "",
          usedItems: [],
          excludedItems: [],
          warnings: [],
          validationPassed: true
        }
      };

      document.addEventListener("pointerdown", unlockAudio, { once: true, passive: true });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          if (modalLayer.classList.contains("open")) closeModal();
          else if (selectedCell && view === "game") closeInlineOptions();
          if (toastLayer.classList.contains("open")) closeToast();
        }
      });
      document.addEventListener("click", (event) => {
        if (view === "game" && selectedCell && !event.target.closest(".answer-cell-wrap") && !event.target.closest(".archive-inline-options")) {
          closeInlineOptions();
        }
      });
      document.addEventListener("mouseover", handleInlineMouseOver, true);
      document.addEventListener("mouseout", handleInlineMouseOut, true);
      window.addEventListener("resize", () => {
        fitPagesToViewport();
        if (view === "game") renderGame();
      });
      document.addEventListener("visibilitychange", () => {
        particles.paused = document.hidden;
      });

      // 本地储存：读取上次资料和音效设置。
      try {
        audio.enabled = localStorage.getItem(STORE.sound) !== "false";
        const savedPackage = localStorage.getItem(STORE.package);
        const savedHash = localStorage.getItem(STORE.packageHash);
        const savedSource = localStorage.getItem(STORE.packageSource);
        if (savedPackage) {
          packageData = JSON.parse(savedPackage);
          packageHash = savedHash || stableHash(savedPackage);
          packageSource = savedSource ? JSON.parse(savedSource) : { source: "local" };
          validation = validatePackage(packageData);
        }
      } catch {
        packageData = null;
        packageHash = "";
        packageSource = { source: "local" };
        validation = null;
      }

      renderDataLobby();

      function createEl(tag, className, text) {
        const el = document.createElement(tag);
        if (className) el.className = className;
        if (text !== undefined && text !== null) el.textContent = String(text);
        return el;
      }

      function button(text, className, onClick, attrs = {}) {
        const btn = createEl("button", className || "", text);
        btn.type = "button";
        if (onClick) btn.addEventListener("click", (event) => {
          playSound("click");
          onClick(event);
        });
        Object.entries(attrs).forEach(([key, value]) => {
          if (key === "disabled") btn.disabled = Boolean(value);
          else if (key === "ariaLabel") btn.setAttribute("aria-label", value);
          else btn.setAttribute(key, value);
        });
        return btn;
      }

      function clearNode(node) {
        node.replaceChildren();
      }

      function prefersReducedMotion() {
        return window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      }

      function runLocalSwitch(node, update) {
        if (!node || prefersReducedMotion()) {
          update();
          return;
        }
        node.classList.remove("local-switch-in");
        node.classList.add("local-switch-out");
        window.setTimeout(() => {
          update();
          node.classList.remove("local-switch-out");
          node.classList.add("local-switch-in");
          window.setTimeout(() => node.classList.remove("local-switch-in"), 220);
        }, 130);
      }

      function setPage(page) {
        view = page;
        clearInterval(timerHandle);
        timerHandle = 0;
      }

      function renderTopbar(title, subtitle, actions) {
        const top = createEl("header", "topbar");
        const titleBox = createEl("div", "top-title");
        titleBox.append(createEl("h1", "", title || "课堂档案推理游戏引擎"));
        if (subtitle) titleBox.append(createEl("p", "subtle", subtitle));
        const actionBox = createEl("div", "actions end");
        (actions || []).forEach((node) => actionBox.append(node));
        top.append(titleBox, actionBox);
        return top;
      }

      function renderDataLobby(message) {
        setPage("data");
        const safeMessage = typeof message === "string" ? message : "";
        const page = createEl("section", "page single");
        const shell = createEl("div", "center-shell");
        const panel = createEl("div", "panel stack");

        panel.append(createEl("span", "pill new", "侦探调查局入口"));
        panel.append(createEl("h1", "", "请上传游戏资料包"));
        panel.append(createEl("p", "subtle", "导入案件资料包后，系统会先生成案件资料鉴定报告。"));
        if (safeMessage) panel.append(createEl("div", "notice warn", safeMessage));
        if (parseError) panel.append(createEl("div", "notice error", parseError));

        const two = createEl("div", "two-col");
        const left = createEl("div", "stack");
        const right = createEl("div", "stack");

        const fileInput = createEl("input");
        fileInput.type = "file";
        fileInput.accept = ".json,application/json";
        fileInput.id = "jsonFileInput";
        fileInput.addEventListener("change", handleFileImport);
        const fileLabel = button("导入案件资料", "primary", openSourceChooser);

        left.append(fileInput, fileLabel);
        left.append(button("继续上次调查", "secondary", continueSavedPackage, { disabled: !packageData || !validation }));
        left.append(button("下载空白 JSON 模板", "ghost", downloadBlankTemplate));
        left.append(button("移除当前资料包", "danger", removeCurrentPackage, { disabled: !packageData }));

        const paste = createEl("textarea");
        paste.value = dataInputText;
        paste.placeholder = "在这里粘贴 JSON 案件资料包";
        paste.setAttribute("aria-label", "粘贴 JSON 游戏资料包");
        paste.addEventListener("input", () => {
          dataInputText = paste.value;
        });
        right.append(paste);
        right.append(button("读取调查资料", "primary", () => importText(paste.value)));

        two.append(left, right);
        panel.append(two);

        const foot = createEl("div", "notice");
        foot.append(createEl("span", "", "资料导入后会先进入“案件资料鉴定报告”，检查通过后才可开始调查。"));
        panel.append(foot);

        shell.append(panel);
        page.append(shell);
        app.replaceChildren(page);
      }

      function openSourceChooser() {
        lastFocused = document.activeElement;
        modalLayer.setAttribute("aria-hidden", "false");
        modalLayer.classList.add("open");
        clearNode(modalLayer);
        const card = createEl("div", "modal-card source-choice-card");
        const head = createEl("div", "modal-head");
        const title = createEl("div", "stack");
        title.append(createEl("h2", "", "选择资料来源"));
        title.append(createEl("p", "subtle", "可以上传本地 JSON，也可以从 GitHub 课程库读取。"));
        head.append(title, button("关闭", "icon-button ghost", closeModal, { ariaLabel: "关闭资料来源选择" }));
        const actions = createEl("div", "actions");
        actions.append(button("从本地设备上传", "primary", () => {
          closeModal();
          openLocalFilePicker();
        }));
        actions.append(button("从GitHub课程库选择", "secondary", () => {
          closeModal();
          renderGithubLibrary(true);
        }));
        actions.append(button("取消", "ghost", closeModal));
        card.append(head, actions);
        modalLayer.append(card);
        trapFocus(card);
      }

      function openLocalFilePicker() {
        const input = document.getElementById("jsonFileInput");
        if (input) {
          input.value = "";
          input.click();
        }
      }

      function githubContentsUrl() {
        const cfg = GITHUB_LIBRARY_CONFIG;
        return "https://api.github.com/repos/" + encodeURIComponent(cfg.owner) + "/" + encodeURIComponent(cfg.repo) + "/contents/" + encodeURIComponent(cfg.folder) + "?ref=" + encodeURIComponent(cfg.branch);
      }

      function renderGithubLibrary(forceReload = false) {
        setPage("githubLibrary");
        if (forceReload) {
          githubLibrary.loading = true;
          githubLibrary.error = "";
          githubLibrary.notice = "";
          githubLibrary.items = [];
          fetchGithubLibrary();
        }
        const page = createEl("section", "page github-library-page");
        page.append(renderTopbar("GitHub课程库", "从 game-data 文件夹选择课程 JSON。", [
          button("返回", "ghost", () => renderDataLobby()),
          button("重新读取课程库", "secondary", () => renderGithubLibrary(true))
        ]));
        const shell = createEl("div", "shell");
        const panel = createEl("div", "panel stack");
        if (githubLibrary.notice) panel.append(createEl("div", "notice", githubLibrary.notice));
        if (githubLibrary.error) {
          panel.append(renderGithubErrorActions());
        } else {
          const controls = createEl("div", "library-controls");
          const search = createEl("input");
          search.type = "search";
          search.placeholder = "搜索课程关键词";
          search.value = githubLibrary.filterText || "";
          search.addEventListener("input", () => {
            githubLibrary.filterText = search.value;
            renderGithubLibrary(false);
          });
          controls.append(search, makeLibrarySelect("subject", "全部科目", getLibraryFacetValues("subject")), makeLibrarySelect("level", "全部年级", getLibraryFacetValues("level")));
          panel.append(controls);

          if (githubLibrary.loading) panel.append(createEl("div", "notice", "正在读取GitHub课程库……"));
          const grid = createEl("div", "course-grid");
          getFilteredGithubItems().forEach((item) => grid.append(renderCourseCard(item)));
          if (!grid.children.length && !githubLibrary.loading) grid.append(createEl("div", "notice warn", "没有找到符合条件的课程。"));
          panel.append(grid);
        }
        shell.append(panel);
        page.append(shell);
        app.replaceChildren(page);
      }

      function renderGithubErrorActions() {
        const box = createEl("div", "item-card stack");
        box.append(createEl("div", "notice error", "暂时无法读取GitHub课程库，请重试或改用本地JSON上传。"));
        const actions = createEl("div", "actions");
        actions.append(button("重试", "primary", () => renderGithubLibrary(true)));
        actions.append(button("从本地设备上传", "secondary", () => {
          renderDataLobby();
          requestAnimationFrame(openLocalFilePicker);
        }));
        actions.append(button("关闭", "ghost", () => renderDataLobby()));
        box.append(actions);
        return box;
      }

      async function fetchGithubLibrary() {
        try {
          const response = await fetch(githubContentsUrl(), { cache: "no-store" });
          if (!response.ok) throw new Error("GitHub API " + response.status);
          const data = await response.json();
          if (!Array.isArray(data)) throw new Error("GitHub目录结构无效");
          const files = data
            .filter((item) => item && item.type === "file" && /\.json$/i.test(item.name || "") && item.download_url)
            .map((item, index) => ({
              index,
              name: item.name,
              path: item.path,
              download_url: item.download_url,
              loading: true,
              error: "",
              meta: { packageTitle: item.name, subject: "", level: "", description: "" }
            }));
          githubLibrary.items = files;
          githubLibrary.loading = false;
          githubLibrary.error = "";
          if (view === "githubLibrary") renderGithubLibrary(false);
          files.forEach((item) => fetchGithubCourseMeta(item));
        } catch (error) {
          githubLibrary.loading = false;
          githubLibrary.error = error && error.message ? error.message : "GitHub读取失败";
          if (view === "githubLibrary") renderGithubLibrary(false);
        }
      }

      async function fetchGithubCourseMeta(item) {
        try {
          const response = await fetch(item.download_url, { cache: "no-store" });
          if (!response.ok) throw new Error("读取失败");
          const data = await response.json();
          item.meta = {
            packageTitle: data.packageTitle || data.title || item.name,
            subject: data.subject || "",
            level: data.level || "",
            description: data.description || ""
          };
          item.loading = false;
        } catch (error) {
          item.loading = false;
          item.error = "无法预览课程信息";
        }
        if (view === "githubLibrary") renderGithubLibrary(false);
      }

      function makeLibrarySelect(field, label, values) {
        const select = createEl("select");
        select.setAttribute("aria-label", label);
        select.append(createEl("option", "", label));
        values.forEach((value) => {
          const option = createEl("option", "", value);
          option.value = value;
          if (githubLibrary[field] === value) option.selected = true;
          select.append(option);
        });
        select.addEventListener("change", () => {
          githubLibrary[field] = select.value;
          renderGithubLibrary(false);
        });
        return select;
      }

      function getLibraryFacetValues(field) {
        return [...new Set(githubLibrary.items.map((item) => item.meta && item.meta[field]).filter(Boolean))].sort((a, b) => String(a).localeCompare(String(b), "zh-Hans-CN"));
      }

      function getFilteredGithubItems() {
        const keyword = String(githubLibrary.filterText || "").trim().toLowerCase();
        return githubLibrary.items.filter((item) => {
          const meta = item.meta || {};
          if (githubLibrary.subject && meta.subject !== githubLibrary.subject) return false;
          if (githubLibrary.level && meta.level !== githubLibrary.level) return false;
          if (!keyword) return true;
          return [item.name, meta.packageTitle, meta.subject, meta.level, meta.description].some((value) => String(value || "").toLowerCase().includes(keyword));
        });
      }

      function renderCourseCard(item) {
        const meta = item.meta || {};
        const card = createEl("article", "item-card course-card");
        card.append(createEl("span", "pill", item.name || ""));
        card.append(createEl("h3", "", meta.packageTitle || item.name || "未命名课程"));
        if (meta.subject) card.append(createEl("span", "pill visible", "科目：" + meta.subject));
        if (meta.level) card.append(createEl("span", "pill partial", "年级：" + meta.level));
        card.append(createEl("p", "subtle", meta.description || (item.loading ? "正在读取课程信息……" : item.error || "暂无课程描述。")));
        card.append(button(item.loading ? "正在读取" : "载入课程", "primary", () => loadGithubCourse(item), { disabled: item.loading }));
        return card;
      }

      async function loadGithubCourse(item) {
        if (!item || !item.download_url) return;
        githubLibrary.notice = "正在读取课程资料……";
        renderGithubLibrary(false);
        try {
          const response = await fetch(item.download_url, { cache: "no-store" });
          if (!response.ok) throw new Error("课程读取失败：" + response.status);
          const text = await response.text();
          let data;
          try {
            data = JSON.parse(text);
          } catch (error) {
            throw new Error("JSON格式错误：" + error.message);
          }
          importPackageData(data, text, {
            source: "github",
            githubFileName: item.name || "",
            githubPath: item.path || "",
            packageId: data.packageId || "",
            packageTitle: data.packageTitle || item.name || ""
          }, true);
        } catch (error) {
          githubLibrary.notice = "";
          githubLibrary.error = error && error.message ? error.message : "GitHub课程读取失败";
          renderGithubLibrary(false);
        }
      }

      function handleFileImport(event) {
        const file = event.target.files && event.target.files[0];
        if (!file) return;
        if (!/\.json$/i.test(file.name || "")) {
          parseError = "请选择 .json 格式的资料包。";
          renderDataLobby();
          return;
        }
        unlockAudio();
        const reader = new FileReader();
        reader.onload = () => importText(String(reader.result || ""), { source: "local" });
        reader.onerror = () => {
          parseError = "文件读取失败，请重新选择 JSON 文件。";
          renderDataLobby();
        };
        reader.readAsText(file, "utf-8");
      }

      function importText(text, sourceMeta = { source: "local" }) {
        parseError = "";
        if (!String(text || "").trim()) {
          parseError = "JSON 内容为空，请上传或粘贴资料包。";
          renderDataLobby();
          return;
        }
        let data;
        try {
          data = JSON.parse(text);
        } catch (error) {
          parseError = "JSON 语法错误：" + error.message;
          renderDataLobby();
          return;
        }
        importPackageData(data, String(text || ""), Object.assign({ source: "local" }, sourceMeta || {}));
      }

      function importPackageData(data, serializedText, sourceMeta, autoEnterLobby = false) {
        clearAllProgress();
        packageData = data;
        const serialized = serializedText || JSON.stringify(data);
        packageHash = stableHash(serialized);
        packageSource = Object.assign({
          source: "local",
          githubFileName: "",
          githubPath: "",
          packageId: data && data.packageId ? data.packageId : "",
          packageTitle: data && data.packageTitle ? data.packageTitle : ""
        }, sourceMeta || {});
        validation = validatePackage(data);
        try {
          localStorage.setItem(STORE.package, serialized);
          localStorage.setItem(STORE.packageHash, packageHash);
          localStorage.setItem(STORE.packageSource, JSON.stringify(packageSource));
        } catch {
          validation.warnings.push("浏览器本地储存不可用，本次游戏仍可继续。");
        }
        validationPage = 0;
        validationReportExpanded = false;
        if (autoEnterLobby && validation && !validation.errors.length) renderCaseLobby();
        else renderValidation();
      }

      function continueSavedPackage() {
        parseError = "";
        if (!packageData || !validation) {
          renderDataLobby("没有可继续使用的资料包。");
          return;
        }
        renderValidation();
      }

      function removeCurrentPackage() {
        packageData = null;
        packageHash = "";
        validation = null;
        currentCaseId = "";
        currentCase = null;
        progress = null;
        validationReportExpanded = false;
        clearAllProgress();
        try {
          localStorage.removeItem(STORE.package);
          localStorage.removeItem(STORE.packageHash);
          localStorage.removeItem(STORE.packageSource);
        } catch {}
        renderDataLobby("当前资料包已移除。");
      }

      function downloadBlankTemplate() {
        const blob = new Blob([JSON.stringify(blankTemplate, null, 2)], { type: "application/json;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = createEl("a");
        link.href = url;
        link.download = "空白游戏资料包模板.json";
        document.body.append(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      // 资料验证：只检查结构、引用、格式和线索依赖，不判断课程知识正确性。
      function validatePackage(data) {
        const errors = [];
        const warnings = [];
        const checks = [];
        const ok = (label) => checks.push({ ok: true, text: label });
        const fail = (label) => {
          errors.push(label);
          checks.push({ ok: false, text: label });
        };
        const warn = (label) => {
          warnings.push(label);
          checks.push({ ok: true, warn: true, text: label });
        };

        if (!data || typeof data !== "object" || Array.isArray(data)) {
          fail("资料包必须是 JSON 对象。");
          return { errors, warnings, checks };
        }
        data.schemaVersion === "1.0" ? ok("schemaVersion 受到支持。") : fail("schemaVersion 必须为 1.0。");
        Array.isArray(data.cases) && data.cases.length > 0 ? ok("至少包含一宗案件。") : fail("必须至少包含一宗案件。");

        (Array.isArray(data.cases) ? data.cases : []).forEach((caseItem, index) => {
          const label = caseItem && caseItem.title ? caseItem.title : "第" + (index + 1) + "宗案件";
          if (!caseItem || typeof caseItem !== "object") {
            fail(label + "必须是对象。");
            return;
          }
          caseItem.id ? ok(label + "拥有案件 ID。") : fail(label + "缺少案件 ID。");
          caseItem.entityType && caseItem.entityLabel ? ok(label + "拥有 entityType 和 entityLabel。") : fail(label + "必须提供 entityType 和 entityLabel。");

          const entities = Array.isArray(caseItem.entities) ? caseItem.entities : [];
          const categories = Array.isArray(caseItem.categories) ? caseItem.categories : [];
          const clues = Array.isArray(caseItem.clues) ? caseItem.clues : [];
          const storyEvents = Array.isArray(caseItem.storyEvents) ? caseItem.storyEvents : [];
          const solution = caseItem.solution && typeof caseItem.solution === "object" ? caseItem.solution : {};
          const totalCells = entities.length * categories.length;

          entities.length >= 3 ? ok(label + "至少包含 3 个档案对象。") : fail(label + "至少需要 3 个档案对象。");
          categories.length >= 2 ? ok(label + "至少包含 2 个配对类别。") : fail(label + "至少需要 2 个配对类别。");

          const entityIds = new Set();
          entities.forEach((entity, entityIndex) => {
            if (!entity || typeof entity !== "object") {
              fail(label + "的第" + (entityIndex + 1) + "个档案对象必须是对象。");
              return;
            }
            if (!entity.id) fail(label + "有档案对象缺少 ID。");
            else if (entityIds.has(entity.id)) fail(label + "档案对象 ID 重复：" + entity.id);
            else entityIds.add(entity.id);
            const iconIssues = validateIconSpec(entity.iconSpec);
            if (iconIssues.length) warn(label + "的图标参数将使用后备生成：" + iconIssues.join("、"));
          });
          if (entityIds.size === entities.length && entities.length) ok(label + "档案对象 ID 唯一。");

          const categoryIds = new Set();
          const optionIds = new Set();
          const optionsByCategory = new Map();
          categories.forEach((category, categoryIndex) => {
            if (!category || typeof category !== "object") {
              fail(label + "的第" + (categoryIndex + 1) + "个类别必须是对象。");
              return;
            }
            if (!category.id) fail(label + "有类别缺少 ID。");
            else if (categoryIds.has(category.id)) fail(label + "类别 ID 重复：" + category.id);
            else categoryIds.add(category.id);
            const options = Array.isArray(category.options) ? category.options : [];
            optionsByCategory.set(category.id, new Set(options.map((option) => option && option.id).filter(Boolean)));
            options.length === entities.length ? ok(label + "中类别“" + safeLabel(category.label, category.id) + "”的选项数量正确。") : fail(label + "中类别“" + safeLabel(category.label, category.id) + "”的选项数量必须与档案对象数量一致。");
            options.forEach((option) => {
              if (!option || !option.id) fail(label + "有选项缺少 ID。");
              else if (optionIds.has(option.id)) fail(label + "选项 ID 重复：" + option.id);
              else optionIds.add(option.id);
            });
          });
          if (categoryIds.size === categories.length && categories.length) ok(label + "类别 ID 唯一。");
          if (optionIds.size && !hasDuplicateOptions(categories)) ok(label + "选项 ID 唯一。");

          entities.forEach((entity) => {
            if (!entity || !entity.id) return;
            const row = solution[entity.id];
            if (!row || typeof row !== "object") {
              fail(label + "的 solution 缺少档案对象答案：" + entity.id);
              return;
            }
            categories.forEach((category) => {
              if (!category || !category.id) return;
              const optionId = row[category.id];
              if (!optionId) fail(label + "的 " + entity.id + "::" + category.id + " 缺少答案。");
              else if (!optionsByCategory.get(category.id) || !optionsByCategory.get(category.id).has(optionId)) {
                fail(label + "的 solution 引用了不存在的选项：" + entity.id + "::" + category.id + " → " + optionId);
              }
            });
          });

          categories.forEach((category) => {
            if (!category || !category.id) return;
            const used = new Map();
            entities.forEach((entity) => {
              const optionId = solution[entity.id] && solution[entity.id][category.id];
              if (!optionId) return;
              used.set(optionId, (used.get(optionId) || 0) + 1);
            });
            const repeated = [...used.entries()].filter((entry) => entry[1] !== 1);
            repeated.length ? fail(label + "中类别“" + safeLabel(category.label, category.id) + "”的 solution 选项必须各使用一次。") : ok(label + "中类别“" + safeLabel(category.label, category.id) + "”的选项各使用一次。");
          });

          const validCells = new Set();
          entities.forEach((entity) => categories.forEach((category) => validCells.add(cellId(entity.id, category.id))));

          const clueIds = new Set();
          clues.forEach((clue) => {
            if (!clue || !clue.id) fail(label + "有线索缺少 ID。");
            else if (clueIds.has(clue.id)) fail(label + "线索 ID 重复：" + clue.id);
            else clueIds.add(clue.id);
            ["relatedCells", "completeAfter", "unlockAfter"].forEach((field) => {
              const list = Array.isArray(clue && clue[field]) ? clue[field] : [];
              list.forEach((id) => {
                if (!validCells.has(id)) fail(label + "的线索引用了不存在的格子：" + id);
              });
            });
            if (clue && !clue.initial && (!Array.isArray(clue.unlockAfter) || clue.unlockAfter.length === 0)) {
              fail(label + "有非初始线索缺少 unlockAfter，无法自然出现：" + safeLabel(clue.text, clue.id));
            }
            if (clue && clue.completeMode && !["all", "any"].includes(clue.completeMode)) fail(label + "线索 completeMode 只支持 all 或 any。");
            if (clue && clue.unlockMode && !["all", "any"].includes(clue.unlockMode)) fail(label + "线索 unlockMode 只支持 all 或 any。");
          });
          clueIds.size === clues.length && clues.length ? ok(label + "线索 ID 唯一。") : null;
          clues.some((clue) => clue && clue.initial === true) ? ok(label + "至少有一条初始线索。") : fail(label + "必须至少有一条 initial 为 true 的初始线索。");

          const eventIds = new Set();
          storyEvents.forEach((eventItem) => {
            if (!eventItem || !eventItem.id) fail(label + "有剧情事件缺少 ID。");
            else if (eventIds.has(eventItem.id)) fail(label + "剧情事件 ID 重复：" + eventItem.id);
            else eventIds.add(eventItem.id);
            const trigger = Number(eventItem && eventItem.triggerAfterCorrectCells);
            Number.isInteger(trigger) && trigger > 0 && trigger <= totalCells ? ok(label + "剧情事件触发数量有效。") : fail(label + "剧情事件 triggerAfterCorrectCells 必须大于 0 且不超过总格子数。");
          });
          if (eventIds.size === storyEvents.length) ok(label + "剧情事件 ID 唯一。");
        });

        if (!errors.length) checks.unshift({ ok: true, text: "资料检查完成，可以开始调查。" });
        return { errors, warnings, checks };
      }

      function hasDuplicateOptions(categories) {
        const seen = new Set();
        for (const category of categories) {
          for (const option of (category.options || [])) {
            if (!option || !option.id) continue;
            if (seen.has(option.id)) return true;
            seen.add(option.id);
          }
        }
        return false;
      }

      function validateIconSpec(spec) {
        if (!spec || typeof spec !== "object") return ["缺少 iconSpec"];
        const issues = [];
        if (spec.mode && spec.mode !== "generated") issues.push("mode 不受支持");
        if (spec.shape && !SHAPES.includes(spec.shape)) issues.push("shape 不受支持");
        if (spec.pattern && !PATTERNS.includes(spec.pattern)) issues.push("pattern 不受支持");
        ["primaryColor", "secondaryColor", "accentColor"].forEach((key) => {
          if (spec[key] && !isHexColor(spec[key])) issues.push(key + " 不是 HEX 颜色");
        });
        return issues;
      }

      function renderValidation() {
        setPage("validation");
        const page = createEl("section", "page validation-page");
        const title = packageData && packageData.packageTitle ? packageData.packageTitle : "资料检查";
        page.append(renderTopbar(title, "导入后必须先检查资料结构，检查通过后才可开始调查。", [
          button("更换资料包", "ghost", () => renderDataLobby()),
          button("移除资料包", "danger", removeCurrentPackage)
        ]));

        const shell = createEl("div", "shell");
        const panel = createEl("div", "panel stack");
        const status = createEl("div", validation && !validation.errors.length ? "notice success" : "notice error");
        status.textContent = validation && !validation.errors.length ? "✓ 案件资料验证完成，可以开始调查。" : "⚠ 案件资料存在问题，请修正资料包后重新导入。";
        panel.append(status);

        const lists = createEl("div", "validation-layout");
        const left = createEl("div", "stack validation-check-pane");
        const showValidationReport = validationReportExpanded === true;
        if (!showValidationReport) left.classList.add("validation-collapsed");
        const reportHead = createEl("div", "validation-report-head");
        reportHead.append(createEl("h2", "", "案件资料鉴定报告"));
        const reportToggle = button(validationReportExpanded ? "收起报告" : "展开报告", "tiny ghost validation-report-toggle", () => {
          validationReportExpanded = !validationReportExpanded;
          updateValidationReportPanel(left, reportToggle);
        });
        reportToggle.setAttribute("aria-expanded", String(showValidationReport));
        reportHead.append(reportToggle);
        left.append(reportHead);
        const items = (validation ? validation.checks : []).map((item, index) => Object.assign({ index }, item)).sort((a, b) => {
          const rank = (item) => item.ok ? item.warn ? 1 : 2 : 0;
          return rank(a) - rank(b) || a.index - b.index;
        });
        const list = createEl("div", "validation-list");
        items.forEach((item) => {
          const row = createEl("div", "validation-item");
          row.append(createEl("span", item.warn ? "pill partial" : item.ok ? "pill visible" : "pill", item.warn ? "! 提醒" : item.ok ? "✓ 通过" : "× 错误"));
          row.append(createEl("span", "", item.text));
          list.append(row);
        });
        const reportBody = createEl("div", "validation-report-body");
        const reportBodyInner = createEl("div", "validation-report-body-inner");
        reportBodyInner.append(list);
        reportBody.append(reportBodyInner);
        left.append(reportBody);

        const right = createEl("div", "stack validation-data-pane");
        right.append(createEl("h2", "", "资料档案"));
        const desc = createEl("div", "item-card");
        desc.append(labeledText("资料包", packageData && packageData.packageTitle ? packageData.packageTitle : "未命名资料包"));
        desc.append(labeledText("描述", packageData && packageData.description ? packageData.description : "未填写"));
        desc.append(labeledText("案件数量", packageData && Array.isArray(packageData.cases) ? String(packageData.cases.length) : "0"));
        const note = createEl("div", "notice");
        note.textContent = "课程知识是否准确、答案是否唯一，需要由生成 JSON 的 AI 和教师在资料整理阶段确认。";
        right.append(desc, note);

        const startActions = createEl("div", "actions");
        startActions.append(button("进入案件大厅", "primary validation-start-button", () => renderCaseLobby(), { disabled: !validation || validation.errors.length > 0 }));
        right.append(startActions);
        lists.append(left, right);
        panel.append(lists);
        shell.append(panel);
        page.append(shell);
        app.replaceChildren(page);
      }

      function updateValidationReportPanel(pane, toggle) {
        if (!pane || !toggle) return;
        const expanded = validationReportExpanded === true;
        pane.classList.toggle("validation-collapsed", !expanded);
        toggle.textContent = expanded ? "收起报告" : "展开报告";
        toggle.setAttribute("aria-expanded", String(expanded));
      }

      function labeledText(label, value) {
        const box = createEl("div", "result-cell");
        box.append(createEl("span", "result-label", label));
        box.append(createEl("span", "result-value", value || ""));
        return box;
      }

      function renderCaseLobby() {
        setPage("cases");
        const cases = packageData && Array.isArray(packageData.cases) ? packageData.cases : [];
        const page = createEl("section", "page case-lobby-page");
        page.append(renderTopbar(packageData && packageData.packageTitle ? packageData.packageTitle : "案件大厅", "待调查案件柜：请选择一宗案件查看简报。", [
          soundToggle(),
          button("案件验证", "ghost", () => renderValidation()),
          button("更换资料", "ghost", () => renderDataLobby())
        ]));

        const shell = createEl("div", "shell");
        const panel = createEl("div", "panel stack");
        panel.append(createEl("h2", "", "案件档案墙"));

        const perPage = getCardPageSize();
        const totalPages = Math.max(1, Math.ceil(cases.length / perPage));
        casePage = clamp(casePage, 0, totalPages - 1);
        const grid = createEl("div", "card-grid case-lobby-grid");
        cases.slice(casePage * perPage, casePage * perPage + perPage).forEach((caseItem) => {
          const card = createEl("article", "item-card");
          card.append(createEl("span", "pill new", "案件编号：" + (caseItem.id || "未编号")));
          card.append(createEl("h3", "", caseItem.title || "未命名案件"));
          if (caseItem.difficulty) card.append(createEl("span", "pill", "难度：" + caseItem.difficulty));
          card.append(createEl("p", "subtle", caseItem.goal || caseItem.story || "未填写案件目标。"));
          const saved = loadProgress(caseItem.id);
          const done = saved && saved.completed;
          const cells = getTotalCells(caseItem);
          const count = saved ? saved.correctCells.length : 0;
          card.append(createEl("div", done ? "notice success" : "notice", done ? "已完成" : "档案完成度：" + count + "/" + cells));
          card.append(renderCaseLobbyCardActions(caseItem, done, count));
          grid.append(card);
        });
        panel.append(grid, renderPager(casePage, totalPages, "页", (next) => {
          casePage = next;
          updateCaseLobbyAfterPageChange(grid, cases, perPage);
        }));
        shell.append(panel);
        page.append(shell);
        app.replaceChildren(page);
      }

      function updateCaseLobbyAfterPageChange(grid, cases, perPage) {
        if (!grid) return;
        const oldPager = grid.nextElementSibling;
        runLocalSwitch(grid, () => {
          renderCaseLobbyCards(grid, cases, perPage);
          const newPager = renderCaseLobbyPager(grid, cases, perPage);
          if (oldPager) oldPager.replaceWith(newPager);
          else grid.after(newPager);
        });
      }

      function renderCaseLobbyPager(grid, cases, perPage) {
        const totalPages = Math.max(1, Math.ceil(cases.length / perPage));
        casePage = clamp(casePage, 0, totalPages - 1);
        const pager = renderPager(casePage, totalPages, "页", (next) => {
          casePage = next;
          updateCaseLobbyAfterPageChange(grid, cases, perPage);
        });
        pager.classList.add("case-lobby-pager");
        return pager;
      }

      function renderCaseLobbyCards(grid, cases, perPage) {
        clearNode(grid);
        const totalPages = Math.max(1, Math.ceil(cases.length / perPage));
        casePage = clamp(casePage, 0, totalPages - 1);
        cases.slice(casePage * perPage, casePage * perPage + perPage).forEach((caseItem) => {
          grid.append(renderCaseLobbyCard(caseItem));
        });
      }

      function renderCaseLobbyCard(caseItem) {
        const card = createEl("article", "item-card");
        card.append(createEl("span", "pill new", "案件编号：" + (caseItem.id || "未编号")));
        card.append(createEl("h3", "", caseItem.title || "未命名案件"));
        if (caseItem.difficulty) card.append(createEl("span", "pill", "难度：" + caseItem.difficulty));
        card.append(createEl("p", "subtle", caseItem.goal || caseItem.story || "未填写案件目标。"));
        const saved = loadProgress(caseItem.id);
        const done = saved && saved.completed;
        const cells = getTotalCells(caseItem);
        const count = saved ? saved.correctCells.length : 0;
        card.append(createEl("div", done ? "notice success" : "notice", done ? "已完成" : "档案完成度：" + count + "/" + cells));
        card.append(renderCaseLobbyCardActions(caseItem, done, count));
        return card;
      }

      function renderCaseLobbyCardActions(caseItem, done, count) {
        const actions = createEl("div", "actions");
        if (done) {
          actions.append(button("查看案件简报", "ghost", () => openCaseIntro(caseItem.id)));
          actions.append(button("查看结案报告", "primary", () => openCompletionReport(caseItem.id)));
        } else {
          actions.append(button(count ? "继续调查" : "查看案件简报", "primary", () => openCaseIntro(caseItem.id)));
        }
        return actions;
      }

      function openCaseIntro(id) {
        currentCaseId = id;
        currentCase = findCase(id);
        narrativePage = 0;
        playSound("openCase");
        renderCaseIntro();
      }

      function openCompletionReport(id) {
        currentCaseId = id;
        currentCase = findCase(id);
        if (!currentCase) {
          renderCaseLobby();
          return;
        }
        progress = loadProgress(id) || createProgress(currentCase);
        ensureProgressState(currentCase, progress);
        if (!progress.completed) {
          renderCaseIntro();
          return;
        }
        renderCompletion();
      }

      function renderCaseIntro() {
        setPage("intro");
        if (!currentCase) {
          renderCaseLobby();
          return;
        }
        const entityLabel = getEntityLabel(currentCase);
        const page = createEl("section", "page intro-page");
        page.append(renderTopbar(currentCase.title || "案件介绍", "机密案件简报：" + entityLabel + "档案将在调查页中生成。", [
          soundToggle(),
          button("返回案件大厅", "ghost", renderCaseLobby)
        ]));

        const shell = createEl("div", "shell");
        const panel = createEl("div", "panel stack");
        const pieces = getNarrativePieces(currentCase);
        const totalPages = Math.max(1, pieces.length);
        narrativePage = clamp(narrativePage, 0, totalPages - 1);
        const piece = pieces[narrativePage];
        const intro = createEl("div", "item-card intro-narrative-card");
        const labels = createEl("div", "intro-card-labels");
        labels.append(createEl("span", "pill new", "机密 / 待调查"));
        labels.append(createEl("span", "pill intro-narrative-label", piece.label));
        intro.append(labels);
        intro.append(createEl("p", "subtle intro-narrative-text", piece.text || "未填写"));

        const meta = createEl("div", "result-grid intro-meta-compact");
        meta.append(labeledText(entityLabel + "数量", String((currentCase.entities || []).length)));
        meta.append(labeledText("配对类别", String((currentCase.categories || []).length)));
        meta.append(labeledText("线索数量", String((currentCase.clues || []).length)));
        meta.append(labeledText("总格子数", String(getTotalCells(currentCase))));

        const actions = createEl("div", "actions");
        const savedProgress = loadProgress(currentCase.id);
        if (savedProgress) {
          actions.append(button("继续调查", "primary", startCase));
          actions.append(button("重新调查", "danger", () => {
            resetCaseProgress(currentCase.id);
            progress = null;
            renderCaseIntro();
          }));
        } else {
          actions.append(button("开始调查", "primary", startCase));
        }

        panel.append(createEl("h2", "", currentCase.title || "案件介绍"), meta, intro, renderNarrativePager(totalPages), actions);
        shell.append(panel);
        page.append(shell);
        app.replaceChildren(page);
      }

      function renderNarrativePager(totalPages) {
        const pager = renderPager(narrativePage, totalPages, "段", (next) => {
          narrativePage = next;
          updateNarrativeContent();
        });
        pager.classList.add("intro-pager");
        return pager;
      }

      function updateNarrativeContent() {
        if (view !== "intro" || !currentCase) return;
        const pieces = getNarrativePieces(currentCase);
        const totalPages = Math.max(1, pieces.length);
        narrativePage = clamp(narrativePage, 0, totalPages - 1);
        const piece = pieces[narrativePage];
        const label = app.querySelector(".intro-narrative-label");
        const text = app.querySelector(".intro-narrative-text");
        const pager = app.querySelector(".intro-pager");
        const card = app.querySelector(".intro-narrative-card");
        if (label) label.textContent = piece.label;
        if (text) text.textContent = piece.text || "未填写";
        if (pager) pager.replaceWith(renderNarrativePager(totalPages));
        if (card && !prefersReducedMotion()) {
          card.classList.remove("local-switch-in");
          void card.offsetWidth;
          card.classList.add("local-switch-in");
          window.setTimeout(() => card.classList.remove("local-switch-in"), 220);
        }
      }

      function getNarrativePieces(caseItem) {
        const narrative = caseItem.narrative && typeof caseItem.narrative === "object" ? caseItem.narrative : null;
        const pieces = [];
        if (narrative) {
          if (narrative.opening) pieces.push({ label: "开场", text: narrative.opening });
          if (narrative.problem) pieces.push({ label: "发生的问题", text: narrative.problem });
          if (narrative.mission) pieces.push({ label: "调查任务", text: narrative.mission });
          if (!pieces.length && narrative.theme) pieces.push({ label: "主题", text: narrative.theme });
        }
        if (!pieces.length) {
          if (caseItem.story) pieces.push({ label: "开场", text: caseItem.story });
          if (caseItem.goal) pieces.push({ label: "调查任务", text: caseItem.goal });
        }
        return pieces.length ? pieces : [{ label: "案件介绍", text: caseItem.title || "" }];
      }

      function startCase() {
        if (!currentCase) return;
        progress = loadProgress(currentCase.id) || createProgress(currentCase);
        ensureProgressState(currentCase, progress);
        currentCaseId = currentCase.id;
        saveProgress();
        cluePage = Number(progress.cluePage || 0);
        selectedCell = null;
        renderGame();
      }

      function createProgress(caseItem) {
        const clueStatus = {};
        (caseItem.clues || []).forEach((clue) => {
          clueStatus[clue.id] = "hidden";
        });
        const state = {
          caseId: caseItem.id,
          correctCells: [],
          clueStatus,
          storyEventsShown: [],
          errors: 0,
          hints: 0,
          startTime: Date.now(),
          completed: false,
          completedAt: 0,
          failed: false,
          failedAt: 0,
          soundEnabled: audio.enabled,
          cluePage: 0,
          clueScrollLeft: 0,
          categoryOrder: [],
          optionOrderByCategory: {},
          revealedEntities: []
        };
        normalizeClueActivity(caseItem, state);
        return state;
      }

      // 随机顺序和名称揭示状态只补字段，不改动 JSON 原始数据。
      function ensureProgressState(caseItem, state) {
        if (!caseItem || !state) return;
        state.correctCells = Array.isArray(state.correctCells) ? state.correctCells : [];
        state.clueStatus = state.clueStatus || {};
        (caseItem.clues || []).forEach((clue) => {
          if (!state.clueStatus[clue.id]) state.clueStatus[clue.id] = clue.initial === true ? "visible" : "hidden";
        });
        state.storyEventsShown = Array.isArray(state.storyEventsShown) ? state.storyEventsShown : [];
        state.revealedEntities = Array.isArray(state.revealedEntities) ? state.revealedEntities : [];
        state.cluePage = Number.isFinite(Number(state.cluePage)) ? Number(state.cluePage) : 0;
        state.clueScrollLeft = Number.isFinite(Number(state.clueScrollLeft)) ? Number(state.clueScrollLeft) : 0;
        state.failed = state.failed === true;
        state.failedAt = Number(state.failedAt || 0);

        const settings = getEngineSettings(caseItem);
        const categories = Array.isArray(caseItem.categories) ? caseItem.categories : [];
        const categoryIds = categories.map((category) => category.id).filter(Boolean);
        if (settings.randomizeCategoryOrder) {
          state.categoryOrder = isSameIdList(state.categoryOrder, categoryIds) ? state.categoryOrder.slice() : shuffleCopy(categoryIds);
        } else {
          state.categoryOrder = categoryIds.slice();
        }

        const orderMap = state.optionOrderByCategory && typeof state.optionOrderByCategory === "object" ? state.optionOrderByCategory : {};
        categories.forEach((category) => {
          const optionIds = (Array.isArray(category.options) ? category.options : []).map((option) => option.id).filter(Boolean);
          if (settings.randomizeOptionOrder) {
            orderMap[category.id] = isSameIdList(orderMap[category.id], optionIds) ? orderMap[category.id].slice() : shuffleCopy(optionIds);
          } else {
            orderMap[category.id] = optionIds.slice();
          }
        });
        state.optionOrderByCategory = orderMap;
        normalizeClueActivity(caseItem, state);
        updateEntityRevealState();
      }

      function getEngineSettings(caseItem) {
        const packageSettings = packageData && packageData.settings && typeof packageData.settings === "object" ? packageData.settings : {};
        const caseSettings = caseItem && caseItem.settings && typeof caseItem.settings === "object" ? caseItem.settings : {};
        const merged = Object.assign({}, packageSettings, caseSettings);
        const nameReveal = merged.nameReveal && typeof merged.nameReveal === "object" ? merged.nameReveal : {};
        return {
          randomizeOptionOrder: merged.randomizeOptionOrder !== false,
          randomizeCategoryOrder: merged.randomizeCategoryOrder === true,
          shuffleMode: merged.shuffleMode || "perCase",
          nameReveal: {
            enabled: nameReveal.enabled !== false,
            threshold: Number.isFinite(Number(nameReveal.threshold)) ? Number(nameReveal.threshold) : 0.66,
            comparison: nameReveal.comparison || "gte",
            mode: nameReveal.mode || "perEntity",
            autoReveal: nameReveal.autoReveal !== false
          }
        };
      }

      function isSameIdList(saved, source) {
        if (!Array.isArray(saved) || saved.length !== source.length) return false;
        const set = new Set(source);
        return saved.every((id) => set.has(id)) && new Set(saved).size === set.size;
      }

      function shuffleCopy(list) {
        const copy = list.slice();
        for (let i = copy.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
      }

      function renderGame() {
        setPage("game");
        if (!currentCase || !progress) {
          renderCaseLobby();
          return;
        }
        if (progress.failed) {
          renderFailure();
          return;
        }
        const page = createEl("section", "page game-page");
        page.append(renderTopbar(currentCase.title || "调查中", getGameSubtitle(), [
          button("提示", "secondary", useHint, { disabled: progress.completed || progress.failed }),
          soundToggle(),
          button("案件大厅", "ghost", () => {
            saveProgress();
            renderCaseLobby();
          })
        ]));

        const shell = createEl("div", "shell");
        const layout = createEl("div", "game-layout");
        layout.append(renderArchiveTable(), renderClueArea());
        shell.append(layout);
        page.append(shell);
        app.replaceChildren(page);
        requestAnimationFrame(() => {
          fitArchiveViewport();
          positionInlinePanels();
        });

        checkStalledClues();
        startTimer();
      }

      function refreshGameView(parts = { archive: true, clues: true }) {
        if (view !== "game" || !currentCase || !progress) return;
        const layout = app.querySelector(".game-layout");
        if (!layout) {
          renderGame();
          return;
        }
        const archive = layout.children[0];
        const clues = layout.children[1];
        if (parts.clues) captureClueScroll();
        if (parts.archive && archive) archive.replaceWith(renderArchiveTable());
        if (parts.clues && clues) clues.replaceWith(renderClueArea());
        updateGameTopbar();
        requestAnimationFrame(() => {
          fitArchiveViewport();
          positionInlinePanels();
        });
        checkStalledClues();
      }

      function updateGameTopbar() {
        const top = app.querySelector(".topbar .subtle");
        if (top) top.textContent = getGameSubtitle();
      }

      function captureClueScroll() {
        if (!progress) return;
        if (Number(progress.clueScrollLeft) < 0) return;
        const scroll = app.querySelector(".clue-scroll");
        if (!scroll) return;
        progress.clueScrollLeft = scroll.scrollLeft;
        progress.cluePage = getCluePageFromScroll(scroll);
      }

      function getCluePageFromScroll(scroll) {
        const width = Math.max(1, scroll.clientWidth);
        return Math.max(0, Math.round(scroll.scrollLeft / width));
      }

      function isCompactArchiveMode() {
        return window.innerWidth <= 1024 || (window.matchMedia && window.matchMedia("(pointer: coarse)").matches);
      }

      function isDesktopHoverMode() {
        if (!window.matchMedia) return window.innerWidth > 760;
        return window.matchMedia("(hover: hover) and (pointer: fine)").matches
          || window.matchMedia("(hover: hover) and (any-pointer: fine)").matches
          || window.matchMedia("(any-hover: hover) and (any-pointer: fine)").matches;
      }

      function canUseInlineHoverEvent(event) {
        if (event && event.pointerType) return event.pointerType === "mouse";
        if (event && event.sourceCapabilities && event.sourceCapabilities.firesTouchEvents) return false;
        if (event && event.type && event.type.indexOf("mouse") === 0) return isDesktopHoverMode() || window.innerWidth > 760;
        return isDesktopHoverMode();
      }

      function openInlineHover(holder, forceMouse = false) {
        if (!holder || selectedCell) return;
        if (!forceMouse && !isDesktopHoverMode()) return;
        cancelInlineHoverClose(holder);
        holder.classList.add("hover-open");
        const existing = getInlineOptionsPanel(holder.dataset.cellId);
        if (existing && !existing.classList.contains("error")) {
          requestAnimationFrame(positionInlinePanels);
          return;
        }
        showInlineOptions(holder.dataset.entityId, holder.dataset.categoryId, "");
        requestAnimationFrame(positionInlinePanels);
      }

      function cancelInlineHoverClose(holder) {
        if (!holder) return;
        const timer = inlineHoverTimers.get(holder);
        if (!timer) return;
        clearTimeout(timer);
        inlineHoverTimers.delete(holder);
      }

      function getHoverableAnswerHolder(target) {
        if (!target || !target.closest) return null;
        const holder = target.closest(".answer-cell-wrap");
        if (!holder || !holder.dataset.entityId || !holder.dataset.categoryId) return null;
        if (holder.querySelector(".cell.correct")) return null;
        return holder;
      }

      function handleInlineMouseOver(event) {
        if (view !== "game" || !canUseInlineHoverEvent(event)) return;
        const holder = getHoverableAnswerHolder(event.target);
        if (!holder) return;
        if (activeInlineHoverHolder === holder) {
          openInlineHover(holder, true);
          return;
        }
        if (activeInlineHoverHolder && activeInlineHoverHolder !== holder) {
          scheduleInlineHoverClose(activeInlineHoverHolder, 80);
        }
        activeInlineHoverHolder = holder;
        openInlineHover(holder, true);
      }

      function handleInlineMouseOut(event) {
        if (view !== "game" || !canUseInlineHoverEvent(event)) return;
        const holder = getHoverableAnswerHolder(event.target);
        if (!holder) return;
        if (event.relatedTarget && holder.contains(event.relatedTarget)) return;
        const panel = getInlineOptionsPanel(holder.dataset.cellId);
        if (event.relatedTarget && panel && panel.contains(event.relatedTarget)) return;
        scheduleInlineHoverClose(holder);
        if (activeInlineHoverHolder === holder) activeInlineHoverHolder = null;
      }

      function scheduleInlineHoverClose(holder, delay = 160) {
        if (!holder) return;
        const previous = inlineHoverTimers.get(holder);
        if (previous) clearTimeout(previous);
        const timer = window.setTimeout(() => {
          inlineHoverTimers.delete(holder);
          const panel = getInlineOptionsPanel();
          if (holder.matches(":focus-within")) return;
          if (panel && panel.dataset.panelCell === holder.dataset.cellId && (panel.matches(":hover") || panel.contains(document.activeElement))) return;
          holder.classList.remove("hover-open");
          if (!selectedCell || selectedCell.entityId !== holder.dataset.entityId || selectedCell.categoryId !== holder.dataset.categoryId) {
            removeInlineOptions(holder.dataset.cellId);
          }
        }, delay);
        inlineHoverTimers.set(holder, timer);
      }

      function getInlineOptionsPanel(targetCellId) {
        const panel = app.querySelector(".archive-inline-options");
        if (!panel) return null;
        if (targetCellId && panel.dataset.panelCell !== targetCellId) return null;
        return panel;
      }

      function findAnswerHolder(entityId, categoryId) {
        const id = cellId(entityId, categoryId);
        return [...app.querySelectorAll(".answer-cell-wrap")].find((node) => node.dataset.cellId === id) || null;
      }

      function removeInlineOptions(targetCellId) {
        const panel = getInlineOptionsPanel();
        if (!panel) return;
        if (targetCellId && panel.dataset.panelCell !== targetCellId) return;
        panel.remove();
      }

      function showInlineOptions(entityId, categoryId, errorMessage = "") {
        if (!entityId || !categoryId) return;
        const archivePanel = app.querySelector(".archive-panel");
        const holder = findAnswerHolder(entityId, categoryId);
        const entity = getEntity(entityId);
        const category = getCategory(categoryId);
        if (!archivePanel || !holder || !entity || !category) return;
        const targetCellId = cellId(entityId, categoryId);
        const existing = getInlineOptionsPanel(targetCellId);
        if (existing && !errorMessage && !existing.classList.contains("error")) {
          requestAnimationFrame(positionInlinePanels);
          return existing;
        }
        removeInlineOptions();
        const panel = renderInlineOptions(entity, category, errorMessage);
        panel.classList.add("archive-inline-options");
        panel.dataset.panelCell = targetCellId;
        panel.addEventListener("mouseenter", () => {
          cancelInlineHoverClose(holder);
          holder.classList.add("hover-open");
        });
        panel.addEventListener("mouseleave", () => scheduleInlineHoverClose(holder));
        archivePanel.append(panel);
        requestAnimationFrame(positionInlinePanels);
      }

      function fitArchiveViewport() {
        if (!isCompactArchiveMode()) return;
        const panel = app.querySelector(".archive-scroll-mode");
        const wrap = panel && panel.querySelector(".table-wrap");
        const grid = panel && panel.querySelector(".archive-grid");
        if (!wrap || !grid || !currentCase) return;
        const entities = currentCase.entities || [];
        const categories = getOrderedCategories();
        const gap = Math.max(3, Math.min(8, Math.round(parseFloat(getComputedStyle(grid).gap) || 5)));
        const wrapWidth = Math.max(260, wrap.clientWidth);
        const wrapHeight = Math.max(220, wrap.clientHeight);
        const compactNarrow = window.innerWidth < 900;
        const entityCol = compactNarrow
          ? clamp(Math.round(wrapWidth * 0.243), window.innerWidth < 520 ? 140 : 153, window.innerWidth < 520 ? 184 : 198)
          : clamp(Math.round(wrapWidth * 0.27), 170, 220);
        const answerCol = Math.max(window.innerWidth < 520 ? 108 : 120, Math.floor((wrapWidth - entityCol - gap * 4) / 4) + 16);
        const headerRow = clamp(Math.round(wrapHeight * 0.1), window.innerWidth < 520 ? 46 : 42, window.innerWidth < 520 ? 56 : 54);
        const entityRow = Math.max(window.innerWidth < 520 ? 104 : 98, Math.floor((wrapHeight - headerRow - gap * 4) / 4) + 14);
        const rowFont = clamp(entityRow / 104, 0.86, 1.08);
        grid.style.setProperty("--table-gap", gap + "px");
        grid.style.setProperty("--table-pad", Math.max(4, Math.round(6 * rowFont)) + "px");
        grid.style.setProperty("--cell-pad", Math.max(4, Math.round(5 * rowFont)) + "px " + Math.max(5, Math.round(7 * rowFont)) + "px");
        grid.style.setProperty("--cell-min-height", Math.max(46, entityRow - 14) + "px");
        grid.style.setProperty("--icon-size", clamp(Math.round(entityRow * (compactNarrow ? 0.36 : 0.42)), 26, compactNarrow ? 40 : 46) + "px");
        grid.style.setProperty("--table-header-font", clamp(headerRow / 52, 0.96, 1.16).toFixed(2) + "rem");
        grid.style.setProperty("--entity-name-font", clamp(rowFont * 1.04, 0.96, 1.14).toFixed(2) + "rem");
        grid.style.setProperty("--entity-title-font", clamp(rowFont * 0.9, 0.82, 1).toFixed(2) + "rem");
        grid.style.setProperty("--cell-font", clamp(rowFont * 1.04, 0.96, 1.14).toFixed(2) + "rem");
        grid.style.setProperty("--option-font", clamp(rowFont * 1.08, 1, 1.18).toFixed(2) + "rem");
        grid.style.gridTemplateColumns = entityCol + "px repeat(" + categories.length + ", " + answerCol + "px)";
        grid.style.gridTemplateRows = headerRow + "px repeat(" + entities.length + ", " + entityRow + "px)";
      }

      function getGameSubtitle() {
        const total = getTotalCells(currentCase);
        const done = progress.correctCells.length;
        const percent = total ? Math.round(done / total * 100) : 0;
        return "档案完成度：" + done + "/" + total + "；调查进度：" + percent + "%；错误：" + progress.errors + "；提示：" + progress.hints + "；用时：" + formatElapsed();
      }

      function positionInlinePanels() {
        const panels = app.querySelectorAll(".inline-options");
        if (!panels.length) return;
        panels.forEach((panel) => {
          const holder = panel.classList.contains("archive-inline-options")
            ? [...app.querySelectorAll(".answer-cell-wrap")].find((node) => node.dataset.cellId === panel.dataset.panelCell)
            : panel.closest(".answer-cell-wrap");
          if (!holder) return;
          const rect = holder.getBoundingClientRect();
          const desktopInline = isDesktopHoverMode();
          const archivePanel = panel.closest(".archive-panel");
          const archiveRect = archivePanel ? archivePanel.getBoundingClientRect() : { left: 0, top: 0, right: window.innerWidth, bottom: window.innerHeight };
          const tableWrap = archivePanel && archivePanel.querySelector(".table-wrap");
          const tableRect = tableWrap ? tableWrap.getBoundingClientRect() : archiveRect;
          const stickyEntity = archivePanel && archivePanel.querySelector(".entity-cell");
          const stickyRect = isCompactArchiveMode() && stickyEntity ? stickyEntity.getBoundingClientRect() : null;
          const sideInset = 8;
          const minLeftViewport = isCompactArchiveMode() ? Math.min(window.innerWidth - 180, (stickyRect ? stickyRect.right : archiveRect.left) + sideInset) : sideInset;
          const maxRightViewport = Math.min(window.innerWidth - sideInset, archiveRect.right - sideInset);
          const desiredWidth = window.innerWidth < 780
            ? Math.min(window.innerWidth - minLeftViewport - sideInset, 360)
            : Math.min(440, Math.max(280, Math.min(380, window.innerWidth * 0.42)));
          const minWidth = isCompactArchiveMode() ? Math.min(220, Math.max(180, maxRightViewport - minLeftViewport)) : 220;
          const width = Math.max(minWidth, Math.min(desiredWidth, Math.max(minWidth, maxRightViewport - minLeftViewport)));
          panel.style.setProperty("--option-width", width + "px");
          const panelHeight = Math.max(96, Math.round(panel.getBoundingClientRect().height || panel.offsetHeight || 120));
          let left = rect.left + rect.width / 2 - width / 2;
          let top = rect.top - panelHeight - 6;
          if (panel.classList.contains("archive-inline-options")) {
            const minTopViewport = tableRect.top + 4;
            const maxTopViewport = Math.max(minTopViewport, archiveRect.bottom - panelHeight - 8);
            left = clamp(left, minLeftViewport, Math.max(minLeftViewport, maxRightViewport - width));
            top = clamp(top, minTopViewport, maxTopViewport);
            left -= archiveRect.left;
            top -= archiveRect.top;
          } else if (desktopInline) {
            left = clamp(rect.width / 2 - width / 2, 8 - rect.left, Math.max(8 - rect.left, window.innerWidth - width - 8 - rect.left));
            top = rect.top - panelHeight - 6 >= 8 ? -panelHeight - 6 : rect.height + 6;
            top = clamp(top, 8 - rect.top, Math.max(8 - rect.top, window.innerHeight - panelHeight - 8 - rect.top));
          } else {
            const fallbackTop = rect.bottom + 6;
            left = clamp(left, 8, Math.max(8, window.innerWidth - width - 8));
            top = clamp(top >= 8 ? top : fallbackTop, 8, Math.max(8, window.innerHeight - panelHeight - 8));
          }
          panel.style.setProperty("--option-left", left + "px");
          panel.style.setProperty("--option-top", top + "px");
        });
      }

      }

      function renderAnswerCell(entity, category, entityIndex, categoryIndex) {
        const holder = createEl("div", "table-cell answer-cell-wrap");
        const id = cellId(entity.id, category.id);
        holder.dataset.cellId = id;
        holder.dataset.entityId = entity.id;
        holder.dataset.categoryId = category.id;
        const isOpen = selectedCell && selectedCell.entityId === entity.id && selectedCell.categoryId === category.id;
        if (isOpen) holder.classList.add("open");
        if (categoryIndex <= 1) holder.classList.add("align-left");
        if (categoryIndex >= Math.max(0, getOrderedCategories().length - 2)) holder.classList.add("align-right");
        if (highlight.cells.has(id)) holder.classList.add("highlight-cell");
        if (highlight.entities.has(entity.id)) holder.classList.add("highlight-row");
        if (highlight.categories.has(category.id)) holder.classList.add("highlight-col");
        const correct = progress.correctCells.includes(id);
        const label = correct ? "✓ " + getOptionLabel(category.id, currentCase.solution[entity.id][category.id]) : "";
        const ariaText = correct ? label : "点击调查";
        let activationInput = "";
        const cellButton = button(label, correct ? "cell correct" : "cell empty", (event) => {
          event.stopPropagation();
          if (correct) return;
          if (activationInput === "mouse" || activationInput === "keyboard") return;
          if (activationInput === "touch" || activationInput === "pen" || isCompactArchiveMode()) openOptionModal(entity.id, category.id);
        }, { disabled: correct, ariaLabel: getEntityDisplayName(entity, entityIndex) + "，" + (category.label || "") + "，" + ariaText });
        cellButton.addEventListener("pointerdown", (event) => {
          activationInput = event.pointerType || "";
        });
        cellButton.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") activationInput = "keyboard";
        });
        if (!correct) {
          holder.addEventListener("pointerenter", (event) => {
            if (canUseInlineHoverEvent(event)) openInlineHover(holder, event.pointerType === "mouse");
          });
          holder.addEventListener("pointerleave", (event) => {
            if (canUseInlineHoverEvent(event)) scheduleInlineHoverClose(holder);
          });
          holder.addEventListener("focusin", () => openInlineHover(holder));
          holder.addEventListener("focusout", (event) => {
            if (!holder.contains(event.relatedTarget)) scheduleInlineHoverClose(holder, 120);
          });
        }
        if (correct) cellButton.setAttribute("aria-pressed", "true");
        holder.append(cellButton);
        return holder;

      function renderInlineOptions(entity, category, errorMessage) {

      function refreshAnswerCell(entityId, categoryId) {
        const targetId = cellId(entityId, categoryId);

        const categoryIndex = getOrderedCategories().findIndex((item) => item.id === categoryId);
        holder.replaceWith(renderAnswerCell(entity, category, Math.max(0, entityIndex), Math.max(0, categoryIndex)));

      function renderClueArea() {
        const panel = createEl("div", "panel clue-panel");
        const head = createEl("div", "section-head");
        head.append(createEl("h2", "", "证据桌"));
        const stats = createEl("div", "actions end");

        head.append(stats);
