<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>课堂档案推理游戏引擎｜侦探调查局版</title>
  <style>
    :root {
      --ink: #172033;
      --ink-soft: #26344f;
      --muted: #574c43;
      --panel: rgba(255, 249, 237, 0.94);
      --panel-solid: #fff9ed;
      --line: rgba(70, 61, 56, 0.24);
      --shadow: 0 18px 42px rgba(12, 18, 33, 0.24);
      --navy: #17233c;
      --navy-2: #26344f;
      --wine: #8c3b4a;
      --brass: #c79a4b;
      --parchment: #f4e7c5;
      --cream: #fff9ed;
      --brown: #463d38;
      --teal: #3c8d87;
      --green: #287a5b;
      --red: #b64242;
      --amber: #8d6318;
      --focus: #c79a4b;
      --radius: 8px;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 18%, rgba(199, 154, 75, 0.23), transparent 28%),
        radial-gradient(circle at 86% 14%, rgba(60, 141, 135, 0.24), transparent 30%),
        radial-gradient(circle at 14% 84%, rgba(140, 59, 74, 0.18), transparent 30%),
        linear-gradient(135deg, #111a30 0%, #1b2a45 46%, #463d38 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: -25%;
      z-index: 0;
      pointer-events: none;
      background:
        linear-gradient(120deg, transparent 24%, rgba(244, 231, 197, 0.15) 39%, transparent 54%),
        linear-gradient(rgba(244, 231, 197, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(244, 231, 197, 0.08) 1px, transparent 1px),
        radial-gradient(circle at 20% 50%, rgba(255, 249, 237, 0.12), transparent 28%);
      background-size: 48rem 48rem, 3rem 3rem, 3rem 3rem, 42rem 42rem;
      animation: driftWash 22s linear infinite;
      opacity: 0.9;
    }

    body::after {
      content: "CASE  FILE  EVIDENCE  01  07  13";
      position: fixed;
      inset: auto -10% 6% -10%;
      z-index: 0;
      pointer-events: none;
      color: rgba(244, 231, 197, 0.08);
      font-weight: 900;
      font-size: clamp(2.3rem, 9vw, 7rem);
      letter-spacing: 0.12em;
      white-space: nowrap;
      transform: rotate(-7deg);
      animation: caseCodes 30s linear infinite alternate;
    }

    @keyframes driftWash {
      from { transform: translate3d(-2%, -2%, 0); }
      to { transform: translate3d(2%, 2%, 0); }
    }

    @keyframes caseCodes {
      from { transform: translateX(-5%) rotate(-7deg); }
      to { transform: translateX(5%) rotate(-7deg); }
    }

    #bgCanvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #app {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      padding: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
    }

    .page {
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
      animation: pageIn 240ms ease;
    }

    @keyframes pageIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .single {
      grid-template-rows: 1fr;
      align-items: center;
      justify-items: center;
    }

    .shell {
      width: min(1180px, 100%);
      height: 100%;
      min-height: 0;
      min-width: 0;
      margin: 0 auto;
      display: grid;
      gap: 10px;
    }

    .center-shell {
      width: min(980px, 100%);
      height: min(760px, 100%);
      margin: 0 auto;
      display: grid;
      align-content: center;
      gap: 12px;
    }

    .topbar,
    .panel,
    .modal-card,
    .toast-card {
      background: var(--panel);
      border: 1px solid rgba(199, 154, 75, 0.38);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      border-radius: var(--radius);
    }

    .topbar {
      min-height: 58px;
      padding: 9px 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      background:
        linear-gradient(135deg, rgba(23, 35, 60, 0.96), rgba(38, 52, 79, 0.94)),
        repeating-linear-gradient(90deg, rgba(199, 154, 75, 0.18) 0 1px, transparent 1px 14px);
      border-color: rgba(199, 154, 75, 0.5);
      position: relative;
      overflow: hidden;
    }

    .topbar::before {
      content: "调查局";
      position: absolute;
      right: 12px;
      bottom: -10px;
      color: rgba(244, 231, 197, 0.12);
      font-weight: 1000;
      font-size: 2.7rem;
      letter-spacing: 0.06em;
      pointer-events: none;
    }

    .top-title {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(1.35rem, 3vw, 2.2rem);
      line-height: 1.14;
      color: var(--navy);
      letter-spacing: 0;
    }

    h2 {
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.2;
      color: var(--navy);
      letter-spacing: 0;
    }

    h3 {
      font-size: clamp(0.92rem, 1.3vw, 1.05rem);
      line-height: 1.25;
      letter-spacing: 0;
    }

    .topbar h1 {
      color: var(--cream);
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.28);
    }

    .topbar .subtle {
      color: #f4e7c5;
    }

    .subtle {
      color: var(--muted);
      font-size: clamp(0.78rem, 1.2vw, 0.92rem);
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .panel {
      min-height: 0;
      min-width: 0;
      padding: 12px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 249, 237, 0.96), rgba(244, 231, 197, 0.9)),
        repeating-linear-gradient(0deg, rgba(70, 61, 56, 0.04) 0 1px, transparent 1px 22px);
      position: relative;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 6px;
      background: linear-gradient(var(--brass), var(--wine));
      opacity: 0.88;
      pointer-events: none;
    }

    .stack {
      display: grid;
      gap: 10px;
      min-height: 0;
    }

    .two-col {
      display: grid;
      grid-template-columns: minmax(0, 0.85fr) minmax(0, 1.15fr);
      gap: 10px;
      min-height: 0;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .actions.end {
      justify-content: flex-end;
    }

    button,
    .file-button {
      position: relative;
      min-height: 44px;
      min-width: 44px;
      border: 0;
      border-radius: 8px;
      padding: 9px 13px;
      color: var(--navy);
      background: #fff9ed;
      border: 1px solid rgba(70, 61, 56, 0.28);
      box-shadow: 0 5px 0 rgba(70, 61, 56, 0.16), 0 10px 18px rgba(12, 18, 33, 0.11);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
      overflow-wrap: anywhere;
      text-align: center;
      overflow: hidden;
      isolation: isolate;
    }

    button::after,
    .file-button::after {
      content: "";
      position: absolute;
      inset: 50%;
      width: 0;
      height: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.32);
      transform: translate(-50%, -50%);
      opacity: 0;
      pointer-events: none;
      transition: width 160ms ease, height 160ms ease, opacity 180ms ease;
      z-index: 0;
    }

    button:active:not(:disabled)::after,
    .file-button:active::after {
      width: 140%;
      height: 180%;
      opacity: 1;
    }

    button:hover,
    .file-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 0 rgba(70, 61, 56, 0.16), 0 14px 22px rgba(12, 18, 33, 0.18);
    }

    button:active,
    .file-button:active {
      transform: scale(0.96);
      box-shadow: 0 2px 0 rgba(70, 61, 56, 0.16), 0 5px 10px rgba(12, 18, 33, 0.11);
    }

    button:focus-visible,
    textarea:focus-visible,
    input:focus-visible,
    .file-button:focus-visible,
    .cell:focus-visible,
    .clue-card:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 3px;
    }

    button:disabled {
      opacity: 0.48;
      cursor: not-allowed;
      transform: none;
    }

    .primary {
      background: linear-gradient(135deg, #c79a4b, #f4d083);
      color: #172033;
      border-color: rgba(70, 61, 56, 0.42);
    }

    .secondary {
      background: linear-gradient(135deg, #3c8d87, #6db7ad);
      color: #fff9ed;
      border-color: rgba(23, 35, 60, 0.34);
    }

    .danger {
      background: #ffe9df;
      color: #7c2020;
      border-color: rgba(182, 66, 66, 0.42);
    }

    .ghost {
      background: rgba(255, 249, 237, 0.82);
    }

    .tiny {
      min-height: 34px;
      padding: 6px 9px;
      font-size: 0.82rem;
      font-weight: 700;
    }

    .icon-button {
      width: 44px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      font-weight: 900;
    }

    input[type="file"] {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      height: 28dvh;
      max-height: 270px;
      resize: none;
      border-radius: 8px;
      padding: 12px;
      color: var(--ink);
      background:
        linear-gradient(rgba(255, 249, 237, 0.94), rgba(255, 249, 237, 0.94)),
        repeating-linear-gradient(0deg, transparent 0 23px, rgba(70, 61, 56, 0.12) 23px 24px);
      border: 1px solid rgba(70, 61, 56, 0.3);
      font: 600 0.9rem/1.5 ui-monospace, "SFMono-Regular", Consolas, monospace;
      overflow: hidden;
    }

    .notice {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      padding: 9px 11px;
      border-radius: 8px;
      color: #243044;
      background: rgba(255, 249, 237, 0.76);
      border: 1px solid rgba(70, 61, 56, 0.22);
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .notice.success {
      background: #e7f7ee;
      color: #164b36;
      border-color: rgba(40, 122, 91, 0.42);
    }

    .notice.error {
      background: #ffe7e4;
      color: #7c2020;
      border-color: rgba(182, 66, 66, 0.42);
    }

    .notice.warn {
      background: #fff0c9;
      color: #5a3b0f;
      border-color: rgba(199, 154, 75, 0.46);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 28px;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(66, 84, 115, 0.16);
      color: var(--navy);
      background: rgba(244, 231, 197, 0.78);
      font-size: 0.78rem;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .pill.used {
      background: #e3ded4;
      color: #26344f;
    }

    .pill.partial {
      background: #fff0c9;
      color: #5a3b0f;
    }

    .pill.visible {
      background: #dff3ef;
      color: #1d5651;
    }

    .pill.new {
      background: #17233c;
      color: #fff9ed;
      border-color: rgba(199, 154, 75, 0.58);
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 10px;
      min-height: 0;
      align-content: start;
      overflow: auto;
      overscroll-behavior: contain;
      padding: 2px 4px 8px 2px;
    }

    .item-card {
      min-height: 0;
      border-radius: 8px;
      padding: 11px;
      background:
        linear-gradient(135deg, rgba(255, 249, 237, 0.92), rgba(244, 231, 197, 0.78));
      border: 1px solid rgba(70, 61, 56, 0.22);
      display: grid;
      gap: 7px;
      align-content: start;
      overflow: visible;
      position: relative;
    }

    .item-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 18px;
      width: 72px;
      height: 8px;
      border-radius: 0 0 6px 6px;
      background: var(--brass);
      opacity: 0.82;
      pointer-events: none;
    }

    .item-card p,
    .text-card p,
    .result-cell,
    .entity-name,
    .cell {
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .item-card h3 {
      overflow-wrap: anywhere;
      word-break: break-word;
      font-size: clamp(1rem, 1.4vw, 1.16rem);
      line-height: 1.24;
    }

    .case-lobby-page .panel.stack {
      grid-template-rows: auto minmax(0, 1fr) auto;
    }

    .case-lobby-page .card-grid {
      min-height: 0;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    }

    .case-lobby-page .item-card {
      min-height: 150px;
      gap: 9px;
      padding: 14px;
    }

    .case-lobby-page .item-card .subtle,
    .case-lobby-page .item-card .notice {
      font-size: clamp(0.9rem, 1.25vw, 1.04rem);
      line-height: 1.35;
    }

    .case-lobby-page .item-card button {
      min-height: 46px;
      font-size: clamp(0.9rem, 1.2vw, 1.04rem);
    }

    .case-lobby-grid,
    .intro-narrative-card {
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .local-switch-out {
      opacity: 0;
      transform: translateY(6px);
    }

    .local-switch-in {
      animation: localSwitchIn 190ms ease both;
    }

    @keyframes localSwitchIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .validation-page .panel.stack {
      grid-template-rows: auto auto;
      align-content: start;
      overflow-y: auto;
      overflow-x: hidden;
      overscroll-behavior: contain;
    }

    .validation-layout {
      min-height: 0;
      height: auto;
      overflow: visible;
      align-content: start;
      gap: 12px;
    }

    .validation-check-pane,
    .validation-data-pane {
      min-height: 0;
      overflow: visible;
      overscroll-behavior: contain;
      padding: 9px;
      align-content: start;
      border-radius: 10px;
      border: 1px solid rgba(70, 61, 56, 0.2);
      background: #fff9ed;
      contain: paint;
    }

    .validation-data-pane .item-card,
    .validation-data-pane .notice {
      flex-shrink: 0;
    }

    .intro-page .panel.stack {
      gap: 8px;
      overflow: hidden;
    }

    .intro-page h2 {
      font-size: clamp(1.34rem, 2.5vw, 1.95rem);
      line-height: 1.18;
      overflow-wrap: anywhere;
    }

    .intro-page .item-card {
      padding: 9px;
      gap: 6px;
    }

    .intro-page .item-card .subtle {
      color: var(--ink);
      font-size: clamp(1.16rem, 1.85vw, 1.42rem);
      line-height: 1.42;
    }

    .intro-page .result-grid {
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 6px;
    }

    .intro-page .result-cell {
      min-height: 74px;
      padding: 7px;
    }

    .intro-page .result-label {
      font-size: clamp(1rem, 1.35vw, 1.14rem);
    }

    .intro-page .result-value {
      font-size: clamp(1.2rem, 1.7vw, 1.42rem);
    }

    .intro-page .actions button {
      min-height: 50px;
      font-size: clamp(0.98rem, 1.45vw, 1.16rem);
    }

    .pager {
      min-height: 44px;
      display: flex;
      gap: 8px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }

    .page-label {
      min-width: 72px;
      text-align: center;
      color: var(--ink-soft);
      font-weight: 800;
      font-size: 0.86rem;
    }

    .validation-list {
      display: grid;
      gap: 3px;
      min-height: 0;
      max-height: none;
      overflow: visible;
      overscroll-behavior: contain;
    }

    .validation-report-body {
      display: block;
      min-height: 0;
      max-height: 2200px;
      overflow: hidden;
      visibility: visible;
      transition: max-height 220ms ease, margin-top 180ms ease;
      margin-top: 7px;
      border-radius: 8px;
      background: #fff9ed;
      contain: paint;
    }

    .validation-report-body-inner {
      min-height: 0;
      overflow: hidden;
      background: #fff9ed;
    }

    .validation-check-pane.validation-collapsed .validation-report-body {
      max-height: 0;
      visibility: hidden;
      margin-top: 0;
      pointer-events: none;
    }

    .validation-report-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }

    .validation-report-head h2 {
      min-width: 0;
      font-size: clamp(1rem, 1.35vw, 1.18rem);
    }

    .validation-report-toggle {
      display: inline-flex;
      flex: 0 0 auto;
      min-height: 36px;
      white-space: nowrap;
    }

    .validation-collapsed-note {
      display: none;
    }

    .validation-item {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 5px;
      align-items: start;
      min-height: 24px;
      padding: 3px 6px;
      border-radius: 8px;
      background: #fff9ed;
      border: 1px solid rgba(70, 61, 56, 0.18);
      line-height: 1.16;
      font-size: clamp(0.72rem, 0.95vw, 0.84rem);
      overflow: hidden;
    }

    .validation-item .pill {
      min-height: 22px;
      padding: 2px 6px;
      font-size: clamp(0.66rem, 0.85vw, 0.76rem);
      line-height: 1.05;
    }

    .validation-data-pane {
      font-size: clamp(1.02rem, 1.35vw, 1.22rem);
    }

    .validation-data-pane .result-value {
      font-size: clamp(1.05rem, 1.45vw, 1.26rem);
    }

    .game-layout {
      height: 100%;
      min-height: 0;
      min-width: 0;
      display: grid;
      grid-template-rows: minmax(0, 3fr) minmax(0, 1fr);
      gap: 10px;
    }

    .section-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 8px;
    }

    .table-wrap {
      height: calc(100% - 44px);
      min-height: 0;
      display: grid;
      grid-template-rows: 1fr;
      gap: 8px;
      overflow: auto;
      overscroll-behavior: contain;
    }

    .archive-grid {
      min-height: 0;
      height: 100%;
      display: grid;
      gap: var(--table-gap, 6px);
      overflow: visible;
    }

    .table-cell {
      min-width: 0;
      min-height: 0;
      border-radius: 8px;
      border: 1px solid rgba(70, 61, 56, 0.22);
      background: rgba(255, 249, 237, 0.82);
      padding: var(--table-pad, 7px);
      display: grid;
      align-items: center;
      justify-items: stretch;
      overflow: hidden;
      color: var(--navy);
      box-sizing: border-box;
    }

    .table-cell.header {
      background: linear-gradient(135deg, rgba(23, 35, 60, 0.96), rgba(38, 52, 79, 0.92));
      font-weight: 900;
      text-align: center;
      color: #fff9ed;
      font-size: var(--table-header-font, clamp(0.82rem, 1.35vw, 1.06rem));
      line-height: 1.18;
    }

    .archive-scroll-mode .table-wrap {
      display: block;
      width: 100%;
      max-width: 100%;
      overflow: auto;
      overscroll-behavior: contain;
      scrollbar-gutter: stable;
      padding-bottom: 2px;
    }

    .archive-panel:not(.archive-scroll-mode) .table-wrap {
      overflow: auto;
      overscroll-behavior: contain;
      padding-bottom: 2px;
    }

    .archive-scroll-mode .table-wrap::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    .archive-scroll-mode .table-wrap::-webkit-scrollbar-track {
      background: rgba(70, 61, 56, 0.12);
      border-radius: 999px;
    }

    .archive-scroll-mode .table-wrap::-webkit-scrollbar-thumb {
      background: rgba(199, 154, 75, 0.72);
      border-radius: 999px;
      border: 2px solid rgba(244, 231, 197, 0.85);
    }

    .archive-scroll-mode .archive-grid {
      width: max-content;
      min-width: 100%;
      height: max-content;
      min-height: 100%;
      align-content: start;
    }

    .archive-scroll-mode .table-cell.header,
    .archive-scroll-mode .entity-cell {
      position: sticky;
      background-clip: padding-box;
    }

    .archive-scroll-mode .table-cell.header {
      top: 0;
      z-index: 30;
    }

    .archive-scroll-mode .category-header {
      top: 0;
      z-index: 30;
    }

    .archive-scroll-mode .entity-cell {
      left: 0;
      z-index: 40;
      background:
        linear-gradient(90deg, rgba(244, 231, 197, 0.98), rgba(255, 249, 237, 0.96));
    }

    .archive-scroll-mode .table-cell.header.corner-cell {
      left: 0;

      textarea {
        height: 20dvh;
        min-height: 120px;
      }

      .panel {
        padding: 9px;
      }

      .entity-cell {
        grid-template-columns: auto minmax(0, 1fr);
      }

      .entity-cell .tiny {
        grid-column: 1 / -1;
        min-height: 34px;
      }

      .card-grid,
      .option-grid {

      }

      .case-lobby-page .card-grid {

      }

      .case-lobby-page .item-card {
        min-height: auto;
        padding: 14px;
      }

      .case-lobby-page .item-card h3 {
        font-size: clamp(1.12rem, 4.2vw, 1.34rem);
      }

      .case-lobby-page .item-card .subtle,
      .case-lobby-page .item-card .notice {
        font-size: clamp(0.98rem, 3.4vw, 1.12rem);
      }

      .case-lobby-page .item-card button {
        min-height: 50px;
        font-size: clamp(1rem, 3.4vw, 1.16rem);
      }

      .intro-page h2 {
        font-size: clamp(1.42rem, 5vw, 1.78rem);
      }

      .intro-page .item-card .subtle {
        font-size: clamp(1.05rem, 3.8vw, 1.24rem);
      }

      .intro-page .result-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));

      .intro-page .result-label {
        font-size: clamp(0.92rem, 3.2vw, 1.06rem);
      }

      .intro-page .result-value {
        font-size: clamp(1.08rem, 3.7vw, 1.28rem);

      .table-cell {
        padding: 5px;

      .game-page .topbar {
        min-height: 0;
        padding: 6px 8px;
        gap: 5px;
      }

      .game-page .topbar h1 {
        font-size: clamp(1.28rem, 4.8vw, 1.72rem);
        line-height: 1.08;
      }

      .game-page .topbar .subtle {
        font-size: clamp(0.78rem, 2.6vw, 0.95rem);
        line-height: 1.18;
      }

      .game-page .topbar .actions.end {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 6px;
        justify-content: stretch;
      }

      .game-page .topbar .actions.end button {
        min-height: 34px;
        padding: 5px 6px;
        line-height: 1.08;
        flex: 0 1 auto;
      }

      .clue-panel .section-head {
        grid-template-columns: minmax(0, 1fr) auto;
        min-height: 24px;
        margin-bottom: 2px;
        gap: 4px;
      }

      .clue-panel .section-head h2 {

        white-space: nowrap;
      }

      .clue-panel .actions.end {
        display: flex;
        flex-wrap: nowrap;
        justify-content: flex-end;
        gap: 3px;
      }

      .clue-panel .pill {
        padding: 2px 5px;
        font-size: clamp(0.62rem, 2.25vw, 0.76rem);
        line-height: 1;
