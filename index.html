      function setCluePage(next, totalPages) {
        cluePage = clamp(next, 0, Math.max(0, totalPages - 1));
        if (progress) {
          progress.cluePage = cluePage;
          progress.clueScrollLeft = -1;
          saveProgress();
        }
        refreshGameView({ archive: false, clues: true });
      }

      function bindClueScroll(scroll, totalPages) {
        let startX = 0;
        let startLeft = 0;
        let tracking = false;
        let moved = false;
        let saveTimer = 0;
        scroll.addEventListener("pointerdown", (event) => {
          if (event.button !== undefined && event.button !== 0) return;
          tracking = true;
          moved = false;
          startX = event.clientX;
          startLeft = scroll.scrollLeft;
          scroll.classList.add("dragging");
          if (scroll.setPointerCapture) scroll.setPointerCapture(event.pointerId);
        });
        scroll.addEventListener("pointermove", (event) => {
          if (!tracking) return;
          const delta = event.clientX - startX;
          if (Math.abs(delta) > 3) moved = true;
          if (moved) {
            scroll.scrollLeft = startLeft - delta;
            event.preventDefault();
          }
        });
        scroll.addEventListener("pointerup", (event) => {
          if (!tracking) return;
          tracking = false;
          scroll.classList.remove("dragging");
          saveClueScrollPosition(scroll, totalPages);
          if (moved) {
            scroll.dataset.dragged = "true";
            window.setTimeout(() => delete scroll.dataset.dragged, 80);
          }
        });
        scroll.addEventListener("pointercancel", () => {
          tracking = false;
          scroll.classList.remove("dragging");
        });
        scroll.addEventListener("click", (event) => {
          if (scroll.dataset.dragged === "true") {
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);
        scroll.addEventListener("scroll", () => {
          updateClueScrollIndicator(scroll, totalPages);
          clearTimeout(saveTimer);
          saveTimer = window.setTimeout(() => saveClueScrollPosition(scroll, totalPages), 180);
        });
      }

      function restoreClueScroll(scroll, totalPages) {
        window.requestAnimationFrame(() => {
          const savedLeft = progress && Number.isFinite(Number(progress.clueScrollLeft)) ? Number(progress.clueScrollLeft) : 0;
          scroll.scrollLeft = savedLeft >= 0 ? savedLeft : cluePage * scroll.clientWidth;
          updateClueScrollIndicator(scroll, totalPages);
        });
      }

      function saveClueScrollPosition(scroll, totalPages) {
        if (!progress) return;
        progress.clueScrollLeft = scroll.scrollLeft;
        progress.cluePage = clamp(getCluePageFromScroll(scroll), 0, Math.max(0, totalPages - 1));
        cluePage = progress.cluePage;
        updateClueScrollIndicator(scroll, totalPages);
        saveProgress();
      }

      function updateClueScrollIndicator(scroll, totalPages) {
        const page = clamp(getCluePageFromScroll(scroll), 0, Math.max(0, totalPages - 1));
        cluePage = page;
        const label = app.querySelector("[data-clue-scroll-page='true']");
        if (label) label.textContent = "第" + (page + 1) + "/" + totalPages + "组";
      }

      function getDisplayClues() {
        return (currentCase.clues || [])
          .filter((clue) => progress.clueStatus[clue.id] !== "hidden")
          .sort(compareDisplayClues);
      }

      function compareDisplayClues(a, b) {
        const statusRank = { used: 0, partial: 1, visible: 1 };
        const sa = progress.clueStatus[a.id] || "hidden";
        const sb = progress.clueStatus[b.id] || "hidden";
        if (statusRank[sa] !== statusRank[sb]) return statusRank[sa] - statusRank[sb];
        return compareCluePriority(a, b);
      }

      function compareCluePriority(a, b) {
        const pa = Number.isFinite(Number(a.priority)) ? Number(a.priority) : 0;
        const pb = Number.isFinite(Number(b.priority)) ? Number(b.priority) : 0;
        if (pa !== pb) return pa - pb;
        return getClueIndex(a.id) - getClueIndex(b.id);
      }

      function getClueIndex(id) {
        return (currentCase && currentCase.clues ? currentCase.clues : []).findIndex((clue) => clue.id === id);
      }

      function setCluePageForClue(clueId) {
        const clues = getDisplayClues();
        const index = clues.findIndex((clue) => clue.id === clueId);
        if (index < 0) return;
        cluePage = Math.floor(index / getCluePageSize());
        if (progress) {
          progress.cluePage = cluePage;
          progress.clueScrollLeft = -1;
        }
      }

      function renderClueCard(clue) {
        const status = progress.clueStatus[clue.id] || "hidden";
        const card = createEl("article", "clue-card " + status + (newClueIds.has(clue.id) ? " new" : ""));
        card.append(createEl("span", "clue-text", clue.text || ""));
        return card;
      }

      function focusRelatedCells(clue) {
        clearTimeout(highlight.timer);
        highlight.cells = new Set(Array.isArray(clue.relatedCells) ? clue.relatedCells : []);
        highlight.entities = new Set();
        highlight.categories = new Set();
        highlight.cells.forEach((id) => {
          const parts = splitCellId(id);
          if (parts) {
            highlight.entities.add(parts.entityId);
            highlight.categories.add(parts.categoryId);
          }
        });
        highlight.timer = window.setTimeout(() => {
          highlight.cells.clear();
          highlight.entities.clear();
          highlight.categories.clear();
          if (view === "game") refreshGameView();
        }, HIGHLIGHT_DURATION);
        playSound("clue");
        refreshGameView();
      }

      function openOptionModal(entityId, categoryId) {
        if (!progress || progress.failed || progress.completed) return;
        const previous = selectedCell ? { entityId: selectedCell.entityId, categoryId: selectedCell.categoryId } : null;
        selectedCell = { entityId, categoryId, errorMessage: "" };
        optionPage = 0;
        lastFocused = document.activeElement;
        playSound("openOption");
        if (previous) refreshAnswerCell(previous.entityId, previous.categoryId);
        refreshAnswerCell(entityId, categoryId);
        showInlineOptions(entityId, categoryId, "");
      }

      // 答案验证：正确后填入并锁定，错误时不写入格子。
      function verifyAnswer(entityId, categoryId, optionId) {
        if (!progress || progress.failed || progress.completed) return;
        const expected = currentCase.solution && currentCase.solution[entityId] && currentCase.solution[entityId][categoryId];
        if (expected === optionId) {
          const id = cellId(entityId, categoryId);
          if (!progress.correctCells.includes(id)) progress.correctCells.push(id);
          updateEntityRevealState();
          updateClueStates();
          checkStoryEvents();
          selectedCell = null;
          removeInlineOptions();
          saveProgress();
          playSound("success");
          refreshAnswerCellsForCategory(categoryId);
          updateEntityIdentityDisplay(entityId);
          refreshGameView({ archive: false, clues: true });
          updateGameTopbar();
          flashCell(id);
          if (progress.correctCells.length >= getTotalCells(currentCase)) completeCase();
        } else {
          progress.errors += 1;
          saveProgress();
          playSound("error");
          flashWrongOption(categoryId, optionId);
          if (progress.errors >= getFailureLimit()) {
            failCase();
            return;
          }
          selectedCell = { entityId, categoryId, errorMessage: "证据不吻合，请重新检查线索" };
          refreshAnswerCell(entityId, categoryId);
          showInlineOptions(entityId, categoryId, selectedCell.errorMessage);
          updateGameTopbar();
        }
      }

      function flashCell(id) {
        requestAnimationFrame(() => {
          const holder = [...app.querySelectorAll(".answer-cell-wrap")].find((node) => node.dataset.cellId === id);
          const node = holder && holder.querySelector(".cell.correct");
          if (!node) return;
          const original = node.textContent;
          node.textContent = "✓ 证据吻合";
          node.classList.add("flash-correct");
          setTimeout(() => {
            node.textContent = original;
            node.classList.remove("flash-correct");
          }, 700);
        });
      }

      function flashWrongOption(categoryId, optionId) {
        requestAnimationFrame(() => {
          const node = [...app.querySelectorAll(".inline-option")].find((btn) => btn.dataset.categoryId === categoryId && btn.dataset.optionId === optionId);
          if (!node) return;
          node.classList.add("wrong-flash");
          window.setTimeout(() => node.classList.remove("wrong-flash"), 680);
        });
      }

      // 线索状态：根据 completeAfter 和 unlockAfter 更新 visible、partial、used。
      function updateClueStates() {
        const correct = new Set(progress.correctCells);
        let changed = false;
        (currentCase.clues || []).forEach((clue) => {
          const status = progress.clueStatus[clue.id] || "hidden";
          if (status === "visible" || status === "partial") {
            const list = Array.isArray(clue.completeAfter) ? clue.completeAfter : [];
            if (list.length) {
              const count = list.filter((id) => correct.has(id)).length;
              const complete = matchCells(list, correct, clue.completeMode || "all");
              if (complete && status !== "used") {
                progress.clueStatus[clue.id] = "used";
                changed = true;
                playSound("clueUsed");
              } else if (count > 0 && !complete && status !== "partial") {
                progress.clueStatus[clue.id] = "partial";
                changed = true;
              }
            }
          }
        });
        if (normalizeClueActivity(currentCase, progress)) changed = true;
        if (changed) saveProgress();
      }

      function normalizeClueActivity(caseItem, state) {
        if (!caseItem || !state || !state.clueStatus) return false;
        const clues = caseItem.clues || [];
        const correct = new Set(state.correctCells || []);
        let changed = false;
        const active = clues.filter((clue) => {
          const status = state.clueStatus[clue.id] || "hidden";
          return status === "visible" || status === "partial";
        }).sort(compareCluePriority);
        while (active.length > MAX_ACTIVE_CLUES) {
          const clue = active.pop();
          if (!clue) break;
          state.clueStatus[clue.id] = "hidden";
          changed = true;
        }
        const activeCount = () => clues.filter((clue) => {
          const status = state.clueStatus[clue.id] || "hidden";
          return status === "visible" || status === "partial";
        }).length;
        const candidates = clues
          .filter((clue) => (state.clueStatus[clue.id] || "hidden") === "hidden" && isClueUnlocked(clue, correct))
          .sort(compareCluePriority);
        candidates.forEach((clue) => {
          if (activeCount() >= MAX_ACTIVE_CLUES) return;
          state.clueStatus[clue.id] = getUnlockedClueDisplayStatus(clue, correct);
          const liveUpdate = state === progress && view === "game";
          if (liveUpdate) {
            newClueIds.add(clue.id);
            setCluePageForClue(clue.id);
          }
          changed = true;
          if (liveUpdate) {
            playSound("newClue");
            window.setTimeout(() => {
              newClueIds.delete(clue.id);
              if (view === "game") refreshGameView({ archive: false, clues: true });
            }, 1800);
          }
        });
        return changed;
      }

      function getUnlockedClueDisplayStatus(clue, correct) {
        const list = Array.isArray(clue.completeAfter) ? clue.completeAfter : [];
        if (!list.length) return "visible";
        const complete = matchCells(list, correct, clue.completeMode || "all");
        if (complete) return "used";
        return list.some((id) => correct.has(id)) ? "partial" : "visible";
      }

      function isClueUnlocked(clue, correct) {
        if (clue.initial === true) return true;
        const list = Array.isArray(clue.unlockAfter) ? clue.unlockAfter : [];
        return list.length && matchCells(list, correct, clue.unlockMode || "all");
      }

      function matchCells(list, correct, mode) {
        if (!list.length) return false;
        return mode === "any" ? list.some((id) => correct.has(id)) : list.every((id) => correct.has(id));
      }

      function getClueProgressText(clue) {
        const list = Array.isArray(clue.completeAfter) ? clue.completeAfter : [];
        const count = list.filter((id) => progress.correctCells.includes(id)).length;
        return "进度 " + count + "/" + list.length + " 项";
      }

      // 剧情事件触发：只显示一次，不改变答案或线索。
      function checkStoryEvents() {
        const count = progress.correctCells.length;
        (currentCase.storyEvents || []).slice().sort((a, b) => Number(a.triggerAfterCorrectCells || 0) - Number(b.triggerAfterCorrectCells || 0)).forEach((eventItem) => {
          if (progress.storyEventsShown.includes(eventItem.id)) return;
          if (count >= Number(eventItem.triggerAfterCorrectCells)) {
            progress.storyEventsShown.push(eventItem.id);
            saveProgress();
            showStoryToast(eventItem.text || "");
          }
        });
      }

      function showStoryToast(text) {
        if (!text) return;
        clearTimeout(toastTimer);
        toastLayer.setAttribute("aria-hidden", "false");
        toastLayer.classList.add("open");
        clearNode(toastLayer);
        const card = createEl("div", "toast-card");
        const body = createEl("div", "stack");
        body.append(createEl("span", "pill new", "剧情进展"));
        body.append(createEl("p", "subtle", text));
        card.append(body, button("关闭", "tiny ghost", closeToast));
        toastLayer.append(card);
        playSound("story");
        toastTimer = window.setTimeout(closeToast, 5600);
      }

      function closeToast() {
        clearTimeout(toastTimer);
        toastLayer.classList.remove("open");
        toastLayer.setAttribute("aria-hidden", "true");
        clearNode(toastLayer);
      }

      function checkStalledClues() {
        if (!currentCase || !progress || progress.completed || progress.failed) return;
        if (progress.correctCells.length >= getTotalCells(currentCase)) return;
        const statuses = Object.values(progress.clueStatus || {});
        const hasActive = statuses.includes("visible") || statuses.includes("partial");
        const correct = new Set(progress.correctCells);
        const canUnlock = (currentCase.clues || []).some((clue) => {
          if (progress.clueStatus[clue.id] !== "hidden") return false;
          const list = Array.isArray(clue.unlockAfter) ? clue.unlockAfter : [];
          return list.some((id) => !correct.has(id));
        });
        if (!hasActive && !canUnlock) {
          showStoryToast("当前资料的线索流程无法继续，请教师检查资料包。");
        }
      }

      function useHint() {
        if (!currentCase || !progress || progress.failed || progress.completed) return;
        const maxHints = getMaxHints();
        if (progress.hints >= maxHints) {
          showStoryToast("提示次数已用完。");
          return;
        }
        const clue = getDisplayClues().find((item) => (progress.clueStatus[item.id] === "visible" || progress.clueStatus[item.id] === "partial") && Array.isArray(item.relatedCells) && item.relatedCells.length);
        if (!clue) {
          showStoryToast("当前没有可用于高亮的线索。");
          return;
        }
        progress.hints += 1;
        saveProgress();
        focusRelatedCells(clue);
      }

      function getFailureLimit() {
        return Math.max(1, Math.ceil(getTotalCells(currentCase) * 3 / 4));
      }

      function failCase() {
        progress.failed = true;
        progress.failedAt = Date.now();
        selectedCell = null;
        removeInlineOptions();
        saveProgress();
        renderFailure();
      }

      function renderFailure() {
        setPage("failure");
        closeToast();
        const page = createEl("section", "page");
        page.append(renderTopbar(currentCase && currentCase.title ? currentCase.title : "调查失败", "错误次数达到本案限制。", [
          soundToggle()
        ]));
        const shell = createEl("div", "center-shell");
        const card = createEl("div", "panel stack failure-card");
        card.append(createEl("div", "failure-title", "游戏失败"));
        card.append(createEl("p", "subtle", "请回到案件简报，重新整理线索后再开始调查。"));
        card.append(button("重新调查", "primary", () => {
          if (currentCase) resetCaseProgress(currentCase.id);
          progress = null;
          renderCaseIntro();
        }));
        shell.append(card);
        page.append(shell);
        app.replaceChildren(page);
      }

      function completeCase() {
        if (progress.failed) return;
        progress.completed = true;
        progress.completedAt = Date.now();
        saveProgress();
        playSound("complete");
        window.setTimeout(renderCompletion, 520);
      }

      function renderCompletion() {
        setPage("completion");
        closeToast();
        const page = createEl("section", "page completion-page");
        page.append(renderTopbar("结案报告", currentCase.title || "", [
          soundToggle(),
          button("案件大厅", "ghost", renderCaseLobby)
        ]));
        const shell = createEl("div", "shell");
        const panel = createEl("div", "panel stack");
        const hero = createEl("div", "completion-hero");
        hero.append(createEl("div", "completion-stamp", "调查完成"));
        const heroMain = createEl("div", "completion-hero-main");
        const stats = createEl("div", "completion-stats-grid");
        stats.append(labeledText("完成时间", formatDuration((progress.completedAt || Date.now()) - progress.startTime)));
        stats.append(labeledText("错误次数", String(progress.errors)));
        stats.append(labeledText("提示次数", String(progress.hints)));
        stats.append(labeledText("最终星级", getStarLevel()));
        const completionText = currentCase.narrative && currentCase.narrative.completion ? currentCase.narrative.completion : "";
        if (completionText) stats.append(labeledText("结案说明", completionText));
        if (completionText && stats.lastElementChild) stats.lastElementChild.classList.add("completion-note-cell");
        const completionNote = completionText ? stats.lastElementChild : null;
        if (completionNote) completionNote.remove();
        heroMain.append(stats);
        if (completionNote) heroMain.append(completionNote);
        hero.append(heroMain);
        panel.append(hero);

        panel.append(renderResultPage());

        const summary = normalizeSummary(currentCase.knowledgeSummary);
        if (summary.length) {
          const summaryCard = createEl("div", "item-card completion-section");
          summaryCard.append(createEl("h2", "", "课程重点知识"));
          const list = createEl("div", "summary-list");
          summary.forEach((line) => list.append(createEl("p", "summary-line", line)));
          summaryCard.append(list);
          panel.append(summaryCard);
        }

        const actions = createEl("div", "actions");
        const nextCase = getNextCase();
        actions.append(button("下一宗案件", "primary", () => openCaseIntro(nextCase.id), { disabled: !nextCase }));
        actions.append(button("返回案件大厅", "ghost", renderCaseLobby));
        actions.append(button("重新调查", "danger", () => {
          resetCaseProgress(currentCase.id);
          startCase();
        }));
        if (actions.lastElementChild) actions.lastElementChild.remove();
        panel.append(actions);
        shell.append(panel);
        page.append(shell);
        app.replaceChildren(page);
      }

      function renderResultPage() {
        const holder = createEl("div", "stack completion-section");
        holder.append(createEl("h2", "", "完整档案结果"));
        const rows = [];
        (currentCase.entities || []).forEach((entity) => {
          getOrderedCategories().forEach((category) => {
            rows.push({ entity, category, label: getOptionLabel(category.id, currentCase.solution[entity.id][category.id]) });
          });
        });
        const grid = createEl("div", "result-grid");
        rows.forEach((row) => {
          grid.append(labeledText((row.entity.name || row.entity.id) + " / " + (row.category.label || ""), row.label));
        });
        holder.append(grid);
        return holder;
      }

      function openEntityDetail(entityId) {
        const entity = getEntity(entityId);
        if (!entity) return;
        entityDetailPage = 0;
        lastFocused = document.activeElement;
        renderEntityModal(entity);
      }

      function renderEntityModal(entity) {
        modalLayer.setAttribute("aria-hidden", "false");
        modalLayer.classList.add("open");
        clearNode(modalLayer);
        const card = createEl("div", "modal-card");
        const head = createEl("div", "modal-head");
        const title = createEl("div", "stack");
        const top = createEl("div", "actions");
        top.append(makeIcon(entity, currentCase));
        const titleText = createEl("div", "stack");
        const entityIndex = (currentCase.entities || []).findIndex((item) => item.id === entity.id);
        const revealed = isEntityNameRevealed(entity.id);
        titleText.append(createEl("h2", "", getEntityDisplayName(entity, Math.max(0, entityIndex))));
        if (revealed && entity.title) titleText.append(createEl("p", "subtle", entity.title));
        top.append(titleText);
        title.append(top);
        if (entity.description) title.append(createEl("p", "subtle", entity.description));
        head.append(title, button("关闭", "icon-button ghost", closeModal, { ariaLabel: "关闭资料面板" }));
        card.append(head);
        const records = Array.isArray(entity.records) ? entity.records : [];
        if (records.length) {
          const totalPages = records.length;
          entityDetailPage = clamp(entityDetailPage, 0, totalPages - 1);
          const record = records[entityDetailPage];
          const box = createEl("div", "item-card");
          box.append(createEl("span", "pill", record.label || "资料"));
          box.append(createEl("p", "subtle", record.text || ""));
          card.append(box, renderPager(entityDetailPage, totalPages, "条", (next) => {
            entityDetailPage = next;
            renderEntityModal(entity);
          }));
        } else {
          card.append(createEl("div", "notice", "这份资料包没有为该档案对象提供额外记录。"));
        }
        modalLayer.append(card);
        trapFocus(card);
      }

      function closeModal() {
        modalLayer.classList.remove("open");
        modalLayer.setAttribute("aria-hidden", "true");
        clearNode(modalLayer);
        const focusTarget = lastFocused;
        selectedCell = null;
        if (focusTarget && typeof focusTarget.focus === "function") window.setTimeout(() => focusTarget.focus({ preventScroll: true }), 0);
      }

      function closeInlineOptions() {
        const previous = selectedCell ? { entityId: selectedCell.entityId, categoryId: selectedCell.categoryId } : null;
        selectedCell = null;
        removeInlineOptions();
        const focusTarget = lastFocused;
        if (view === "game" && previous) refreshAnswerCell(previous.entityId, previous.categoryId);
        if (focusTarget && typeof focusTarget.focus === "function") {
          window.setTimeout(() => focusTarget.focus({ preventScroll: true }), 0);
        }
      }

      function trapFocus(container) {
        const focusable = [...container.querySelectorAll("button, [href], input, textarea, select, [tabindex]:not([tabindex='-1'])")].filter((node) => !node.disabled);
        if (focusable.length) focusable[0].focus();
        container.addEventListener("keydown", (event) => {
          if (event.key !== "Tab" || focusable.length < 2) return;
          const first = focusable[0];
          const last = focusable[focusable.length - 1];
          if (event.shiftKey && document.activeElement === first) {
            event.preventDefault();
            last.focus();
          } else if (!event.shiftKey && document.activeElement === last) {
            event.preventDefault();
            first.focus();
          }
        });
      }

      // 档案生成：表格、类别和选项全部由 JSON 动态生成。
      function getArchiveScale(entityCount, categoryCount) {
        const w = window.innerWidth;
        const h = window.innerHeight;
        const colPressure = (categoryCount + 1) / (w < 520 ? 5.25 : w < 760 ? 6.05 : 7.25);
        const rowPressure = (entityCount + 1) / (h < 620 ? 6.1 : h < 780 ? 6.8 : 7.35);
        return clamp(1 / Math.max(1, colPressure, rowPressure), 0.68, 1);
      }

      function applyArchiveScale(grid, scale) {
        const narrow = window.innerWidth < 520;
        grid.style.setProperty("--table-gap", Math.round(2 + 4 * scale) + "px");
        grid.style.setProperty("--table-pad", Math.round(4 + 5 * scale) + "px");
        grid.style.setProperty("--cell-pad", Math.round(4 + 4 * scale) + "px " + Math.round(5 + 4 * scale) + "px");
        grid.style.setProperty("--cell-min-height", Math.max(96, Math.round(72 + 24 * scale)) + "px");
        grid.style.setProperty("--icon-size", Math.round((narrow ? 30 : 34) + 22 * scale) + "px");
        grid.style.setProperty("--table-header-font", (0.68 + 0.3 * scale).toFixed(2) + "rem");
        grid.style.setProperty("--entity-name-font", (0.72 + 0.28 * scale).toFixed(2) + "rem");
        grid.style.setProperty("--entity-title-font", (0.62 + 0.22 * scale).toFixed(2) + "rem");
        grid.style.setProperty("--cell-font", (0.68 + 0.32 * scale).toFixed(2) + "rem");
        grid.style.setProperty("--option-font", (0.72 + 0.32 * scale).toFixed(2) + "rem");
        grid.style.setProperty("--entity-col-min", narrow ? Math.round(82 + 24 * scale) + "px" : Math.round(160 + 44 * scale) + "px");
        grid.style.setProperty("--answer-col-min", narrow ? Math.round(54 + 18 * scale) + "px" : Math.round(82 + 26 * scale) + "px");
        grid.style.setProperty("--header-row-min", Math.round(44 + 18 * scale) + "px");
      }

      function isEntityNameRevealed(entityId) {
        if (!currentCase || !progress || progress.completed) return true;
        if (Array.isArray(progress.revealedEntities) && progress.revealedEntities.includes(entityId)) return true;
        return shouldRevealEntityName(entityId);
      }

      function getEntityRevealProgressText(entityId) {
        return "";
      }

      function shouldRevealEntityName(entityId) {
        if (!currentCase || !progress) return false;
        const settings = getEngineSettings(currentCase).nameReveal;
        if (!settings.enabled || !settings.autoReveal) return true;
        const categories = currentCase.categories || [];
        if (!categories.length) return true;
        const confirmed = categories.filter((category) => progress.correctCells.includes(cellId(entityId, category.id))).length;
        const required = Math.max(1, Math.ceil(categories.length * settings.threshold));
        return settings.comparison === "gt" ? confirmed > required : confirmed >= required;
      }

      function updateEntityRevealState() {
        if (!currentCase || !progress) return;
        const revealed = new Set(Array.isArray(progress.revealedEntities) ? progress.revealedEntities : []);
        (currentCase.entities || []).forEach((entity) => {
          if (shouldRevealEntityName(entity.id)) revealed.add(entity.id);
        });
        progress.revealedEntities = [...revealed];
      }

      function getEntityDisplayName(entity, index) {
        if (isEntityNameRevealed(entity.id)) return entity.name || entity.id;
        return getEntityLabel(currentCase) + "档案 " + String(index + 1).padStart(2, "0");
      }

      function getCardPageSize() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        if (w < 520) return 1;
        if (w < 700 || h < 650) return 2;
        if (w < 1100) return h < 850 ? 2 : 3;
        return 6;
      }

      function getCluePageSize() {
        return 3;
      }

      function getOptionPageSize() {
        const w = window.innerWidth;
        return w < 620 ? 4 : w < 920 ? 6 : 8;
      }

      function getResultPageSize() {
        const w = window.innerWidth;
        return w < 620 ? 4 : w < 1000 ? 6 : 8;
      }

      function renderPager(pageIndex, totalPages, unit, onChange) {
        const pager = createEl("div", "pager");
        const prev = button("上一" + unit, "tiny ghost", () => onChange(pageIndex - 1), { disabled: pageIndex <= 0 });
        const label = createEl("span", "page-label", "第" + (pageIndex + 1) + "/" + totalPages + unit);
        const next = button("下一" + unit, "tiny ghost", () => onChange(pageIndex + 1), { disabled: pageIndex >= totalPages - 1 });
        pager.append(prev, label, next);
        return pager;
      }

      // 自动图标生成：使用内嵌 SVG，不依赖图片或网络。
      function makeIcon(entity, caseItem) {
        const spec = normalizeIconSpec(entity, caseItem);
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("viewBox", "0 0 100 100");
        svg.setAttribute("class", "generated-icon");
        svg.setAttribute("aria-hidden", "true");
        const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
        const clip = document.createElementNS("http://www.w3.org/2000/svg", "clipPath");
        const clipId = "clip-" + stableHash(entity.id + spec.shape).slice(0, 8);
        clip.setAttribute("id", clipId);
        clip.append(shapeNode(spec.shape));
        defs.append(clip);
        svg.append(defs);

        const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
        group.setAttribute("clip-path", "url(#" + clipId + ")");
        const base = shapeNode(spec.shape);
        base.setAttribute("fill", spec.primaryColor);
        group.append(base);
        appendPattern(group, spec.pattern, spec.secondaryColor);
        svg.append(group);

        const outline = shapeNode(spec.shape);
        outline.setAttribute("fill", "none");
        outline.setAttribute("stroke", spec.accentColor);
        outline.setAttribute("stroke-width", "4");
        outline.setAttribute("opacity", "0.9");
        svg.append(outline);
        appendDetectiveBadge(svg, spec);

        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        text.setAttribute("x", "50");
        text.setAttribute("y", "57");
        text.setAttribute("text-anchor", "middle");
        text.setAttribute("dominant-baseline", "middle");
        text.setAttribute("font-size", spec.symbol.length > 1 ? "31" : "38");
        text.setAttribute("font-weight", "900");
        text.setAttribute("fill", chooseReadableColor(spec.primaryColor, spec.accentColor));
        text.textContent = spec.symbol;
        svg.append(text);
        return svg;
      }

      // 自动图标生成：叠加侦探徽章与证物牌细节，不改变 iconSpec 字段含义。
      function appendDetectiveBadge(svg, spec) {
        const mk = (tag) => document.createElementNS("http://www.w3.org/2000/svg", tag);
        const band = mk("rect");
        band.setAttribute("x", "18");
        band.setAttribute("y", "66");
        band.setAttribute("width", "64");
        band.setAttribute("height", "13");
        band.setAttribute("rx", "4");
        band.setAttribute("fill", spec.secondaryColor);
        band.setAttribute("opacity", "0.38");
        svg.append(band);

        const lens = mk("circle");
        lens.setAttribute("cx", "73");
        lens.setAttribute("cy", "25");
        lens.setAttribute("r", "9");
        lens.setAttribute("fill", "none");
        lens.setAttribute("stroke", spec.accentColor);
        lens.setAttribute("stroke-width", "4");
        lens.setAttribute("opacity", "0.78");
        svg.append(lens);

        const handle = mk("line");
        handle.setAttribute("x1", "80");
        handle.setAttribute("y1", "32");
        handle.setAttribute("x2", "90");
        handle.setAttribute("y2", "42");
        handle.setAttribute("stroke", spec.accentColor);
        handle.setAttribute("stroke-width", "4");
        handle.setAttribute("stroke-linecap", "round");
        handle.setAttribute("opacity", "0.78");
        svg.append(handle);
      }

      function normalizeIconSpec(entity, caseItem) {
        const raw = entity.iconSpec || {};
        const valid = raw.mode === "generated" && SHAPES.includes(raw.shape) && PATTERNS.includes(raw.pattern) && isHexColor(raw.primaryColor) && isHexColor(raw.secondaryColor) && isHexColor(raw.accentColor);
        if (valid) {
          return {
            symbol: getIconSymbol(raw.symbol, entity),
            shape: raw.shape,
            pattern: raw.pattern,
            primaryColor: raw.primaryColor,
            secondaryColor: raw.secondaryColor,
            accentColor: raw.accentColor
          };
        }
        const index = Math.abs(hashNumber((caseItem.id || "") + "::" + (entity.id || entity.name || "")));
        const palette = FALLBACK_PALETTES[index % FALLBACK_PALETTES.length];
        return {
          symbol: getIconSymbol(raw.symbol, entity),
          shape: SHAPES[index % SHAPES.length],
          pattern: PATTERNS[index % PATTERNS.length],
          primaryColor: palette[0],
          secondaryColor: palette[1],
          accentColor: palette[2]
        };
      }

      function getIconSymbol(symbol, entity) {
        const src = String(symbol || entity.name || entity.id || "?").trim();
        return Array.from(src).slice(0, 2).join("") || "?";
      }

      function shapeNode(shape) {
        if (shape === "circle") {
          const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
          c.setAttribute("cx", "50"); c.setAttribute("cy", "50"); c.setAttribute("r", "45");
          return c;
        }
        if (shape === "hexagon") {
          const p = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
          p.setAttribute("points", "50 4,90 27,90 73,50 96,10 73,10 27");
          return p;
        }
        if (shape === "shield") {
          const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
          p.setAttribute("d", "M18 12 H82 V44 C82 70 63 86 50 94 C37 86 18 70 18 44 Z");
          return p;
        }
        if (shape === "ticket") {
          const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
          p.setAttribute("d", "M12 22 Q12 12 22 12 H78 Q88 12 88 22 V34 Q76 38 76 50 Q76 62 88 66 V78 Q88 88 78 88 H22 Q12 88 12 78 V66 Q24 62 24 50 Q24 38 12 34 Z");
          return p;
        }
        if (shape === "blob") {
          const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
          p.setAttribute("d", "M48 6 C64 4 83 15 90 31 C98 49 85 68 73 82 C60 98 38 94 24 84 C8 72 5 52 12 35 C18 19 30 9 48 6 Z");
          return p;
        }
        const r = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        r.setAttribute("x", "8"); r.setAttribute("y", "8"); r.setAttribute("width", "84"); r.setAttribute("height", "84"); r.setAttribute("rx", "18");
        return r;
      }

      function appendPattern(group, pattern, color) {
        const mk = (tag) => document.createElementNS("http://www.w3.org/2000/svg", tag);
        if (pattern === "plain") return;
        if (pattern === "dots" || pattern === "bubbles" || pattern === "sparkles") {
          for (let i = 0; i < 10; i++) {
            const c = mk("circle");
            c.setAttribute("cx", String(12 + (i * 19) % 76));
            c.setAttribute("cy", String(14 + (i * 31) % 72));
            c.setAttribute("r", pattern === "bubbles" ? "6" : "3");
            c.setAttribute("fill", pattern === "bubbles" ? "none" : color);
            c.setAttribute("stroke", color);
            c.setAttribute("opacity", pattern === "sparkles" ? "0.38" : "0.42");
            group.append(c);
          }
          if (pattern === "sparkles") {
            for (let i = 0; i < 5; i++) {
              const t = mk("text");
              t.setAttribute("x", String(18 + (i * 23) % 68));
              t.setAttribute("y", String(26 + (i * 29) % 58));
              t.setAttribute("fill", color);
              t.setAttribute("font-size", "12");
              t.setAttribute("font-weight", "900");
              t.textContent = "+";
              group.append(t);
            }
          }
          return;
        }
        if (pattern === "stripes" || pattern === "diagonal") {
          for (let i = -80; i < 160; i += 16) {
            const line = mk("line");
            line.setAttribute("x1", String(i));
            line.setAttribute("y1", pattern === "diagonal" ? "100" : "0");
            line.setAttribute("x2", String(i + (pattern === "diagonal" ? 80 : 0)));
            line.setAttribute("y2", pattern === "diagonal" ? "0" : "100");
            line.setAttribute("stroke", color);
            line.setAttribute("stroke-width", "6");
            line.setAttribute("opacity", "0.28");
            group.append(line);
          }
          return;
        }
        if (pattern === "rings") {
          for (let r = 18; r < 72; r += 16) {
            const c = mk("circle");
            c.setAttribute("cx", "50");
            c.setAttribute("cy", "50");
            c.setAttribute("r", String(r));
            c.setAttribute("fill", "none");
            c.setAttribute("stroke", color);
            c.setAttribute("stroke-width", "5");
            c.setAttribute("opacity", "0.28");
            group.append(c);
          }
          return;
        }
        if (pattern === "waves") {
          for (let y = 16; y < 96; y += 18) {
            const p = mk("path");
            p.setAttribute("d", "M0 " + y + " C18 " + (y - 11) + " 32 " + (y + 11) + " 50 " + y + " S82 " + (y - 11) + " 104 " + y);
            p.setAttribute("fill", "none");
            p.setAttribute("stroke", color);
            p.setAttribute("stroke-width", "5");
            p.setAttribute("opacity", "0.32");
            group.append(p);
          }
          return;
        }
        if (pattern === "grid" || pattern === "checker") {
          for (let i = 0; i <= 100; i += 20) {
            const v = mk("line");
            v.setAttribute("x1", String(i)); v.setAttribute("y1", "0"); v.setAttribute("x2", String(i)); v.setAttribute("y2", "100");
            v.setAttribute("stroke", color); v.setAttribute("stroke-width", "3"); v.setAttribute("opacity", "0.22");
            const h = mk("line");
            h.setAttribute("x1", "0"); h.setAttribute("y1", String(i)); h.setAttribute("x2", "100"); h.setAttribute("y2", String(i));
            h.setAttribute("stroke", color); h.setAttribute("stroke-width", "3"); h.setAttribute("opacity", "0.22");
            group.append(v, h);
          }
          if (pattern === "checker") {
            for (let x = 0; x < 100; x += 20) {
              for (let y = 0; y < 100; y += 20) {
                if ((x + y) % 40 === 0) {
                  const r = mk("rect");
                  r.setAttribute("x", String(x)); r.setAttribute("y", String(y)); r.setAttribute("width", "20"); r.setAttribute("height", "20");
                  r.setAttribute("fill", color); r.setAttribute("opacity", "0.2");
                  group.append(r);
                }
              }
            }
          }
          return;
        }
        if (pattern === "rays") {
          for (let a = 0; a < 360; a += 30) {
            const p = mk("path");
            p.setAttribute("d", "M50 50 L50 0 L62 0 Z");
            p.setAttribute("fill", color);
            p.setAttribute("opacity", "0.22");
            p.setAttribute("transform", "rotate(" + a + " 50 50)");
            group.append(p);
          }
        }
      }

      function chooseReadableColor(bg, preferred) {
        if (contrastRatio(bg, preferred) >= 4.5) return preferred;
        return contrastRatio(bg, "#172033") >= contrastRatio(bg, "#FFFFFF") ? "#172033" : "#FFFFFF";
      }

      function contrastRatio(a, b) {
        const l1 = luminance(a);
        const l2 = luminance(b);
        const high = Math.max(l1, l2);
        const low = Math.min(l1, l2);
        return (high + 0.05) / (low + 0.05);
      }

      function luminance(hex) {
        const rgb = hexToRgb(hex);
        if (!rgb) return 0;
        const vals = [rgb.r, rgb.g, rgb.b].map((v) => {
          const s = v / 255;
          return s <= 0.03928 ? s / 12.92 : Math.pow((s + 0.055) / 1.055, 2.4);
        });
        return vals[0] * 0.2126 + vals[1] * 0.7152 + vals[2] * 0.0722;
      }

      function hexToRgb(hex) {
        const m = /^#([0-9a-f]{6})$/i.exec(String(hex || ""));
        if (!m) return null;
        const n = parseInt(m[1], 16);
        return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
      }

      function isHexColor(value) {
        return /^#[0-9a-f]{6}$/i.test(String(value || ""));
      }

      function soundToggle() {
        return button(audio.enabled ? "音效开" : "音效关", "ghost", () => {
          audio.enabled = !audio.enabled;
          if (progress) progress.soundEnabled = audio.enabled;
          try {
            localStorage.setItem(STORE.sound, String(audio.enabled));
          } catch {}
          saveProgress();
          if (view === "game") renderGame();
          else if (view === "cases") renderCaseLobby();
          else if (view === "intro") renderCaseIntro();
          else if (view === "completion") renderCompletion();
        }, { ariaLabel: "切换音效" });
      }

      function unlockAudio() {
        if (audio.ctx || !audio.enabled) return;
        try {
          const AudioCtor = window.AudioContext || window.webkitAudioContext;
          if (!AudioCtor) return;
          audio.ctx = new AudioCtor();
          audio.ok = true;
        } catch {
          audio.ok = false;
        }
      }

      function playSound(type) {
        if (!audio.enabled) return;
        unlockAudio();
        if (!audio.ok || !audio.ctx) return;
        try {
          const now = audio.ctx.currentTime;
          const sequence = {
            click: [[320, 0.028, 0.032], [210, 0.022, 0.018]],
            openCase: [[240, 0.055, 0.028], [360, 0.06, 0.03], [460, 0.045, 0.02]],
            openOption: [[480, 0.04, 0.03], [610, 0.055, 0.026]],
            success: [[420, 0.06, 0.04], [640, 0.08, 0.04], [820, 0.11, 0.034]],
            error: [[180, 0.075, 0.048], [130, 0.065, 0.036]],
            newClue: [[580, 0.07, 0.035], [760, 0.09, 0.034], [920, 0.08, 0.026]],
            clue: [[430, 0.045, 0.026]],
            clueUsed: [[260, 0.055, 0.032], [520, 0.075, 0.028]],
            story: [[360, 0.06, 0.03], [590, 0.08, 0.03]],
            complete: [[360, 0.08, 0.04], [520, 0.1, 0.04], [700, 0.12, 0.035], [900, 0.16, 0.03]]
          }[type] || [[440, 0.04, 0.026]];
          sequence.forEach(([freq, duration, gain], index) => {
            const osc = audio.ctx.createOscillator();
            const amp = audio.ctx.createGain();
            osc.type = type === "error" ? "triangle" : type === "click" || type === "clueUsed" ? "square" : "sine";
            osc.frequency.setValueAtTime(freq, now + index * 0.08);
            amp.gain.setValueAtTime(0.0001, now + index * 0.08);
            amp.gain.exponentialRampToValueAtTime(gain, now + index * 0.08 + 0.01);
            amp.gain.exponentialRampToValueAtTime(0.0001, now + index * 0.08 + duration);
            osc.connect(amp).connect(audio.ctx.destination);
            osc.start(now + index * 0.08);
            osc.stop(now + index * 0.08 + duration + 0.02);
          });
        } catch {}
      }

      function clearAllProgress() {
        Object.keys(memoryProgressStore).forEach((key) => delete memoryProgressStore[key]);
        try {
          Object.keys(localStorage).forEach((key) => {
            if (key.startsWith(STORE.progress)) localStorage.removeItem(key);
          });
        } catch {}
      }

      function resetCaseProgress(caseId) {
        delete memoryProgressStore[progressKey(caseId)];
        try {
          localStorage.removeItem(progressKey(caseId));
        } catch {}
        if (currentCase && currentCase.id === caseId) progress = createProgress(currentCase);
      }

      function loadProgress(caseId) {
        try {
          const raw = localStorage.getItem(progressKey(caseId));
          if (!raw) return memoryProgressStore[progressKey(caseId)] || null;
          const parsed = JSON.parse(raw);
          if (!parsed || parsed.caseId !== caseId) return null;
          parsed.correctCells = Array.isArray(parsed.correctCells) ? parsed.correctCells : [];
          parsed.clueStatus = parsed.clueStatus || {};
          parsed.storyEventsShown = Array.isArray(parsed.storyEventsShown) ? parsed.storyEventsShown : [];
          parsed.revealedEntities = Array.isArray(parsed.revealedEntities) ? parsed.revealedEntities : [];
          parsed.categoryOrder = Array.isArray(parsed.categoryOrder) ? parsed.categoryOrder : [];
          parsed.optionOrderByCategory = parsed.optionOrderByCategory && typeof parsed.optionOrderByCategory === "object" ? parsed.optionOrderByCategory : {};
          parsed.cluePage = Number(parsed.cluePage || 0);
          parsed.clueScrollLeft = Number(parsed.clueScrollLeft || 0);
          parsed.errors = Number(parsed.errors || 0);
          parsed.hints = Number(parsed.hints || 0);
          parsed.failed = parsed.failed === true;
          parsed.failedAt = Number(parsed.failedAt || 0);
          parsed.startTime = Number(parsed.startTime || Date.now());
          return parsed;
        } catch {
          return memoryProgressStore[progressKey(caseId)] || null;
        }
      }

      function saveProgress() {
        if (!progress || !currentCase) return;
        memoryProgressStore[progressKey(currentCase.id)] = progress;
        try {
          localStorage.setItem(progressKey(currentCase.id), JSON.stringify(progress));
        } catch {}
      }

      function progressKey(caseId) {
        return STORE.progress + packageHash + "." + caseId;
      }

      function findCase(id) {
        return (packageData && Array.isArray(packageData.cases) ? packageData.cases : []).find((item) => item.id === id) || null;
      }

      function getEntityLabel(caseItem) {
        return caseItem && caseItem.entityLabel ? caseItem.entityLabel : "档案对象";
      }

      function getTotalCells(caseItem) {
        return ((caseItem.entities || []).length) * ((caseItem.categories || []).length);
      }

      function cellId(entityId, categoryId) {
        return entityId + "::" + categoryId;
      }

      function splitCellId(id) {
        const parts = String(id || "").split("::");
        if (parts.length !== 2) return null;
        return { entityId: parts[0], categoryId: parts[1] };
      }

      function getEntity(id) {
        return (currentCase.entities || []).find((entity) => entity.id === id);
      }

      function getCategory(id) {
        return (currentCase.categories || []).find((category) => category.id === id);
      }

      function getOrderedCategories() {
        const categories = currentCase && Array.isArray(currentCase.categories) ? currentCase.categories : [];
        if (!progress || !Array.isArray(progress.categoryOrder) || !progress.categoryOrder.length) return categories.slice();
        const byId = new Map(categories.map((category) => [category.id, category]));
        const ordered = progress.categoryOrder.map((id) => byId.get(id)).filter(Boolean);
        categories.forEach((category) => {
          if (!ordered.includes(category)) ordered.push(category);
        });
        return ordered;
      }

      function getOrderedOptions(category) {
        const options = Array.isArray(category && category.options) ? category.options : [];
        const order = progress && progress.optionOrderByCategory ? progress.optionOrderByCategory[category.id] : null;
        if (!Array.isArray(order) || !order.length) return options.slice();
        const byId = new Map(options.map((option) => [option.id, option]));
        const ordered = order.map((id) => byId.get(id)).filter(Boolean);
        options.forEach((option) => {
          if (!ordered.includes(option)) ordered.push(option);
        });
        return ordered;
      }

      function getOptionLabel(categoryId, optionId) {
        const category = getCategory(categoryId);
        const option = category && (category.options || []).find((item) => item.id === optionId);
        return option ? (option.label || "") : "";
      }

      function getCellAnswerLabel(id) {
        const parts = splitCellId(id);
        if (!parts) return "";
        const answer = currentCase.solution && currentCase.solution[parts.entityId] && currentCase.solution[parts.entityId][parts.categoryId];
        return getOptionLabel(parts.categoryId, answer);
      }

      function isOptionUsedInCategory(categoryId, optionId) {
        return progress.correctCells.some((id) => {
          const parts = splitCellId(id);
          if (!parts || parts.categoryId !== categoryId) return false;
          const answer = currentCase.solution[parts.entityId] && currentCase.solution[parts.entityId][categoryId];
          return answer === optionId;
        });
      }

      function getMaxHints() {
        const value = packageData && packageData.settings ? Number(packageData.settings.maxHints) : 3;
        return Number.isFinite(value) && value >= 0 ? value : 3;
      }

      function getNextCase() {
        const cases = packageData && Array.isArray(packageData.cases) ? packageData.cases : [];
        const index = cases.findIndex((item) => item.id === currentCase.id);
        return index >= 0 && index < cases.length - 1 ? cases[index + 1] : null;
      }

      function normalizeSummary(summary) {
        if (!Array.isArray(summary)) return [];
        return summary.map((item) => {
          if (typeof item === "string") return item;
          if (item && typeof item === "object") return Object.values(item).map((value) => String(value || "")).filter(Boolean).join("：");
          return "";
        }).filter(Boolean);
      }

      function getStarLevel() {
        const errors = progress.errors;
        const hints = progress.hints;
        const elapsed = (progress.completedAt || Date.now()) - progress.startTime;
        const limit = packageData && packageData.settings && packageData.settings.timeLimitSeconds ? Number(packageData.settings.timeLimitSeconds) * 1000 : 0;
        if (errors <= 2 && hints <= 1 && (!limit || elapsed <= limit)) return "三星";
        if (errors <= 5 && hints <= Math.max(2, getMaxHints())) return "二星";
        return "一星";
      }

      function formatElapsed() {
        if (!progress) return "00:00";
        return formatDuration(Date.now() - progress.startTime);
      }

      function formatDuration(ms) {
        const total = Math.max(0, Math.floor(ms / 1000));
        const min = Math.floor(total / 60);
        const sec = total % 60;
        return String(min).padStart(2, "0") + ":" + String(sec).padStart(2, "0");
      }

      function safeLabel(label, fallback) {
        return String(label || fallback || "未命名");
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function stableHash(text) {
        return Math.abs(hashNumber(text)).toString(36);
      }

      function hashNumber(text) {
        let hash = 2166136261;
        const src = String(text || "");
        for (let i = 0; i < src.length; i++) {
          hash ^= src.charCodeAt(i);
          hash += (hash << 1) + (hash << 4) + (hash << 7) + (hash << 8) + (hash << 24);
        }
        return hash | 0;
      }

      function fitPagesToViewport() {
        cluePage = Math.max(0, cluePage);
      }

      const particles = {
        ctx: bgCanvas.getContext("2d"),
        items: [],
        paused: false,
        reduced: window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches
      };

      function startBackground() {
        if (!particles.ctx || particles.reduced) return;
        resizeCanvas();
        window.addEventListener("resize", resizeCanvas);
        requestAnimationFrame(drawBackground);
      }

      function resizeCanvas() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        bgCanvas.width = Math.floor(window.innerWidth * dpr);
        bgCanvas.height = Math.floor(window.innerHeight * dpr);
        bgCanvas.style.width = window.innerWidth + "px";
        bgCanvas.style.height = window.innerHeight + "px";
        particles.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        const count = Math.min(58, Math.max(20, Math.floor((window.innerWidth * window.innerHeight) / 38000)));
        particles.items = Array.from({ length: count }, (_, index) => ({
          x: Math.random() * window.innerWidth,
          y: Math.random() * window.innerHeight,
          r: 1.4 + Math.random() * 6,
          w: 16 + Math.random() * 24,
          h: 10 + Math.random() * 18,
          s: 0.12 + Math.random() * 0.3,
          a: Math.random() * Math.PI * 2,
          type: index % 5 === 0 ? "paper" : index % 5 === 1 ? "route" : "dust",
          c: ["rgba(244,231,197,0.34)", "rgba(199,154,75,0.28)", "rgba(60,141,135,0.24)", "rgba(255,249,237,0.2)", "rgba(140,59,74,0.18)"][index % 5]
        }));
      }

      function drawBackground() {
        if (!particles.ctx || particles.reduced) return;
        if (!particles.paused) {
          const ctx = particles.ctx;
          ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
          particles.items.forEach((p) => {
            p.a += 0.006;
            p.x += Math.cos(p.a) * p.s;
            p.y += Math.sin(p.a * 0.8) * p.s;
            if (p.x < -20) p.x = window.innerWidth + 20;
            if (p.x > window.innerWidth + 20) p.x = -20;
            if (p.y < -20) p.y = window.innerHeight + 20;
            if (p.y > window.innerHeight + 20) p.y = -20;
            if (p.type === "paper") {
              ctx.save();
              ctx.translate(p.x, p.y);
              ctx.rotate(Math.sin(p.a) * 0.25);
              ctx.fillStyle = "rgba(244,231,197,0.16)";
              ctx.strokeStyle = "rgba(199,154,75,0.2)";
              ctx.lineWidth = 1;
              ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
              ctx.strokeRect(-p.w / 2, -p.h / 2, p.w, p.h);
              ctx.restore();
            } else if (p.type === "route") {
              ctx.beginPath();
              ctx.setLineDash([4, 7]);
              ctx.moveTo(p.x - 18, p.y + 8);
              ctx.lineTo(p.x, p.y - 8);
              ctx.lineTo(p.x + 18, p.y + 7);
              ctx.strokeStyle = p.c;
              ctx.lineWidth = 1.4;
              ctx.stroke();
              ctx.setLineDash([]);
            } else {
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
              ctx.fillStyle = p.c;
              ctx.fill();
            }
          });
        }
        requestAnimationFrame(drawBackground);
      }

      startBackground();
    })();
  </script>
</body>
