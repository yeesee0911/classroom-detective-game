<!doctype html>
<html lang="zh-Hans">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>课堂推理游戏引擎｜侦探调查局</title>
  <style>
    @font-face {
      font-family: "GameRounded";
      src:
        url("https://yeesee0911.github.io/classroom-detective-game/fonts/game-rounded.woff2") format("woff2"),
        url("https://raw.githubusercontent.com/yeesee0911/classroom-detective-game/main/fonts/game-rounded.woff2") format("woff2");
      font-display: swap;
    }

    :root {
      --ink: #172033;
      --ink-soft: #26344f;
      --muted: #574c43;
      --panel: rgba(255, 249, 237, 0.94);
      --panel-solid: #fff9ed;
      --line: rgba(70, 61, 56, 0.24);
      --shadow: 0 18px 42px rgba(12, 18, 33, 0.24);
      --navy: #17233c;
      --navy-2: #26344f;
      --wine: #8c3b4a;
      --brass: #c79a4b;
      --parchment: #f4e7c5;
      --cream: #fff9ed;
      --brown: #463d38;
      --teal: #3c8d87;
      --green: #287a5b;
      --red: #b64242;
      --amber: #8d6318;
      --focus: #c79a4b;
      --radius: 8px;
      --game-font-rounded: "GameRounded", system-ui, sans-serif;
      font-family: var(--game-font-rounded);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 18%, rgba(199, 154, 75, 0.23), transparent 28%),
        radial-gradient(circle at 86% 14%, rgba(60, 141, 135, 0.24), transparent 30%),
        radial-gradient(circle at 14% 84%, rgba(140, 59, 74, 0.18), transparent 30%),
        linear-gradient(135deg, #111a30 0%, #1b2a45 46%, #463d38 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: -25%;
      z-index: 0;
      pointer-events: none;
      background:
        linear-gradient(120deg, transparent 24%, rgba(244, 231, 197, 0.15) 39%, transparent 54%),
        linear-gradient(rgba(244, 231, 197, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(244, 231, 197, 0.08) 1px, transparent 1px),
        radial-gradient(circle at 20% 50%, rgba(255, 249, 237, 0.12), transparent 28%);
      background-size: 48rem 48rem, 3rem 3rem, 3rem 3rem, 42rem 42rem;
      animation: driftWash 22s linear infinite;
      opacity: 0.9;
    }

    body::after {
      content: "CASE  FILE  EVIDENCE  01  07  13";
      position: fixed;
      inset: auto -10% 6% -10%;
      z-index: 0;
      pointer-events: none;
      color: rgba(244, 231, 197, 0.08);
      font-weight: 900;
      font-size: clamp(2.3rem, 9vw, 7rem);
      letter-spacing: 0.12em;
      white-space: nowrap;
      transform: rotate(-7deg);
      animation: caseCodes 30s linear infinite alternate;
    }

    @keyframes driftWash {
      from { transform: translate3d(-2%, -2%, 0); }
      to { transform: translate3d(2%, 2%, 0); }
    }

    @keyframes caseCodes {
      from { transform: translateX(-5%) rotate(-7deg); }
      to { transform: translateX(5%) rotate(-7deg); }
    }

    #bgCanvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #app {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      padding: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
    }

    .page {
      width: 100%;
      height: 100%;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
      animation: pageIn 240ms ease;
    }

    .validation-page {
      grid-template-columns: minmax(0, 1fr);
      justify-items: center;
    }

    .validation-page > .topbar {
      width: 100%;
      justify-self: stretch;
    }

    @keyframes pageIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .single {
      grid-template-rows: 1fr;
      align-items: center;
      justify-items: center;
    }

    .shell {
      width: min(1180px, 100%);
      height: 100%;
      min-height: 0;
      min-width: 0;
      margin: 0 auto;
      display: grid;
      gap: 10px;
    }

    .center-shell {
      width: min(980px, 100%);
      height: min(760px, 100%);
      margin: 0 auto;
      display: grid;
      align-content: center;
      gap: 12px;
    }

    .topbar,
    .panel,
    .modal-card,
    .toast-card {
      background: var(--panel);
      border: 1px solid rgba(199, 154, 75, 0.38);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      border-radius: var(--radius);
    }

    .topbar {
      min-height: 58px;
      padding: 9px 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      background:
        linear-gradient(135deg, rgba(23, 35, 60, 0.96), rgba(38, 52, 79, 0.94)),
        repeating-linear-gradient(90deg, rgba(199, 154, 75, 0.18) 0 1px, transparent 1px 14px);
      border-color: rgba(199, 154, 75, 0.5);
      position: relative;
      overflow: hidden;
    }

    .topbar::before {
      content: "调查局";
      position: absolute;
      right: 12px;
      bottom: -10px;
      color: rgba(244, 231, 197, 0.12);
      font-weight: 1000;
      font-size: 2.7rem;
      letter-spacing: 0.06em;
      pointer-events: none;
    }

    .top-title {
      min-width: 0;
      display: grid;
      gap: 2px;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(1.35rem, 3vw, 2.2rem);
      line-height: 1.14;
      color: var(--navy);
      letter-spacing: 0;
    }

    h2 {
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      line-height: 1.2;
      color: var(--navy);
      letter-spacing: 0;
    }

    h3 {
      font-size: clamp(0.92rem, 1.3vw, 1.05rem);
      line-height: 1.25;
      letter-spacing: 0;
    }

    .topbar h1 {
      color: var(--cream);
      text-shadow: 0 1px 0 rgba(0, 0, 0, 0.28);
    }

    .topbar .subtle {
      color: #f4e7c5;
    }

    .subtle {
      color: var(--muted);
      font-size: clamp(0.78rem, 1.2vw, 0.92rem);
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .panel {
      min-height: 0;
      min-width: 0;
      padding: 12px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(199, 154, 75, 0.88), rgba(140, 59, 74, 0.88)) left top / 6px 100% no-repeat,
        linear-gradient(180deg, rgba(255, 249, 237, 0.96), rgba(244, 231, 197, 0.9)),
        repeating-linear-gradient(0deg, rgba(70, 61, 56, 0.04) 0 1px, transparent 1px 22px);
      background-attachment: local, local, local;
      position: relative;
    }

    .panel::before {
      content: none;
      display: none;
    }

    .stack {
      display: grid;
      gap: 10px;
      min-height: 0;
    }

    .two-col {
      display: grid;
      grid-template-columns: minmax(0, 0.85fr) minmax(0, 1.15fr);
      gap: 10px;
      min-height: 0;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .actions.end {
      justify-content: flex-end;
    }

    button,
    .file-button {
      position: relative;
      min-height: 44px;
      min-width: 44px;
      border: 0;
      border-radius: 8px;
      padding: 9px 13px;
      color: var(--navy);
      background: #fff9ed;
      border: 1px solid rgba(70, 61, 56, 0.28);
      box-shadow: 0 5px 0 rgba(70, 61, 56, 0.16), 0 10px 18px rgba(12, 18, 33, 0.11);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
      overflow-wrap: anywhere;
      text-align: center;
      overflow: hidden;
      isolation: isolate;
    }

    button::after,
    .file-button::after {
      content: "";
      position: absolute;
      inset: 50%;
      width: 0;
      height: 0;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.32);
      transform: translate(-50%, -50%);
      opacity: 0;
      pointer-events: none;
      transition: width 160ms ease, height 160ms ease, opacity 180ms ease;
      z-index: 0;
    }

    button:active:not(:disabled)::after,
    .file-button:active::after {
      width: 140%;
      height: 180%;
      opacity: 1;
    }

    button:hover,
    .file-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 0 rgba(70, 61, 56, 0.16), 0 14px 22px rgba(12, 18, 33, 0.18);
    }

    button:active,
    .file-button:active {
      transform: scale(0.96);
      box-shadow: 0 2px 0 rgba(70, 61, 56, 0.16), 0 5px 10px rgba(12, 18, 33, 0.11);
    }

    button:focus-visible,
    textarea:focus-visible,
    input:focus-visible,
    .file-button:focus-visible,
    .cell:focus-visible,
    .clue-card:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 3px;
    }

    button:disabled {
      opacity: 0.48;
      cursor: not-allowed;
      transform: none;
    }

    .primary {
      background: linear-gradient(135deg, #c79a4b, #f4d083);
      color: #172033;
      border-color: rgba(70, 61, 56, 0.42);
    }

    .secondary {
      background: linear-gradient(135deg, #3c8d87, #6db7ad);
      color: #fff9ed;
      border-color: rgba(23, 35, 60, 0.34);
    }

    .danger {
      background: #ffe9df;
      color: #7c2020;
      border-color: rgba(182, 66, 66, 0.42);
    }

    .ghost {
      background: rgba(255, 249, 237, 0.82);
    }

    .tiny {
      min-height: 34px;
      padding: 6px 9px;
      font-size: 0.82rem;
      font-weight: 700;
    }

    .icon-button {
      width: 44px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      font-weight: 900;
    }

    input[type="file"] {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      height: 28dvh;
      max-height: 270px;
      resize: none;
      border-radius: 8px;
      padding: 12px;
      color: var(--ink);
      background:
        linear-gradient(rgba(255, 249, 237, 0.94), rgba(255, 249, 237, 0.94)),
        repeating-linear-gradient(0deg, transparent 0 23px, rgba(70, 61, 56, 0.12) 23px 24px);
      border: 1px solid rgba(70, 61, 56, 0.3);
      font: 600 0.9rem/1.5 ui-monospace, "SFMono-Regular", Consolas, monospace;
      overflow: hidden;
    }

    .notice {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      padding: 9px 11px;
      border-radius: 8px;
      color: #243044;
      background: rgba(255, 249, 237, 0.76);
      border: 1px solid rgba(70, 61, 56, 0.22);
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .notice.success {
      background: #e7f7ee;
      color: #164b36;
      border-color: rgba(40, 122, 91, 0.42);
    }

    .notice.error {
      background: #ffe7e4;
      color: #7c2020;
      border-color: rgba(182, 66, 66, 0.42);
    }

    .notice.warn {
      background: #fff0c9;
      color: #5a3b0f;
      border-color: rgba(199, 154, 75, 0.46);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 28px;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(66, 84, 115, 0.16);
      color: var(--navy);
      background: rgba(244, 231, 197, 0.78);
      font-size: 0.78rem;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .pill.used {
      background: #e3ded4;
      color: #26344f;
    }

    .pill.partial {
      background: #fff0c9;
      color: #5a3b0f;
    }

    .pill.visible {
      background: #dff3ef;
      color: #1d5651;
    }

    .pill.new {
      background: #17233c;
      color: #fff9ed;
      border-color: rgba(199, 154, 75, 0.58);
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 10px;
      min-height: 0;
      align-content: start;
      overflow: auto;
      overscroll-behavior: contain;
      padding: 2px 4px 8px 2px;
    }

    .item-card {
      min-height: 0;
      border-radius: 8px;
      padding: 11px;
      background:
        linear-gradient(135deg, rgba(255, 249, 237, 0.92), rgba(244, 231, 197, 0.78));
      border: 1px solid rgba(70, 61, 56, 0.22);
      display: grid;
      gap: 7px;
      align-content: start;
      overflow: visible;
      position: relative;
    }

    .item-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 18px;
      width: 72px;
      height: 8px;
      border-radius: 0 0 6px 6px;
      background: var(--brass);
      opacity: 0.82;
      pointer-events: none;
    }

    .item-card p,
    .text-card p,
    .result-cell,
    .entity-name,
    .cell {
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .item-card h3 {
      overflow-wrap: anywhere;
      word-break: break-word;
      font-size: clamp(1rem, 1.4vw, 1.16rem);
      line-height: 1.24;
    }

    .case-lobby-page .panel.stack {
      --case-lobby-card-height: clamp(220px, 28dvh, 300px);
      grid-template-rows: auto minmax(0, 1fr) auto;
    }

    .case-lobby-page .card-grid {
      min-height: 0;
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 280px), 1fr));
      grid-auto-rows: var(--case-lobby-card-height);
      align-items: stretch;
      gap: 12px;
    }

    .case-lobby-page .item-card {
      min-height: 0;
      height: var(--case-lobby-card-height);
      gap: 10px;
      padding: 15px;
      overflow: hidden;
      grid-template-rows: auto auto auto minmax(0, 1fr) auto auto;
    }

    .case-lobby-page .item-card h3 {
      font-size: clamp(1.22rem, 1.9vw, 1.58rem);
      line-height: 1.22;
    }

    .case-lobby-page .item-card .pill {
      font-size: clamp(0.92rem, 1.25vw, 1.08rem);
      line-height: 1.18;
    }

    .case-lobby-page .item-card .subtle,
    .case-lobby-page .item-card .notice {
      font-size: clamp(1rem, 1.45vw, 1.18rem);
      line-height: 1.38;
      min-height: 0;
      overflow: auto;
      overscroll-behavior: contain;
    }

    .case-lobby-page .item-card button {
      min-height: 48px;
      font-size: clamp(1rem, 1.35vw, 1.16rem);
      line-height: 1.18;
    }

    .case-lobby-page .item-card .actions {
      align-self: end;
    }

    .manual-book-card {
      isolation: isolate;
      min-height: 100%;
      align-self: stretch;
      grid-template-rows: 1fr;
      cursor: pointer;
      padding: 0;
      border: 1px solid rgba(199, 154, 75, 0.72);
      background:
        linear-gradient(90deg, rgba(23, 35, 60, 0.98) 0 24px, transparent 24px),
        linear-gradient(135deg, rgba(38, 52, 79, 0.98), rgba(23, 35, 60, 0.96));
      box-shadow:
        inset 6px 0 0 rgba(140, 59, 74, 0.9),
        inset 28px 0 0 rgba(255, 249, 237, 0.07),
        0 14px 26px rgba(23, 35, 60, 0.18);
      overflow: hidden;
      color: var(--cream);
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .manual-book-card::before {
      content: none;
    }

    .manual-book-card::after {
      content: "";
      position: absolute;
      inset: 10px 10px 10px 40px;
      border: 1px solid rgba(244, 231, 197, 0.45);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 249, 237, 0.08), transparent 42%),
        repeating-linear-gradient(0deg, rgba(255, 249, 237, 0.08) 0 1px, transparent 1px 10px);
      pointer-events: none;
      z-index: 0;
    }

    .manual-book-card:hover,
    .manual-book-card:focus-within {
      transform: translateY(-2px);
      border-color: rgba(244, 231, 197, 0.86);
      box-shadow:
        inset 6px 0 0 rgba(140, 59, 74, 0.95),
        inset 28px 0 0 rgba(255, 249, 237, 0.1),
        0 16px 30px rgba(23, 35, 60, 0.24);
    }

    .manual-book-content {
      position: relative;
      z-index: 1;
      min-height: 100%;
      display: grid;
      gap: 10px;
      align-content: center;
      padding: 28px 18px 44px 52px;
      text-align: center;
    }

    .manual-book-kicker {
      justify-self: center;
      min-height: 0;
      color: var(--navy);
      background: rgba(244, 231, 197, 0.94);
      border-color: rgba(199, 154, 75, 0.86);
      font-size: clamp(0.9rem, 1.2vw, 1.04rem);
    }

    .manual-book-title {
      margin: 0;
      color: var(--cream);
      font-size: clamp(1.48rem, 2.25vw, 2rem);
      line-height: 1.08;
      letter-spacing: 0;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.22);
    }
  
    .manual-open-hint {
      position: absolute;
      left: 50%;
      top: 72%;
      transform: translate(-50%, -50%);
      z-index: 2;
      
      display: inline-block;
      color: rgba(244, 231, 197, 0.9);
      font-size: clamp(0.72rem, 0.95vw, 0.88rem);
      font-weight: 850;
      line-height: 1;
      text-align: center;
      white-space: nowrap;
      letter-spacing: 0.04em;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.36);

      pointer-events: none;
    }

    .case-lobby-grid,
    .intro-narrative-card {
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .local-switch-out {
      opacity: 0;
      transform: translateY(6px);
    }

    .local-switch-in {
      animation: localSwitchIn 190ms ease both;
    }

    @keyframes localSwitchIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .validation-page .shell {
      width: min(1180px, 100%);
      max-width: 1180px;
      justify-self: center;
      margin-inline: auto;
    }

    .validation-page .panel.stack {
      width: 100%;
      max-width: 1180px;
      justify-self: center;
      margin-inline: auto;
      grid-template-rows: auto auto;
      height: 100%;
      max-height: 100%;
      align-content: start;
      justify-items: center;
      padding-bottom: clamp(28px, 5dvh, 56px);
      overflow-y: auto;
      overflow-x: hidden;
      touch-action: pan-y;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      scrollbar-gutter: auto;
    }

    .validation-layout {
      width: 100%;
      max-width: 1120px;
      justify-self: center;
      margin-inline: auto;
      transform: none;
      box-sizing: border-box;
      min-height: max-content;
      height: auto;
      overflow: visible;
      align-content: start;
      gap: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .validation-check-pane,
    .validation-data-pane {
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      min-height: 0;
      overflow: hidden;
      overscroll-behavior: contain;
      padding: 9px;
      align-content: start;
      border-radius: 10px;
      border: 1px solid rgba(70, 61, 56, 0.2);
      background: #fff9ed;
      contain: layout paint;
    }

    .validation-data-pane {
      overflow: visible;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      align-content: start;
      gap: 10px;
    }

    .validation-data-pane .item-card,
    .validation-data-pane .notice {
      flex: 0 0 auto;
      flex-shrink: 0;
    }

    .validation-data-pane > .notice {
      display: grid;
      place-items: center;
      min-height: 54px;
      text-align: center;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .validation-data-pane .actions {
      display: flex;
      justify-content: center;
      width: 100%;
      flex: 0 0 auto;
      padding: 8px 0;
    }

    .validation-data-pane .item-card {
      width: 100%;
      box-sizing: border-box;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      justify-items: stretch;
      align-content: start;
      height: auto;
      min-height: auto;
      flex: 0 0 auto;
      overflow: visible;
    }

    .validation-data-pane .result-cell {
      width: 100%;
      min-width: 0;
      height: auto;
      min-height: auto;
      box-sizing: border-box;
      justify-items: center;
      align-content: start;
      text-align: center;
      padding: 8px 10px;
      overflow: visible;
    }

    .validation-data-pane .result-label,
    .validation-data-pane .result-value {
      display: block;
      width: 100%;
      min-width: 0;
      line-height: 1.22;
    }

    .intro-page .panel.stack {
      gap: 8px;
      overflow: hidden;
    }

    .package-story-page .panel.stack {
      width: min(1120px, 100%);
      margin-inline: auto;
      gap: 10px;
      grid-auto-rows: max-content;
      align-content: start;
      overflow-y: auto;

    }

    @media (hover: none) and (pointer: coarse) {
      .answer-cell-wrap:not(.open):hover .inline-options {
        opacity: 0;

      .answer-cell-wrap.open .inline-options {

    @media (max-width: 760px) {

      }

      .intro-page .topbar .subtle {

      }

      .intro-page .topbar .actions.end {

      .validation-page .panel.stack {

      .validation-page .shell {
        width: min(1180px, 100%);
        max-width: 1180px;
        justify-self: center;
        margin-inline: auto;
      }

      .validation-page .two-col.validation-layout {
        display: block;
        height: auto;
        min-height: 0;

      .validation-page .validation-layout {

        max-width: 1120px;
        margin-inline: auto;
        display: block;
        height: auto;
        min-height: max-content;

      }

      .validation-check-pane,
      .validation-data-pane {

        z-index: auto;
        padding-bottom: 0;
      }

      .validation-check-pane {

      }

      .validation-report-head {
        align-items: center;

      .validation-report-toggle {

        text-align: center;
        white-space: nowrap;

      .validation-collapsed-note {

        margin: 0;
      }

      .validation-check-pane.validation-collapsed .validation-report-body {
        max-height: 0;
      }

      .validation-report-body {
        max-height: min(38dvh, 320px);
        overflow-y: auto;
        overscroll-behavior: contain;
      }

      .validation-data-pane .actions {
        align-items: stretch;
        justify-content: center;
        width: 100%;
        flex: 0 0 auto;
        padding: 8px 0;
      }

      .validation-data-pane .actions button {
        flex: 0 1 min(560px, 100%);
      }

      .validation-start-button {
        flex: 0 0 auto;
      }
    }

    @media (max-width: 760px) {
      .validation-page .validation-layout {
        width: 100%;
      }
    }

    @media (max-height: 620px) {
      .topbar {
        min-height: 48px;
      }

      .panel {
        padding: 8px;
      }

      .notice,
      button,
      .file-button {
        min-height: 40px;
        padding-top: 7px;
        padding-bottom: 7px;
      }

      .cell {
        min-height: 38px;
      }
    }

    /* 资料验证页最终居中规则：外层满宽，页面框和内容轨道居中。 */
    .validation-page > .shell {
      width: 100%;
      max-width: none;
      justify-self: stretch;
      margin-inline: 0;
      display: grid;
      justify-items: center;
    }

    .validation-page > .shell > .panel.stack {
      width: min(1180px, 100%);
      max-width: 1180px;
      justify-self: center;
      justify-items: center;
      margin-inline: auto;
    }

    .validation-page .validation-layout {
      width: min(1120px, 100%);
      max-width: 1120px;
      justify-self: center;
      margin-inline: auto;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      justify-items: stretch;
      align-content: start;
    }

    .validation-page .validation-check-pane,
    .validation-page .validation-data-pane {
      width: 100%;
      max-width: 100%;
      justify-self: center;
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
      }

      body::before,
      body::after,
      #bgCanvas {
        display: none;
      }
    }
  </style>
</head>
<body>
  <canvas id="bgCanvas" aria-hidden="true"></canvas>
  <main id="app" aria-live="polite">
    <section class="page single">
      <div class="center-shell">
        <div class="panel stack">
          <h1>请上传游戏资料包</h1>
        </div>
      </div>
    </section>
  </main>
  <div id="modalLayer" class="modal-layer" role="dialog" aria-modal="true" aria-hidden="true"></div>
  <div id="toastLayer" class="toast-layer" aria-live="polite" aria-hidden="true"></div>

  <script>
    (() => {
      "use strict";

      const STORAGE_PREFIX = "classArchiveEngine.";
      const STORE = {
        package: STORAGE_PREFIX + "package",
        packageHash: STORAGE_PREFIX + "packageHash",
        packageSource: STORAGE_PREFIX + "packageSource",
        progress: STORAGE_PREFIX + "progress.",
        sound: STORAGE_PREFIX + "soundEnabled"
      };
      const GITHUB_LIBRARY_CONFIG = {
        owner: "yeesee0911",
        repo: "classroom-detective-game",
        branch: "main",
        folder: "game-data"
      };
      const MAX_ACTIVE_CLUES = 3;
      const HIGHLIGHT_DURATION = 3360;
      const SHAPES = ["circle", "rounded-square", "hexagon", "shield", "ticket", "blob"];
      const PATTERNS = ["plain", "dots", "stripes", "rings", "waves", "grid", "rays", "bubbles", "sparkles", "checker", "diagonal"];
      const WRONG_MESSAGES = [
        "证据不吻合，请重新检查线索。",
        "证据不吻合，这项结果暂时无法成立。",
        "证据不吻合，请回到证据卡重新核对。"
      ];
      const FALLBACK_PALETTES = [
        ["#F4E7C5", "#C79A4B", "#17233C"],
        ["#3C8D87", "#F4E7C5", "#17233C"],
        ["#8C3B4A", "#F4E7C5", "#FFF9ED"],
        ["#C79A4B", "#26344F", "#17233C"],
        ["#FFF9ED", "#8C3B4A", "#17233C"],
        ["#26344F", "#C79A4B", "#FFF9ED"],
        ["#287A5B", "#F4E7C5", "#17233C"],
        ["#B64242", "#F4E7C5", "#FFF9ED"]
      ];

      const app = document.getElementById("app");
      const modalLayer = document.getElementById("modalLayer");
      const toastLayer = document.getElementById("toastLayer");
      const bgCanvas = document.getElementById("bgCanvas");

      let packageData = null;
      let packageHash = "";
      let packageSource = { source: "local" };
      let validation = null;
      let currentCaseId = "";
      let currentCase = null;
      let progress = null;
      let view = "data";
      let parseError = "";
      let dataInputText = "";
      let validationPage = 0;
      let validationReportExpanded = false;
      let githubLibrary = { loading: false, error: "", items: [], filterText: "", subject: "", level: "", notice: "" };
      let casePage = 0;
      let narrativePage = 0;
      let tableEntityPage = 0;
      let tableCategoryPage = 0;
      let cluePage = 0;
      let optionPage = 0;
      let resultPage = 0;
      let summaryPage = 0;
      let entityDetailPage = 0;
      let selectedCell = null;
      let lastFocused = null;
      let inlineCloseTimer = 0;
      let activeInlineHoverHolder = null;
      const inlineHoverTimers = new WeakMap();
      const memoryProgressStore = {};
      let highlight = { cells: new Set(), entities: new Set(), categories: new Set(), timer: 0 };
      let newClueIds = new Set();
      let toastTimer = 0;
      let timerHandle = 0;
      let audio = { ctx: null, ok: false, enabled: true };

      // 注意：这是 HTML 引擎实际读取并下载的空白模板。
      // category 必须使用 label，不要使用 title。
      // option 必须使用 label，不要使用 text。
      // iconSpec 必须使用 primaryColor / secondaryColor / accentColor，不要使用 colors 数组。
      // entity.description、records 和 clue.explanation 属于旧资料包兼容扩展，空白模板不再主动生成。
      const blankTemplate = {
        schemaVersion: "1.0",
        packageId: "",
        packageTitle: "",
        subject: "",
        level: "",
        contentLanguage: "",
        description: "",
        openingStory: "",
        endingStory: "",
        settings: {
          defaultDifficulty: "",
          timerEnabled: false,
          timeLimitSeconds: 0,
          maxHints: 3,
          soundEnabled: true
        },
        cases: [
          {
            id: "",
            title: "",
            story: "",
            goal: "",
            difficulty: "",
            narrative: {
              theme: "",
              opening: "",
              problem: "",
              mission: "",
              completion: ""
            },
            storyEvents: [
              {
                id: "",
                triggerAfterCorrectCells: 1,
                text: ""
              }
            ],
            entityType: "",
            entityLabel: "",
            entities: [
              {
                id: "entity_001",
                name: "",
                title: "",
                iconSpec: {
                  mode: "generated",
                  symbol: "01",
                  shape: "circle",
                  pattern: "dots",
                  primaryColor: "#F4E7C5",
                  secondaryColor: "#C79A4B",
                  accentColor: "#17233C"
                }
              }
            ],
            categories: [
              {
                id: "category_001",
                label: "",
                options: [
                  {
                    id: "option_001",
                    label: "",
                    note: ""
                  }
                ]
              }
            ],
            solution: {
              entity_001: {
                category_001: "option_001"
              }
            },
            clues: [
              {
                id: "",
                text: "",
                type: "direct",
                initial: true,
                priority: 1,
                relatedCells: [
                  "entity_001::category_001"
                ],
                completeAfter: [
                  "entity_001::category_001"
                ],
                completeMode: "all",
                unlockAfter: [],
                unlockMode: "any"
              }
            ],
            knowledgeSummary: []
          }
        ],
        audit: {
          sourceSummary: "",
          usedItems: [],
          excludedItems: [],
          warnings: [],
          validationPassed: true
        }
      };

      document.addEventListener("pointerdown", unlockAudio, { once: true, passive: true });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          if (modalLayer.classList.contains("open")) closeModal();
          else if (selectedCell && view === "game") closeInlineOptions();
          if (toastLayer.classList.contains("open")) closeToast();
        }
      });
      document.addEventListener("click", (event) => {
        if (view === "game" && selectedCell && !event.target.closest(".answer-cell-wrap") && !event.target.closest(".archive-inline-options")) {
          closeInlineOptions();
        }
      });
      document.addEventListener("mouseover", handleInlineMouseOver, true);
      document.addEventListener("mouseout", handleInlineMouseOut, true);
      window.addEventListener("resize", () => {
        fitPagesToViewport();
        if (view === "game") renderGame();
      });
      document.addEventListener("visibilitychange", () => {
        particles.paused = document.hidden;
      });

      // 本地储存：读取上次资料和音效设置。
      try {
        audio.enabled = localStorage.getItem(STORE.sound) !== "false";
        const savedPackage = localStorage.getItem(STORE.package);
        const savedHash = localStorage.getItem(STORE.packageHash);
        const savedSource = localStorage.getItem(STORE.packageSource);
        if (savedPackage) {
          packageData = JSON.parse(savedPackage);
          packageHash = savedHash || stableHash(savedPackage);
          packageSource = savedSource ? JSON.parse(savedSource) : { source: "local" };
          validation = validatePackage(packageData);
        }
      } catch {
        packageData = null;
        packageHash = "";
        packageSource = { source: "local" };
        validation = null;
      }

      renderDataLobby();

      function createEl(tag, className, text) {
        const el = document.createElement(tag);
        if (className) el.className = className;
        if (text !== undefined && text !== null) el.textContent = String(text);
        return el;
      }

      function button(text, className, onClick, attrs = {}) {
        const btn = createEl("button", className || "", text);
        btn.type = "button";
        if (onClick) btn.addEventListener("click", (event) => {
          playSound("click");
          onClick(event);
        });
        Object.entries(attrs).forEach(([key, value]) => {
          if (key === "disabled") btn.disabled = Boolean(value);
          else if (key === "ariaLabel") btn.setAttribute("aria-label", value);
          else btn.setAttribute(key, value);
        });
        return btn;
      }

      function clearNode(node) {
        node.replaceChildren();
      }

      function prefersReducedMotion() {
        return window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      }

      function runLocalSwitch(node, update) {
        if (!node || prefersReducedMotion()) {
          update();
          return;
        }
        node.classList.remove("local-switch-in");
        node.classList.add("local-switch-out");
        window.setTimeout(() => {
          update();
          node.classList.remove("local-switch-out");
          node.classList.add("local-switch-in");
          window.setTimeout(() => node.classList.remove("local-switch-in"), 220);
        }, 130);
      }

      function setPage(page) {
        if (view === "game" && page !== "game") {
          pauseCaseTimer();
        }
        view = page;
        clearInterval(timerHandle);
        timerHandle = 0;
      }

      function ensureProgressTiming(state) {
        if (!state) return;
        state.elapsedMs = Number.isFinite(Number(state.elapsedMs)) ? Math.max(0, Number(state.elapsedMs)) : 0;
        state.activeStartedAt = Number.isFinite(Number(state.activeStartedAt)) ? Math.max(0, Number(state.activeStartedAt)) : 0;
      }

      function resumeCaseTimer() {
        if (!currentCase || !progress || progress.completed || progress.failed) return;
        ensureProgressTiming(progress);
        if (!progress.activeStartedAt) {
          progress.activeStartedAt = Date.now();
          saveProgress();
        }
      }

      function pauseCaseTimer() {
        if (!progress) return;
        ensureProgressTiming(progress);
        const startedAt = Number(progress.activeStartedAt || 0);
        if (startedAt > 0) {
          progress.elapsedMs = Number(progress.elapsedMs || 0) + Math.max(0, Date.now() - startedAt);
          progress.activeStartedAt = 0;
          saveProgress();
        }
      }

      function getElapsedMs(state = progress) {
        if (!state) return 0;
        ensureProgressTiming(state);
        const active = state.activeStartedAt ? Math.max(0, Date.now() - state.activeStartedAt) : 0;
        return Number(state.elapsedMs || 0) + active;
      }

      function renderTopbar(title, subtitle, actions) {
        const top = createEl("header", "topbar");
        const titleBox = createEl("div", "top-title");
        titleBox.append(createEl("h1", "", title || "课堂推理游戏引擎"));
        if (subtitle) titleBox.append(createEl("p", "subtle", subtitle));
        const actionBox = createEl("div", "actions end");
        (actions || []).forEach((node) => actionBox.append(node));
        top.append(titleBox, actionBox);
        return top;
      }

      function renderDataLobby(message) {
        setPage("data");
        const safeMessage = typeof message === "string" ? message : "";
        const page = createEl("section", "page single");
        const shell = createEl("div", "center-shell");
        const panel = createEl("div", "panel stack");

        panel.append(createEl("span", "pill new", "侦探调查局入口"));
        panel.append(createEl("h1", "", "请上传游戏资料包"));
        if (safeMessage) panel.append(createEl("div", "notice warn", safeMessage));
        if (parseError) panel.append(createEl("div", "notice error", parseError));

        const two = createEl("div", "two-col");
        const left = createEl("div", "stack");
        const right = createEl("div", "stack");

        const fileInput = createEl("input");
        fileInput.type = "file";
        fileInput.accept = ".json,application/json";
        fileInput.id = "jsonFileInput";
        fileInput.addEventListener("change", handleFileImport);
        const fileLabel = button("导入资料包", "primary", openSourceChooser);

        left.append(fileInput, fileLabel);
        left.append(button("继续上次调查", "secondary", continueSavedPackage, { disabled: !packageData || !validation }));
        left.append(button("下载空白 JSON 模板", "ghost", downloadBlankTemplate));
        left.append(button("移除当前资料包", "danger", removeCurrentPackage, { disabled: !packageData }));

        const paste = createEl("textarea");
        paste.value = dataInputText;
        paste.placeholder = "在这里粘贴 JSON 资料包";
        paste.setAttribute("aria-label", "粘贴 JSON 游戏资料包");
        paste.addEventListener("input", () => {
          dataInputText = paste.value;
        });
        right.append(paste);
        right.append(button("读取调查资料", "primary", () => importText(paste.value)));

        two.append(left, right);
        panel.append(two);

        const foot = createEl("div", "notice");
        foot.append(createEl("span", "", "资料导入后会先进入“资料包鉴定报告”，检查通过后才可开始调查。"));
        panel.append(foot);

        shell.append(panel);
        page.append(shell);
        app.replaceChildren(page);
      }

      function openSourceChooser() {
        lastFocused = document.activeElement;
        modalLayer.setAttribute("aria-hidden", "false");
        modalLayer.classList.add("open");
        clearNode(modalLayer);
        const card = createEl("div", "modal-card source-choice-card");
        const head = createEl("div", "modal-head");
        const title = createEl("div", "stack");
        title.append(createEl("h2", "", "选择资料来源"));
        head.append(title, button("关闭", "icon-button ghost", closeModal, { ariaLabel: "关闭资料来源选择" }));
        const actions = createEl("div", "actions");
        actions.append(button("从本地设备上传", "primary", () => {
          closeModal();
          openLocalFilePicker();
        }));
        actions.append(button("从GitHub课程库选择", "secondary", () => {
          closeModal();
          renderGithubLibrary(true);
        }));
        actions.append(button("取消", "ghost", closeModal));
        card.append(head, actions);
        modalLayer.append(card);
        trapFocus(card);
      }

      function openLocalFilePicker() {
        const input = document.getElementById("jsonFileInput");
        if (input) {
          input.value = "";
          input.click();
        }
      }

      function githubContentsUrl() {
        const cfg = GITHUB_LIBRARY_CONFIG;
        return "https://api.github.com/repos/" + encodeURIComponent(cfg.owner) + "/" + encodeURIComponent(cfg.repo) + "/contents/" + encodeURIComponent(cfg.folder) + "?ref=" + encodeURIComponent(cfg.branch);
      }

      function renderGithubLibrary(forceReload = false) {
        setPage("githubLibrary");
        if (forceReload) {
          githubLibrary.loading = true;
          githubLibrary.error = "";
          githubLibrary.notice = "";
          githubLibrary.items = [];
          fetchGithubLibrary();
        }
        const page = createEl("section", "page github-library-page");
        page.append(renderTopbar("GitHub课程库", "从 game-data 文件夹选择课程 JSON。", [
          button("返回", "ghost", () => renderDataLobby()),
          button("重新读取课程库", "secondary", () => renderGithubLibrary(true))
        ]));
        const shell = createEl("div", "shell");
        const panel = createEl("div", "panel stack");
        if (githubLibrary.notice) panel.append(createEl("div", "notice", githubLibrary.notice));
        if (githubLibrary.error) {
          panel.append(renderGithubErrorActions());
        } else {
          const controls = createEl("div", "library-controls");
          const search = createEl("input");
          search.type = "search";
          search.placeholder = "搜索课程关键词";
          search.value = githubLibrary.filterText || "";
          search.addEventListener("input", () => {
            githubLibrary.filterText = search.value;
            renderGithubLibrary(false);
          });
          controls.append(search, makeLibrarySelect("subject", "全部科目", getLibraryFacetValues("subject")), makeLibrarySelect("level", "全部年级", getLibraryFacetValues("level")));
          panel.append(controls);

          if (githubLibrary.loading) panel.append(createEl("div", "notice", "正在读取GitHub课程库……"));
          const grid = createEl("div", "course-grid");
          getFilteredGithubItems().forEach((item) => grid.append(renderCourseCard(item)));
          if (!grid.children.length && !githubLibrary.loading) grid.append(createEl("div", "notice warn", "没有找到符合条件的课程。"));
          panel.append(grid);
        }
        shell.append(panel);
        page.append(shell);
        app.replaceChildren(page);
      }

      function renderGithubErrorActions() {
        const box = createEl("div", "item-card stack");
        box.append(createEl("div", "notice error", "暂时无法读取GitHub课程库，请重试或改用本地JSON上传。"));
        const actions = createEl("div", "actions");
        actions.append(button("重试", "primary", () => renderGithubLibrary(true)));
        actions.append(button("从本地设备上传", "secondary", () => {
          renderDataLobby();
          requestAnimationFrame(openLocalFilePicker);
        }));
        actions.append(button("关闭", "ghost", () => renderDataLobby()));
        box.append(actions);
        return box;
      }

      async function fetchGithubLibrary() {
        try {
          const response = await fetch(githubContentsUrl(), { cache: "no-store" });
          if (!response.ok) throw new Error("GitHub API " + response.status);
          const data = await response.json();
          if (!Array.isArray(data)) throw new Error("GitHub目录结构无效");
          const files = data
            .filter((item) => item && item.type === "file" && /\.json$/i.test(item.name || "") && item.download_url)
            .map((item, index) => ({
              index,
              name: item.name,
              path: item.path,
              download_url: item.download_url,
              loading: true,
              error: "",
              meta: { packageTitle: item.name, subject: "", level: "", description: "" }
            }));
          githubLibrary.items = files;
          githubLibrary.loading = false;
          githubLibrary.error = "";
          if (view === "githubLibrary") renderGithubLibrary(false);
          files.forEach((item) => fetchGithubCourseMeta(item));
        } catch (error) {
          githubLibrary.loading = false;
          githubLibrary.error = error && error.message ? error.message : "GitHub读取失败";
          if (view === "githubLibrary") renderGithubLibrary(false);
        }
      }

      async function fetchGithubCourseMeta(item) {
        try {
          const response = await fetch(item.download_url, { cache: "no-store" });
          if (!response.ok) throw new Error("读取失败");
          const data = await response.json();
          item.meta = {
            packageTitle: data.packageTitle || data.title || item.name,
            subject: data.subject || "",
            level: data.level || "",
            description: data.description || ""
          };
          item.loading = false;
        } catch (error) {
          item.loading = false;
          item.error = "无法预览课程信息";
        }
        if (view === "githubLibrary") renderGithubLibrary(false);
      }

      function makeLibrarySelect(field, label, values) {
        const select = createEl("select");
        select.setAttribute("aria-label", label);
        select.append(createEl("option", "", label));
        values.forEach((value) => {
          const option = createEl("option", "", value);
          option.value = value;
          if (githubLibrary[field] === value) option.selected = true;
          select.append(option);
        });
        select.addEventListener("change", () => {
          githubLibrary[field] = select.value;
          renderGithubLibrary(false);
        });
        return select;
      }

      function getLibraryFacetValues(field) {
        return [...new Set(githubLibrary.items.map((item) => item.meta && item.meta[field]).filter(Boolean))].sort((a, b) => String(a).localeCompare(String(b), "zh-Hans-CN"));
      }

      function getFilteredGithubItems() {
        const keyword = String(githubLibrary.filterText || "").trim().toLowerCase();
        return githubLibrary.items.filter((item) => {
          const meta = item.meta || {};
          if (githubLibrary.subject && meta.subject !== githubLibrary.subject) return false;
          if (githubLibrary.level && meta.level !== githubLibrary.level) return false;
          if (!keyword) return true;
          return [item.name, meta.packageTitle, meta.subject, meta.level, meta.description].some((value) => String(value || "").toLowerCase().includes(keyword));
        });
      }

      function renderCourseCard(item) {
        const meta = item.meta || {};
        const card = createEl("article", "item-card course-card");
        card.append(createEl("span", "pill", item.name || ""));
        card.append(createEl("h3", "", meta.packageTitle || item.name || "未命名课程"));
        if (meta.subject) card.append(createEl("span", "pill visible", "科目：" + meta.subject));
        if (meta.level) card.append(createEl("span", "pill partial", "年级：" + meta.level));
        card.append(createEl("p", "subtle", meta.description || (item.loading ? "正在读取课程信息……" : item.error || "暂无课程描述。")));
        card.append(button(item.loading ? "正在读取" : "载入课程", "primary", () => loadGithubCourse(item), { disabled: item.loading }));
        return card;
      }

      async function loadGithubCourse(item) {
        if (!item || !item.download_url) return;
        githubLibrary.notice = "正在读取课程资料……";
        renderGithubLibrary(false);
        try {
          const response = await fetch(item.download_url, { cache: "no-store" });
          if (!response.ok) throw new Error("课程读取失败：" + response.status);
          const text = await response.text();
          let data;
          try {
            data = JSON.parse(text);
          } catch (error) {
            throw new Error("JSON格式错误：" + error.message);
          }
          importPackageData(data, text, {
            source: "github",
            githubFileName: item.name || "",
            githubPath: item.path || "",
            packageId: data.packageId || "",
            packageTitle: data.packageTitle || item.name || ""
          });
        } catch (error) {
          githubLibrary.notice = "";
          githubLibrary.error = error && error.message ? error.message : "GitHub课程读取失败";
          renderGithubLibrary(false);
        }
      }

      function handleFileImport(event) {
        const file = event.target.files && event.target.files[0];
        if (!file) return;
        if (!/\.json$/i.test(file.name || "")) {
          parseError = "请选择 .json 格式的资料包。";
          renderDataLobby();
          return;
        }
        unlockAudio();
        const reader = new FileReader();
        reader.onload = () => importText(String(reader.result || ""), { source: "local" });
        reader.onerror = () => {
          parseError = "文件读取失败，请重新选择 JSON 文件。";
          renderDataLobby();
        };
        reader.readAsText(file, "utf-8");
      }

      function importText(text, sourceMeta = { source: "local" }) {
        parseError = "";
        if (!String(text || "").trim()) {
          parseError = "JSON 内容为空，请上传或粘贴资料包。";
          renderDataLobby();
          return;
        }
        let data;
        try {
          data = JSON.parse(text);
        } catch (error) {
          parseError = "JSON 语法错误：" + error.message;
          renderDataLobby();
          return;
        }
        importPackageData(data, String(text || ""), Object.assign({ source: "local" }, sourceMeta || {}));
      }

      function importPackageData(data, serializedText, sourceMeta, autoEnterLobby = false) {
        clearAllProgress();
        packageData = data;
        const serialized = serializedText || JSON.stringify(data);
        packageHash = stableHash(serialized);
        packageSource = Object.assign({
          source: "local",
          githubFileName: "",
          githubPath: "",
          packageId: data && data.packageId ? data.packageId : "",
          packageTitle: data && data.packageTitle ? data.packageTitle : ""
        }, sourceMeta || {});
        validation = validatePackage(data);
        try {
          localStorage.setItem(STORE.package, serialized);
          localStorage.setItem(STORE.packageHash, packageHash);
          localStorage.setItem(STORE.packageSource, JSON.stringify(packageSource));
        } catch {
          validation.warnings.push("浏览器本地储存不可用，本次游戏仍可继续。");
        }
        validationPage = 0;
        validationReportExpanded = false;
        if (autoEnterLobby && validation && !validation.errors.length) renderOpeningStory();
        else renderValidation();
      }

      function continueSavedPackage() {
        parseError = "";
        if (!packageData || !validation) {
          renderDataLobby("没有可继续使用的资料包。");
          return;
        }
        renderValidation();
      }

      function removeCurrentPackage() {
        packageData = null;
        packageHash = "";
        validation = null;
        currentCaseId = "";
        currentCase = null;
        progress = null;
        validationReportExpanded = false;
        clearAllProgress();
        try {
          localStorage.removeItem(STORE.package);
          localStorage.removeItem(STORE.packageHash);
          localStorage.removeItem(STORE.packageSource);
        } catch {}
        renderDataLobby("当前资料包已移除。");
      }

      function downloadBlankTemplate() {
        const blob = new Blob([JSON.stringify(blankTemplate, null, 2)], { type: "application/json;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = createEl("a");
        link.href = url;
        link.download = "空白游戏资料包模板.json";
        document.body.append(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      // 资料验证：只检查结构、引用、格式和线索依赖，不判断课程知识正确性。
      function validatePackage(data) {
        const errors = [];
        const warnings = [];
        const checks = [];
        const ok = (label) => checks.push({ ok: true, text: label });
        const fail = (label) => {
          errors.push(label);
          checks.push({ ok: false, text: label });
        };
        const warn = (label) => {
          warnings.push(label);
          checks.push({ ok: true, warn: true, text: label });
        };

        if (!data || typeof data !== "object" || Array.isArray(data)) {
          fail("资料包必须是 JSON 对象。");
          return { errors, warnings, checks };
        }
        data.schemaVersion === "1.0" ? ok("schemaVersion 受到支持。") : fail("schemaVersion 必须为 1.0。");
        Array.isArray(data.cases) && data.cases.length > 0 ? ok("至少包含一宗案件。") : fail("必须至少包含一宗案件。");
        data.openingStory === undefined || typeof data.openingStory === "string" ? ok("openingStory 开场故事字段受到支持。") : fail("openingStory 必须是字符串。");
        data.endingStory === undefined || typeof data.endingStory === "string" ? ok("endingStory 尾声剧情字段受到支持。") : fail("endingStory 必须是字符串。");
        if (data.packageStory !== undefined) {
          typeof data.packageStory === "string" ? warn("packageStory 是旧版总剧情字段，建议改用 openingStory。") : fail("packageStory 必须是字符串。");
        }

        (Array.isArray(data.cases) ? data.cases : []).forEach((caseItem, index) => {
          const label = caseItem && caseItem.title ? caseItem.title : "第" + (index + 1) + "宗案件";
          if (!caseItem || typeof caseItem !== "object") {
            fail(label + "必须是对象。");
            return;
          }
          caseItem.id ? ok(label + "拥有案件 ID。") : fail(label + "缺少案件 ID。");
          caseItem.entityType && caseItem.entityLabel ? ok(label + "拥有 entityType 和 entityLabel。") : fail(label + "必须提供 entityType 和 entityLabel。");

          const entities = Array.isArray(caseItem.entities) ? caseItem.entities : [];
          const categories = Array.isArray(caseItem.categories) ? caseItem.categories : [];
          const clues = Array.isArray(caseItem.clues) ? caseItem.clues : [];
          const storyEvents = Array.isArray(caseItem.storyEvents) ? caseItem.storyEvents : [];
          const solution = caseItem.solution && typeof caseItem.solution === "object" ? caseItem.solution : {};
          const totalCells = entities.length * categories.length;

          entities.length >= 3 ? ok(label + "至少包含 3 个档案对象。") : fail(label + "至少需要 3 个档案对象。");
          categories.length >= 2 ? ok(label + "至少包含 2 个配对类别。") : fail(label + "至少需要 2 个配对类别。");

          const entityIds = new Set();
          entities.forEach((entity, entityIndex) => {
            if (!entity || typeof entity !== "object") {
              fail(label + "的第" + (entityIndex + 1) + "个档案对象必须是对象。");
              return;
            }
            if (!entity.id) fail(label + "有档案对象缺少 ID。");
            else if (entityIds.has(entity.id)) fail(label + "档案对象 ID 重复：" + entity.id);
            else entityIds.add(entity.id);
            const iconIssues = validateIconSpec(entity.iconSpec);
            iconIssues.forEach((issue) => fail(label + "的档案对象 " + safeLabel(entity.id, "未命名对象") + " 的 " + issue + "。"));
            if (entity.records !== undefined) {
              if (!Array.isArray(entity.records)) {
                fail(label + "的档案对象 " + safeLabel(entity.id, "未命名对象") + " 的 records 必须是数组。");
              } else {
                entity.records.forEach((record, recordIndex) => {
                  const path = "records[" + recordIndex + "]";
                  if (!record || typeof record !== "object") {
                    fail(label + "的档案对象 " + safeLabel(entity.id, "未命名对象") + " 的 " + path + " 必须是对象。");
                    return;
                  }
                  if (!isNonEmptyString(record.label)) fail(label + "的档案对象 " + safeLabel(entity.id, "未命名对象") + " 的 " + path + ".label 不能为空。");
                  if (!isNonEmptyString(record.text)) fail(label + "的档案对象 " + safeLabel(entity.id, "未命名对象") + " 的 " + path + ".text 不能为空。");
                });
              }
            }
          });
          if (entityIds.size === entities.length && entities.length) ok(label + "档案对象 ID 唯一。");

          const categoryIds = new Set();
          const optionIds = new Set();
          const optionsByCategory = new Map();
          categories.forEach((category, categoryIndex) => {
            if (!category || typeof category !== "object") {
              fail(label + "的第" + (categoryIndex + 1) + "个类别必须是对象。");
              return;
            }
            if (!category.id) fail(label + "有类别缺少 ID。");
            else if (categoryIds.has(category.id)) fail(label + "类别 ID 重复：" + category.id);
            else categoryIds.add(category.id);
            if (!isNonEmptyString(category.label)) fail(label + "的类别 " + safeLabel(category.id, "未命名类别") + " 缺少 label。");
            const options = Array.isArray(category.options) ? category.options : [];
            optionsByCategory.set(category.id, new Set(options.map((option) => option && option.id).filter(Boolean)));
            options.length === entities.length ? ok(label + "中类别“" + safeLabel(category.label, category.id) + "”的选项数量正确。") : fail(label + "中类别“" + safeLabel(category.label, category.id) + "”的选项数量必须与档案对象数量一致。");
            options.forEach((option) => {
              if (!option || !option.id) fail(label + "有选项缺少 ID。");
              else {
                if (optionIds.has(option.id)) fail(label + "选项 ID 重复：" + option.id);
                else optionIds.add(option.id);
                if (!isNonEmptyString(option.label)) fail(label + "的选项 " + option.id + " 缺少 label。");
              }
            });
          });
          if (categoryIds.size === categories.length && categories.length) ok(label + "类别 ID 唯一。");
          if (optionIds.size && !hasDuplicateOptions(categories)) ok(label + "选项 ID 唯一。");

          entities.forEach((entity) => {
            if (!entity || !entity.id) return;
            const row = solution[entity.id];
            if (!row || typeof row !== "object") {
              fail(label + "的 solution 缺少档案对象答案：" + entity.id);
              return;
            }
            categories.forEach((category) => {
              if (!category || !category.id) return;
              const optionId = row[category.id];
              if (!optionId) fail(label + "的 " + entity.id + "::" + category.id + " 缺少答案。");
              else if (!optionsByCategory.get(category.id) || !optionsByCategory.get(category.id).has(optionId)) {
                fail(label + "的 solution 引用了不存在的选项：" + entity.id + "::" + category.id + " → " + optionId);
              }
            });
          });

          categories.forEach((category) => {
            if (!category || !category.id) return;
            const used = new Map();
            entities.forEach((entity) => {
              const optionId = solution[entity.id] && solution[entity.id][category.id];
              if (!optionId) return;
              used.set(optionId, (used.get(optionId) || 0) + 1);
            });
            const repeated = [...used.entries()].filter((entry) => entry[1] !== 1);
            repeated.length ? fail(label + "中类别“" + safeLabel(category.label, category.id) + "”的 solution 选项必须各使用一次。") : ok(label + "中类别“" + safeLabel(category.label, category.id) + "”的选项各使用一次。");
          });

          const validCells = new Set();
          entities.forEach((entity) => categories.forEach((category) => validCells.add(cellId(entity.id, category.id))));
          const parseCellRef = (id) => {
            if (typeof id !== "string") return null;
            const parts = id.split("::");
            return parts.length === 2 && parts[0] && parts[1] ? { entityId: parts[0], categoryId: parts[1] } : null;
          };
          const countSameCategoryUnlocks = (unlockAfter, categoryId) => {
            if (!Array.isArray(unlockAfter) || !categoryId) return 0;
            return unlockAfter.filter((id) => {
              const ref = parseCellRef(id);
              return ref && ref.categoryId === categoryId;
            }).length;
          };
          const getRelatedCategoryIds = (clue) => {
            const ids = new Set();
            (Array.isArray(clue && clue.relatedCells) ? clue.relatedCells : []).forEach((id) => {
              const ref = parseCellRef(id);
              if (ref && ref.categoryId) ids.add(ref.categoryId);
            });
            return ids;
          };
          const hasUnlockRelatedCell = (clue) => {
            const related = new Set(Array.isArray(clue && clue.relatedCells) ? clue.relatedCells : []);
            const unlock = Array.isArray(clue && clue.unlockAfter) ? clue.unlockAfter : [];
            return unlock.some((id) => related.has(id));
          };

          const clueIds = new Set();
          clues.forEach((clue) => {
            if (!clue || !clue.id) fail(label + "有线索缺少 ID。");
            else if (clueIds.has(clue.id)) fail(label + "线索 ID 重复：" + clue.id);
            else clueIds.add(clue.id);
            ["relatedCells", "completeAfter", "unlockAfter"].forEach((field) => {
              const list = Array.isArray(clue && clue[field]) ? clue[field] : [];
              list.forEach((id) => {
                if (!validCells.has(id)) fail(label + "的线索引用了不存在的格子：" + id);
              });
            });
            if (clue && !clue.initial && (!Array.isArray(clue.unlockAfter) || clue.unlockAfter.length === 0)) {
              fail(label + "有非初始线索缺少 unlockAfter，无法自然出现：" + safeLabel(clue.text, clue.id));
            }
            if (clue && clue.completeMode && !["all", "any"].includes(clue.completeMode)) fail(label + "线索 completeMode 只支持 all 或 any。");
            if (clue && clue.unlockMode && !["all", "any"].includes(clue.unlockMode)) fail(label + "线索 unlockMode 只支持 all 或 any。");
            if (clue && ["feature", "relation", "cross"].includes(clue.type)) {
              if (clue.initial === true) warn(label + "的间接/关联线索不建议设为 initial:true：" + safeLabel(clue.text, clue.id));
              if (!Array.isArray(clue.unlockAfter) || clue.unlockAfter.length === 0) warn(label + "的间接/关联线索建议在至少一条相关格子确认后出现：" + safeLabel(clue.text, clue.id));
              if (clue.unlockMode !== "any") warn(label + "的间接/关联线索建议使用 unlockMode:\"any\"：" + safeLabel(clue.text, clue.id));
              if (Array.isArray(clue.unlockAfter) && clue.unlockAfter.length && Array.isArray(clue.relatedCells) && clue.relatedCells.length && !hasUnlockRelatedCell(clue)) {
                warn(label + "的间接/关联线索 unlockAfter 建议至少包含一个 relatedCells 中的相关格子：" + safeLabel(clue.text, clue.id));
              }
            }
            if (clue && clue.type === "negative") {
              const unlock = Array.isArray(clue.unlockAfter) ? clue.unlockAfter : [];
              if (clue.initial === true) warn(label + "的否定线索不建议设为 initial:true：" + safeLabel(clue.text, clue.id));
              if (clue.unlockMode !== "all") warn(label + "的否定线索建议使用 unlockMode:\"all\"：" + safeLabel(clue.text, clue.id));
              const relatedCategoryIds = getRelatedCategoryIds(clue);
              if (relatedCategoryIds.size !== 1) {
                warn(label + "的否定线索应通过 relatedCells 指向唯一类别，方便判断是否只剩最后两个候选：" + safeLabel(clue.text, clue.id));
              } else {
                const categoryId = [...relatedCategoryIds][0];
                const required = Math.max(0, entities.length - 2);
                const actual = countSameCategoryUnlocks(unlock, categoryId);
                if (actual < required) {
                  warn(label + "的否定线索建议在类别“" + safeLabel(categoryId, "未知类别") + "”只剩最后两个候选时出现；当前同类别 unlockAfter 为 " + actual + "/" + required + "：" + safeLabel(clue.text, clue.id));
                }
              }
            }
          });
          clueIds.size === clues.length && clues.length ? ok(label + "线索 ID 唯一。") : null;
          clues.some((clue) => clue && clue.initial === true) ? ok(label + "至少有一条初始线索。") : fail(label + "必须至少有一条 initial 为 true 的初始线索。");

          const eventIds = new Set();
          storyEvents.forEach((eventItem) => {
            if (!eventItem || !eventItem.id) fail(label + "有剧情事件缺少 ID。");
            else if (eventIds.has(eventItem.id)) fail(label + "剧情事件 ID 重复：" + eventItem.id);
            else eventIds.add(eventItem.id);
            const trigger = Number(eventItem && eventItem.triggerAfterCorrectCells);
            Number.isInteger(trigger) && trigger > 0 && trigger <= totalCells ? ok(label + "剧情事件触发数量有效。") : fail(label + "剧情事件 triggerAfterCorrectCells 必须大于 0 且不超过总格子数。");
          });
          if (eventIds.size === storyEvents.length) ok(label + "剧情事件 ID 唯一。");
        });

        if (!errors.length) checks.unshift({ ok: true, text: "资料检查完成，可以开始调查。" });
        return { errors, warnings, checks };
      }

      function hasDuplicateOptions(categories) {
        const seen = new Set();
        for (const category of categories) {
          for (const option of (category.options || [])) {
            if (!option || !option.id) continue;
            if (seen.has(option.id)) return true;
            seen.add(option.id);
          }
        }
        return false;
      }

      function validateIconSpec(spec) {
        if (!spec || typeof spec !== "object") return ["缺少 iconSpec"];
        const issues = [];
        if (spec.mode !== "generated") issues.push("iconSpec.mode 缺失或不受支持");
        if (!SHAPES.includes(spec.shape)) issues.push("iconSpec.shape 缺失或不受支持");
        if (!PATTERNS.includes(spec.pattern)) issues.push("iconSpec.pattern 缺失或不受支持");
        ["primaryColor", "secondaryColor", "accentColor"].forEach((key) => {
          if (!isHexColor(spec[key])) issues.push("iconSpec." + key + " 缺失或不是 HEX 颜色");
        });
        return issues;
      }

      function getOpeningStoryPieces() {
        const opening = packageData && typeof packageData.openingStory === "string" ? packageData.openingStory.trim() : "";

        const legacy = packageData && typeof packageData.packageStory === "string" ? packageData.packageStory.trim() : "";

        const pieces = [];
        (packageData && Array.isArray(packageData.cases) ? packageData.cases : []).forEach((caseItem, index) => {
          if (!caseItem || typeof caseItem !== "object") return;
          const texts = [];
          if (caseItem.story) texts.push(caseItem.story);
          const narrative = caseItem.narrative && typeof caseItem.narrative === "object" ? caseItem.narrative : null;
          if (narrative && narrative.opening) texts.push(narrative.opening);
          if (!texts.length && caseItem.goal) texts.push(caseItem.goal);
          if (texts.length) {
            pieces.push({
              label: caseItem.title || "第" + (index + 1) + "宗案件",
              text: texts.join("\n\n")
            });
          }
        });
        return pieces.length ? pieces : [{ label: "开场故事", text: "资料包已载入，请进入档案墙选择案件。" }];

      function renderCaseLobby() {
        setPage("cases");
        const cases = packageData && Array.isArray(packageData.cases) ? packageData.cases : [];
        const page = createEl("section", "page case-lobby-page");
        page.append(renderTopbar(packageData && packageData.packageTitle ? packageData.packageTitle : "案件大厅", "待调查案件柜：请选择一宗案件查看简报。", [

        ]));

        const shell = createEl("div", "shell");

        panel.append(createEl("h2", "", "案件档案墙"));

        const perPage = getCardPageSize();
        const totalPages = getCaseLobbyTotalPages(cases.length, perPage);
        casePage = clamp(casePage, 0, totalPages - 1);
        const grid = createEl("div", "card-grid case-lobby-grid");
        renderCaseLobbyCards(grid, cases, perPage);
        panel.append(grid, renderPager(casePage, totalPages, "页", (next) => {
          casePage = next;
          updateCaseLobbyAfterPageChange(grid, cases, perPage);
        }));
        shell.append(panel);

        app.replaceChildren(page);

      function updateCaseLobbyAfterPageChange(grid, cases, perPage) {
        if (!grid) return;
        const oldPager = grid.nextElementSibling;
        runLocalSwitch(grid, () => {
          renderCaseLobbyCards(grid, cases, perPage);
          const newPager = renderCaseLobbyPager(grid, cases, perPage);
          if (oldPager) oldPager.replaceWith(newPager);
          else grid.after(newPager);
        });
      }

      function renderCaseLobbyPager(grid, cases, perPage) {
        const totalPages = getCaseLobbyTotalPages(cases.length, perPage);
        casePage = clamp(casePage, 0, totalPages - 1);
        const pager = renderPager(casePage, totalPages, "页", (next) => {
          casePage = next;
          updateCaseLobbyAfterPageChange(grid, cases, perPage);
        });
        pager.classList.add("case-lobby-pager");
        return pager;
      }

      function renderCaseLobbyCards(grid, cases, perPage) {
        clearNode(grid);
        const totalPages = getCaseLobbyTotalPages(cases.length, perPage);
        casePage = clamp(casePage, 0, totalPages - 1);
        if (casePage === 0) grid.append(renderInvestigatorManualCard());
        const range = getCaseLobbySliceRange(casePage, cases.length, perPage);
        cases.slice(range.start, range.end).forEach((caseItem) => {
          grid.append(renderCaseLobbyCard(caseItem));
        });
      }

      function getCaseLobbyTotalPages(totalCases, perPage) {
        const firstPageCases = Math.max(1, perPage - 1);
        if (totalCases <= firstPageCases) return 1;
        return 1 + Math.ceil((totalCases - firstPageCases) / perPage);
      }

      function getCaseLobbySliceRange(pageIndex, totalCases, perPage) {
        const firstPageCases = Math.max(1, perPage - 1);
        if (pageIndex <= 0) return { start: 0, end: Math.min(totalCases, firstPageCases) };
        const start = firstPageCases + (pageIndex - 1) * perPage;
        return { start, end: Math.min(totalCases, start + perPage) };
      }

          "调查失败：错误次数太多会导致调查失败。请先读线索，再选择答案。"

        });

      function boldManualKeywords(text) {
        const keywords = ["线索卡", "档案表", "空白格", "选对", "选错", "提示", "真实名称", "结案报告", "调查失败", "锁定"];
        let html = String(text)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
        keywords.forEach((word) => {
          html = html.replaceAll(word, "<strong class=\"manual-keyword\">" + word + "</strong>");
        });
        return html;
      }

      function renderCaseLobbyCard(caseItem) {
        const card = createEl("article", "item-card");

        card.append(createEl("p", "subtle", caseItem.goal || caseItem.story || "未填写案件目标。"));

        const cells = getTotalCells(caseItem);
        const count = saved ? saved.correctCells.length : 0;
        card.append(createEl("div", done ? "notice success" : "notice", done ? "已完成" : "档案完成度：" + count + "/" + cells));

      }

      function renderCaseLobbyCardActions(caseItem, done, count) {

      function openCaseIntro(id) {
        currentCaseId = id;
        currentCase = findCase(id);

        playSound("openCase");
        renderCaseIntro();
      }

      function openCompletionReport(id) {
        currentCaseId = id;
        currentCase = findCase(id);
        if (!currentCase) {
          renderCaseLobby();
          return;
        }
        progress = loadProgress(id) || createProgress(currentCase);
        ensureProgressState(currentCase, progress);
        if (!progress.completed) {
          renderCaseIntro();
          return;
        }
        renderCompletion();
      }

      function renderCaseIntro() {
        setPage("intro");
        if (!currentCase) {
          renderCaseLobby();

        }
        const entityLabel = getEntityLabel(currentCase);
        const page = createEl("section", "page intro-page");

        const intro = createEl("div", "item-card intro-narrative-card");

            resetCaseProgress(currentCase.id);

            renderCaseIntro();

          actions.append(button("开始调查", "primary", startCase));
