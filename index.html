      function renderNarrativePager(totalPages) {
        const pager = renderPager(narrativePage, totalPages, "段", (next) => {
          narrativePage = next;
          updateNarrativeContent();
        });
        pager.classList.add("intro-pager");
        return pager;
      }

      function updateNarrativeContent() {
        if (view !== "intro" || !currentCase) return;
        const pieces = getNarrativePieces(currentCase);
        const totalPages = Math.max(1, pieces.length);
        narrativePage = clamp(narrativePage, 0, totalPages - 1);
        const piece = pieces[narrativePage];
        const label = app.querySelector(".intro-narrative-label");
        const text = app.querySelector(".intro-narrative-text");
        const pager = app.querySelector(".intro-pager");
        const card = app.querySelector(".intro-narrative-card");
        if (label) label.textContent = piece.label;
        if (text) text.textContent = piece.text || "未填写";
        if (pager) pager.replaceWith(renderNarrativePager(totalPages));
        if (card && !prefersReducedMotion()) {
          card.classList.remove("local-switch-in");
          void card.offsetWidth;
          card.classList.add("local-switch-in");
          window.setTimeout(() => card.classList.remove("local-switch-in"), 220);
        }
      }

      function getNarrativePieces(caseItem) {
        const narrative = caseItem.narrative && typeof caseItem.narrative === "object" ? caseItem.narrative : null;
        const pieces = [];
        if (narrative) {
          if (narrative.opening) pieces.push({ label: "开场", text: narrative.opening });
          if (narrative.problem) pieces.push({ label: "发生的问题", text: narrative.problem });
          if (narrative.mission) pieces.push({ label: "调查任务", text: narrative.mission });
          if (!pieces.length && narrative.theme) pieces.push({ label: "主题", text: narrative.theme });
        }
        if (!pieces.length) {
          if (caseItem.story) pieces.push({ label: "开场", text: caseItem.story });
          if (caseItem.goal) pieces.push({ label: "调查任务", text: caseItem.goal });
        }
        return pieces.length ? pieces : [{ label: "案件介绍", text: caseItem.title || "" }];
      }

      function startCase() {
        if (!currentCase) return;
        progress = loadProgress(currentCase.id) || createProgress(currentCase);
        ensureProgressState(currentCase, progress);
        currentCaseId = currentCase.id;
        saveProgress();
        cluePage = Number(progress.cluePage || 0);
        selectedCell = null;
        renderGame();
      }

      function createProgress(caseItem) {
        const clueStatus = {};
        (caseItem.clues || []).forEach((clue) => {
          clueStatus[clue.id] = "hidden";
        });
        const state = {
          caseId: caseItem.id,
          correctCells: [],
          clueStatus,
          storyEventsShown: [],
          errors: 0,
          hints: 0,
          startTime: Date.now(),
          elapsedMs: 0,
          activeStartedAt: 0,
          completed: false,
          completedAt: 0,
          failed: false,
          failedAt: 0,
          soundEnabled: audio.enabled,
          cluePage: 0,
          clueScrollLeft: 0,
          categoryOrder: [],
          optionOrderByCategory: {},
          revealedEntities: []
        };
        normalizeClueActivity(caseItem, state);
        return state;
      }

      // 随机顺序和名称揭示状态只补字段，不改动 JSON 原始数据。
      function ensureProgressState(caseItem, state) {
        if (!caseItem || !state) return;
        state.correctCells = Array.isArray(state.correctCells) ? state.correctCells : [];
        state.clueStatus = state.clueStatus || {};
        (caseItem.clues || []).forEach((clue) => {
          if (!state.clueStatus[clue.id]) state.clueStatus[clue.id] = clue.initial === true ? "visible" : "hidden";
        });
        state.storyEventsShown = Array.isArray(state.storyEventsShown) ? state.storyEventsShown : [];
        state.revealedEntities = Array.isArray(state.revealedEntities) ? state.revealedEntities : [];
        state.cluePage = Number.isFinite(Number(state.cluePage)) ? Number(state.cluePage) : 0;
        state.clueScrollLeft = Number.isFinite(Number(state.clueScrollLeft)) ? Number(state.clueScrollLeft) : 0;
        state.completed = state.completed === true;
        state.completedAt = Number(state.completedAt || 0);
        state.failed = state.failed === true;
        state.failedAt = Number(state.failedAt || 0);
        ensureProgressTiming(state);
        if (state.completed || state.failed) state.activeStartedAt = 0;

        const settings = getEngineSettings(caseItem);
        const categories = Array.isArray(caseItem.categories) ? caseItem.categories : [];
        const categoryIds = categories.map((category) => category.id).filter(Boolean);
        if (settings.randomizeCategoryOrder) {
          state.categoryOrder = isSameIdList(state.categoryOrder, categoryIds) ? state.categoryOrder.slice() : shuffleCopy(categoryIds);
        } else {
          state.categoryOrder = categoryIds.slice();
        }

        const orderMap = state.optionOrderByCategory && typeof state.optionOrderByCategory === "object" ? state.optionOrderByCategory : {};
        categories.forEach((category) => {
          const optionIds = (Array.isArray(category.options) ? category.options : []).map((option) => option.id).filter(Boolean);
          if (settings.randomizeOptionOrder) {
            orderMap[category.id] = isSameIdList(orderMap[category.id], optionIds) ? orderMap[category.id].slice() : shuffleCopy(optionIds);
          } else {
            orderMap[category.id] = optionIds.slice();
          }
        });
        state.optionOrderByCategory = orderMap;
        normalizeClueActivity(caseItem, state);
        updateEntityRevealState();
      }

      function getEngineSettings(caseItem) {
        const packageSettings = packageData && packageData.settings && typeof packageData.settings === "object" ? packageData.settings : {};
        const caseSettings = caseItem && caseItem.settings && typeof caseItem.settings === "object" ? caseItem.settings : {};
        const merged = Object.assign({}, packageSettings, caseSettings);
        const nameReveal = merged.nameReveal && typeof merged.nameReveal === "object" ? merged.nameReveal : {};
        return {
          randomizeOptionOrder: merged.randomizeOptionOrder !== false,
          randomizeCategoryOrder: merged.randomizeCategoryOrder === true,
          shuffleMode: merged.shuffleMode || "perCase",
          nameReveal: {
            enabled: nameReveal.enabled !== false,
            threshold: Number.isFinite(Number(nameReveal.threshold)) ? Number(nameReveal.threshold) : 0.66,
            comparison: nameReveal.comparison || "gte",
            mode: nameReveal.mode || "perEntity",
            autoReveal: nameReveal.autoReveal !== false
          }
        };
      }

      function isSameIdList(saved, source) {
        if (!Array.isArray(saved) || saved.length !== source.length) return false;
        const set = new Set(source);
        return saved.every((id) => set.has(id)) && new Set(saved).size === set.size;
      }

      function shuffleCopy(list) {
        const copy = list.slice();
        for (let i = copy.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
      }

      function renderGame() {
        setPage("game");
        if (!currentCase || !progress) {
          renderCaseLobby();
          return;
        }
        if (progress.failed) {
          renderFailure();
          return;
        }
        const page = createEl("section", "page game-page");
        page.append(renderTopbar(currentCase.title || "调查中", getGameSubtitle(), [
          button("提示", "secondary", useHint, { disabled: progress.completed || progress.failed }),
          soundToggle(),
          button("案件大厅", "ghost", () => {
            saveProgress();
            renderCaseLobby();
          })
        ]));

        const shell = createEl("div", "shell");
        const layout = createEl("div", "game-layout");
        layout.append(renderArchiveTable(), renderClueArea());
        shell.append(layout);
        page.append(shell);
        app.replaceChildren(page);
        requestAnimationFrame(() => {
          fitArchiveViewport();
          positionInlinePanels();
        });

        checkStalledClues();
        resumeCaseTimer();
        startTimer();
      }

      function refreshGameView(parts = { archive: true, clues: true }) {
        if (view !== "game" || !currentCase || !progress) return;
        const layout = app.querySelector(".game-layout");
        if (!layout) {
          renderGame();
          return;
        }
        const archive = layout.children[0];
        const clues = layout.children[1];
        if (parts.clues) captureClueScroll();
        if (parts.archive && archive) archive.replaceWith(renderArchiveTable());
        if (parts.clues && clues) clues.replaceWith(renderClueArea());
        updateGameTopbar();
        requestAnimationFrame(() => {
          fitArchiveViewport();
          positionInlinePanels();
        });
        checkStalledClues();
      }

      function updateGameTopbar() {
        const top = app.querySelector(".topbar .subtle");
        if (top) top.textContent = getGameSubtitle();
      }

      function captureClueScroll() {
        if (!progress) return;
        if (Number(progress.clueScrollLeft) < 0) return;
        const scroll = app.querySelector(".clue-scroll");
        if (!scroll) return;
        progress.clueScrollLeft = scroll.scrollLeft;
        progress.cluePage = getCluePageFromScroll(scroll);
      }

      function getCluePageFromScroll(scroll) {
        const width = Math.max(1, scroll.clientWidth);
        return Math.max(0, Math.round(scroll.scrollLeft / width));
      }

      function isCompactArchiveMode() {
        return window.innerWidth <= 1024 || (window.matchMedia && window.matchMedia("(pointer: coarse)").matches);
      }

      function isDesktopHoverMode() {
        if (!window.matchMedia) return window.innerWidth > 760;
        return window.matchMedia("(hover: hover) and (pointer: fine)").matches
          || window.matchMedia("(hover: hover) and (any-pointer: fine)").matches
          || window.matchMedia("(any-hover: hover) and (any-pointer: fine)").matches;
      }

      function canUseInlineHoverEvent(event) {
        if (event && event.pointerType) return event.pointerType === "mouse";
        if (event && event.sourceCapabilities && event.sourceCapabilities.firesTouchEvents) return false;
        if (event && event.type && event.type.indexOf("mouse") === 0) return isDesktopHoverMode() || window.innerWidth > 760;
        return isDesktopHoverMode();
      }

      function openInlineHover(holder, forceMouse = false) {
        if (!holder) return;
        if (selectedCell && (selectedCell.entityId !== holder.dataset.entityId || selectedCell.categoryId !== holder.dataset.categoryId)) return;
        if (!forceMouse && !isDesktopHoverMode()) return;
        cancelInlineHoverClose(holder);
        holder.classList.add("hover-open");
        const existing = getInlineOptionsPanel(holder.dataset.cellId);
        if (existing && !existing.classList.contains("error")) {
          requestAnimationFrame(positionInlinePanels);
          return;
        }
        showInlineOptions(holder.dataset.entityId, holder.dataset.categoryId, "");
        requestAnimationFrame(positionInlinePanels);
      }

      function cancelInlineHoverClose(holder) {
        if (!holder) return;
        const timer = inlineHoverTimers.get(holder);
        if (!timer) return;
        clearTimeout(timer);
        inlineHoverTimers.delete(holder);
      }

      function getHoverableAnswerHolder(target) {
        if (!target || !target.closest) return null;
        const holder = target.closest(".answer-cell-wrap");
        if (!holder || !holder.dataset.entityId || !holder.dataset.categoryId) return null;
        if (holder.querySelector(".cell.correct")) return null;
        return holder;
      }

      function handleInlineMouseOver(event) {
        if (view !== "game" || !canUseInlineHoverEvent(event)) return;
        const holder = getHoverableAnswerHolder(event.target);
        if (!holder) return;
        if (activeInlineHoverHolder === holder) {
          openInlineHover(holder, true);
          return;
        }
        if (activeInlineHoverHolder && activeInlineHoverHolder !== holder) {
          scheduleInlineHoverClose(activeInlineHoverHolder, 80);
        }
        activeInlineHoverHolder = holder;
        openInlineHover(holder, true);
      }

      function handleInlineMouseOut(event) {
        if (view !== "game" || !canUseInlineHoverEvent(event)) return;
        const holder = getHoverableAnswerHolder(event.target);
        if (!holder) return;
        if (event.relatedTarget && holder.contains(event.relatedTarget)) return;
        const panel = getInlineOptionsPanel(holder.dataset.cellId);
        if (event.relatedTarget && panel && panel.contains(event.relatedTarget)) return;
        scheduleInlineHoverClose(holder);
        if (activeInlineHoverHolder === holder) activeInlineHoverHolder = null;
      }

      function scheduleInlineHoverClose(holder, delay = 160) {
        if (!holder) return;
        const targetCellId = holder.dataset.cellId;
        const targetEntityId = holder.dataset.entityId;
        const targetCategoryId = holder.dataset.categoryId;
        const previous = inlineHoverTimers.get(holder);
        if (previous) clearTimeout(previous);
        const timer = window.setTimeout(() => {
          inlineHoverTimers.delete(holder);
          const currentHolder = targetCellId ? [...app.querySelectorAll(".answer-cell-wrap")].find((node) => node.dataset.cellId === targetCellId) : holder;
          const panel = getInlineOptionsPanel(targetCellId);
          const isCurrentPanel = !!panel;
          const isErrorPanel = isCurrentPanel && panel.classList.contains("error");
          if (!isErrorPanel && currentHolder && currentHolder.matches(":focus-within")) return;
          if (isCurrentPanel && (panel.matches(":hover") || (!isErrorPanel && panel.contains(document.activeElement)))) return;
          if (currentHolder) currentHolder.classList.remove("hover-open");
          if (isErrorPanel && selectedCell && selectedCell.entityId === targetEntityId && selectedCell.categoryId === targetCategoryId) {
            selectedCell = null;
            removeInlineOptions(targetCellId);
            refreshAnswerCell(targetEntityId, targetCategoryId);
            return;
          }
          if (!selectedCell || selectedCell.entityId !== targetEntityId || selectedCell.categoryId !== targetCategoryId) {
            removeInlineOptions(targetCellId);
          }
        }, delay);
        inlineHoverTimers.set(holder, timer);
      }

      function getInlineOptionsPanel(targetCellId) {
        const panel = app.querySelector(".archive-inline-options");
        if (!panel) return null;
        if (targetCellId && panel.dataset.panelCell !== targetCellId) return null;
        return panel;
      }

      function findAnswerHolder(entityId, categoryId) {
        const id = cellId(entityId, categoryId);
        return [...app.querySelectorAll(".answer-cell-wrap")].find((node) => node.dataset.cellId === id) || null;
      }

      function removeInlineOptions(targetCellId) {
        const panel = getInlineOptionsPanel();
        if (!panel) return;
        if (targetCellId && panel.dataset.panelCell !== targetCellId) return;
        panel.remove();
      }

      function showInlineOptions(entityId, categoryId, errorMessage = "") {
        if (!entityId || !categoryId) return;
        const archivePanel = app.querySelector(".archive-panel");
        const holder = findAnswerHolder(entityId, categoryId);
        const entity = getEntity(entityId);
        const category = getCategory(categoryId);
        if (!archivePanel || !holder || !entity || !category) return;
        const targetCellId = cellId(entityId, categoryId);
        const existing = getInlineOptionsPanel(targetCellId);
        if (existing && !errorMessage && !existing.classList.contains("error")) {
          requestAnimationFrame(positionInlinePanels);
          return existing;
        }
        removeInlineOptions();
        const panel = renderInlineOptions(entity, category, errorMessage);
        panel.classList.add("archive-inline-options");
        panel.dataset.panelCell = targetCellId;
        panel.addEventListener("mouseenter", () => {
          cancelInlineHoverClose(holder);
          holder.classList.add("hover-open");
        });
        panel.addEventListener("mouseleave", () => scheduleInlineHoverClose(holder));
        archivePanel.append(panel);
        requestAnimationFrame(positionInlinePanels);
      }

      function fitArchiveViewport() {
        if (!isCompactArchiveMode()) return;
        const panel = app.querySelector(".archive-scroll-mode");
        const wrap = panel && panel.querySelector(".table-wrap");
        const grid = panel && panel.querySelector(".archive-grid");
        if (!wrap || !grid || !currentCase) return;
        const entities = currentCase.entities || [];
        const categories = getOrderedCategories();
        const gap = Math.max(3, Math.min(8, Math.round(parseFloat(getComputedStyle(grid).gap) || 5)));
        const wrapWidth = Math.max(260, wrap.clientWidth);
        const wrapHeight = Math.max(220, wrap.clientHeight);
        const compactNarrow = window.innerWidth < 900;
        const entityCol = compactNarrow
          ? clamp(Math.round(wrapWidth * 0.243), window.innerWidth < 520 ? 140 : 153, window.innerWidth < 520 ? 184 : 198)
          : clamp(Math.round(wrapWidth * 0.27), 170, 220);
        const answerCol = Math.max(window.innerWidth < 520 ? 108 : 120, Math.floor((wrapWidth - entityCol - gap * 4) / 4) + 16);
        const headerRow = clamp(Math.round(wrapHeight * 0.1), window.innerWidth < 520 ? 46 : 42, window.innerWidth < 520 ? 56 : 54);
        const entityRow = Math.max(window.innerWidth < 520 ? 104 : 98, Math.floor((wrapHeight - headerRow - gap * 4) / 4) + 14);
        const rowFont = clamp(entityRow / 104, 0.86, 1.08);
        grid.style.setProperty("--table-gap", gap + "px");
        grid.style.setProperty("--table-pad", Math.max(4, Math.round(6 * rowFont)) + "px");
        grid.style.setProperty("--cell-pad", Math.max(4, Math.round(5 * rowFont)) + "px " + Math.max(5, Math.round(7 * rowFont)) + "px");
        grid.style.setProperty("--cell-min-height", Math.max(46, entityRow - 14) + "px");
        grid.style.setProperty("--icon-size", clamp(Math.round(entityRow * (compactNarrow ? 0.36 : 0.42)), 26, compactNarrow ? 40 : 46) + "px");
        grid.style.setProperty("--table-header-font", clamp(headerRow / 52, 0.96, 1.16).toFixed(2) + "rem");
        grid.style.setProperty("--entity-name-font", clamp(rowFont * 1.04, 0.96, 1.14).toFixed(2) + "rem");
        grid.style.setProperty("--entity-title-font", clamp(rowFont * 0.9, 0.82, 1).toFixed(2) + "rem");
        grid.style.setProperty("--cell-font", clamp(rowFont * 1.04, 0.96, 1.14).toFixed(2) + "rem");
        grid.style.setProperty("--option-font", clamp(rowFont * 1.08, 1, 1.18).toFixed(2) + "rem");
        grid.style.gridTemplateColumns = entityCol + "px repeat(" + categories.length + ", " + answerCol + "px)";
        grid.style.gridTemplateRows = headerRow + "px repeat(" + entities.length + ", " + entityRow + "px)";
      }

      function getGameSubtitle() {
        const total = getTotalCells(currentCase);
        const done = progress.correctCells.length;
        const percent = total ? Math.round(done / total * 100) : 0;
        return "档案完成度：" + done + "/" + total + "；调查进度：" + percent + "%；错误：" + progress.errors + "；提示：" + progress.hints + "；用时：" + formatElapsed();
      }

      function positionInlinePanels() {
        const panels = app.querySelectorAll(".inline-options");
        if (!panels.length) return;
        panels.forEach((panel) => {
          const holder = panel.classList.contains("archive-inline-options")
            ? [...app.querySelectorAll(".answer-cell-wrap")].find((node) => node.dataset.cellId === panel.dataset.panelCell)
            : panel.closest(".answer-cell-wrap");
          if (!holder) return;
          const rect = holder.getBoundingClientRect();
          const desktopInline = isDesktopHoverMode();
          const archivePanel = panel.closest(".archive-panel");
          const archiveRect = archivePanel ? archivePanel.getBoundingClientRect() : { left: 0, top: 0, right: window.innerWidth, bottom: window.innerHeight };
          const tableWrap = archivePanel && archivePanel.querySelector(".table-wrap");
          const tableRect = tableWrap ? tableWrap.getBoundingClientRect() : archiveRect;
          const stickyEntity = archivePanel && archivePanel.querySelector(".entity-cell");
          const stickyRect = isCompactArchiveMode() && stickyEntity ? stickyEntity.getBoundingClientRect() : null;
          const sideInset = 8;
          const minLeftViewport = isCompactArchiveMode() ? Math.min(window.innerWidth - 180, (stickyRect ? stickyRect.right : archiveRect.left) + sideInset) : sideInset;
          const maxRightViewport = Math.min(window.innerWidth - sideInset, archiveRect.right - sideInset);
          const minWidth = isCompactArchiveMode() ? Math.min(220, Math.max(180, maxRightViewport - minLeftViewport)) : 280;
          const availableWidth = Math.max(minWidth, maxRightViewport - minLeftViewport);
          const desiredWidth = window.innerWidth < 780
            ? Math.min(availableWidth, 420)
            : Math.min(availableWidth, Math.min(620, Math.max(340, window.innerWidth * 0.56)));
          const width = Math.max(minWidth, Math.min(desiredWidth, availableWidth));
          panel.style.setProperty("--option-width", width + "px");
          const panelHeight = Math.max(96, Math.round(panel.getBoundingClientRect().height || panel.offsetHeight || 120));
          let left = rect.left + rect.width / 2 - width / 2;
          let top = rect.top - panelHeight - 6;
          if (panel.classList.contains("archive-inline-options")) {
            const minTopViewport = tableRect.top + 4;
            const maxTopViewport = Math.max(minTopViewport, archiveRect.bottom - panelHeight - 8);
            left = clamp(left, minLeftViewport, Math.max(minLeftViewport, maxRightViewport - width));
            top = clamp(top, minTopViewport, maxTopViewport);
            left -= archiveRect.left;
            top -= archiveRect.top;
          } else if (desktopInline) {
            left = clamp(rect.width / 2 - width / 2, 8 - rect.left, Math.max(8 - rect.left, window.innerWidth - width - 8 - rect.left));
            top = rect.top - panelHeight - 6 >= 8 ? -panelHeight - 6 : rect.height + 6;
            top = clamp(top, 8 - rect.top, Math.max(8 - rect.top, window.innerHeight - panelHeight - 8 - rect.top));
          } else {
            const fallbackTop = rect.bottom + 6;
            left = clamp(left, 8, Math.max(8, window.innerWidth - width - 8));
            top = clamp(top >= 8 ? top : fallbackTop, 8, Math.max(8, window.innerHeight - panelHeight - 8));
          }
          panel.style.setProperty("--option-left", left + "px");
          panel.style.setProperty("--option-top", top + "px");
        });
      }

      function startTimer() {
        clearInterval(timerHandle);
        timerHandle = window.setInterval(() => {
          if (view === "game" && currentCase && progress && !progress.completed && !progress.failed) {
            const top = app.querySelector(".topbar .subtle");
            if (top) {
              top.textContent = getGameSubtitle();
            }
          }
        }, 1000);
      }

      function renderArchiveTable() {
        const compactArchive = isCompactArchiveMode();
        const panel = createEl("div", compactArchive ? "panel archive-panel archive-scroll-mode" : "panel archive-panel");
        const entityLabel = getEntityLabel(currentCase);
        const head = createEl("div", "section-head");
        head.append(createEl("h2", "", "调查记录板：" + entityLabel + "档案"));
        head.append(createEl("div", "actions end"));

        const tableWrap = createEl("div", "table-wrap");
        tableWrap.addEventListener("scroll", () => requestAnimationFrame(positionInlinePanels));
        const entities = currentCase.entities || [];
        const categories = getOrderedCategories();
        const scale = getArchiveScale(compactArchive ? Math.min(4, entities.length) : entities.length, compactArchive ? Math.min(4, categories.length) : categories.length);

        const grid = createEl("div", "archive-grid");
        applyArchiveScale(grid, scale);
        if (compactArchive) {
          grid.style.gridTemplateColumns = "var(--entity-col-viewport, 120px) repeat(" + categories.length + ", var(--answer-col-viewport, 82px))";
          grid.style.gridTemplateRows = "var(--header-row-viewport, 40px) repeat(" + entities.length + ", var(--entity-row-viewport, 68px))";
        } else {
          grid.style.gridTemplateColumns = "minmax(var(--entity-col-min), 0.95fr) repeat(" + categories.length + ", minmax(var(--answer-col-min), 1fr))";
          grid.style.gridTemplateRows = "minmax(var(--header-row-min), auto) repeat(" + entities.length + ", minmax(var(--cell-min-height), 1fr))";
        }
        const firstHeader = createEl("div", "table-cell header", entityLabel);
        firstHeader.classList.add("corner-cell");
        grid.append(firstHeader);
        categories.forEach((category) => {
          const header = createEl("div", "table-cell header", category.label || "");
          header.classList.add("category-header");
          if (highlight.categories.has(category.id)) header.classList.add("highlight-col");
          grid.append(header);
        });
        entities.forEach((entity, entityIndex) => {
          const revealed = isEntityNameRevealed(entity.id);
          const displayName = getEntityDisplayName(entity, entityIndex);
          const entityCell = createEl("div", "table-cell entity-cell");
          entityCell.classList.add("row-header");
          entityCell.dataset.entityId = entity.id;
          if (!revealed) entityCell.classList.add("identity-hidden");
          if (highlight.entities.has(entity.id)) entityCell.classList.add("highlight-row");
          entityCell.append(makeIcon(entity, currentCase));
          const text = createEl("div", "entity-text");
          text.append(createEl("div", "entity-name", displayName));
          if (revealed && (entity.title || entity.description)) {
            text.append(createEl("div", "entity-title", entity.title || entity.description));
          }
          entityCell.append(text);
          grid.append(entityCell);
          categories.forEach((category, categoryIndex) => {
            const cell = renderAnswerCell(entity, category, entityIndex, categoryIndex);
            grid.append(cell);
          });
        });

        tableWrap.append(grid);
        panel.append(head, tableWrap);
        if (selectedCell) {
          const selectedEntity = getEntity(selectedCell.entityId);
          const selectedCategory = getCategory(selectedCell.categoryId);
          if (selectedEntity && selectedCategory) {
            const activePanel = renderInlineOptions(selectedEntity, selectedCategory, selectedCell.errorMessage || "");
            activePanel.classList.add("archive-inline-options");
            activePanel.dataset.panelCell = cellId(selectedCell.entityId, selectedCell.categoryId);
            panel.append(activePanel);
          }
        }
        return panel;
      }

      function renderAnswerCell(entity, category, entityIndex, categoryIndex) {
        const holder = createEl("div", "table-cell answer-cell-wrap");
        const id = cellId(entity.id, category.id);
        holder.dataset.cellId = id;
        holder.dataset.entityId = entity.id;
        holder.dataset.categoryId = category.id;
        const isOpen = selectedCell && selectedCell.entityId === entity.id && selectedCell.categoryId === category.id;
        if (isOpen) holder.classList.add("open");
        if (categoryIndex <= 1) holder.classList.add("align-left");
        if (categoryIndex >= Math.max(0, getOrderedCategories().length - 2)) holder.classList.add("align-right");
        if (highlight.cells.has(id)) holder.classList.add("highlight-cell");
        if (highlight.entities.has(entity.id)) holder.classList.add("highlight-row");
        if (highlight.categories.has(category.id)) holder.classList.add("highlight-col");
        const correct = progress.correctCells.includes(id);
        const label = correct ? "✓ " + getOptionLabel(category.id, currentCase.solution[entity.id][category.id]) : "";
        const ariaText = correct ? label : "点击调查";
        let activationInput = "";
        const cellButton = button(label, correct ? "cell correct" : "cell empty", (event) => {
          event.stopPropagation();
          if (correct) return;
          if (activationInput === "mouse" || activationInput === "keyboard") return;
          if (activationInput === "touch" || activationInput === "pen" || isCompactArchiveMode()) openOptionModal(entity.id, category.id);
        }, { disabled: correct, ariaLabel: getEntityDisplayName(entity, entityIndex) + "，" + (category.label || "") + "，" + ariaText });
        cellButton.addEventListener("pointerdown", (event) => {
          activationInput = event.pointerType || "";
        });
        cellButton.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") activationInput = "keyboard";
        });
        if (!correct) {
          holder.addEventListener("pointerenter", (event) => {
            if (canUseInlineHoverEvent(event)) openInlineHover(holder, event.pointerType === "mouse");
          });
          holder.addEventListener("pointerleave", (event) => {
            if (canUseInlineHoverEvent(event)) scheduleInlineHoverClose(holder);
          });
          holder.addEventListener("focusin", () => openInlineHover(holder));
          holder.addEventListener("focusout", (event) => {
            if (!holder.contains(event.relatedTarget)) scheduleInlineHoverClose(holder, 120);
          });
        }
        if (correct) cellButton.setAttribute("aria-pressed", "true");
        holder.append(cellButton);
        return holder;
      }

      function renderInlineOptions(entity, category, errorMessage) {
        const panel = createEl("div", errorMessage ? "inline-options error" : "inline-options");
        panel.dataset.panelCell = cellId(entity.id, category.id);
        panel.addEventListener("click", (event) => event.stopPropagation());
        panel.append(createEl("div", "inline-options-title", "选择“" + (category.label || "") + "”的调查结果"));
        if (errorMessage) panel.append(createEl("div", "inline-error", "× " + errorMessage));
        const grid = createEl("div", "inline-option-grid");
        getOrderedOptions(category).forEach((option) => {
          const disabled = isOptionUsedInCategory(category.id, option.id);
          const optBtn = button(option.label || "", "inline-option", (event) => {
            event.stopPropagation();
            verifyAnswer(entity.id, category.id, option.id);
          }, { disabled });
          optBtn.dataset.categoryId = category.id;
          optBtn.dataset.optionId = option.id;
          grid.append(optBtn);
        });
        panel.append(grid);
        return panel;
      }

      function refreshAnswerCell(entityId, categoryId) {
        const targetId = cellId(entityId, categoryId);
        const holder = [...app.querySelectorAll(".answer-cell-wrap")].find((node) => node.dataset.cellId === targetId);
        if (!holder) return;
        const entity = getEntity(entityId);
        const category = getCategory(categoryId);
        if (!entity || !category) return;
        const entityIndex = (currentCase.entities || []).findIndex((item) => item.id === entityId);
        const categoryIndex = getOrderedCategories().findIndex((item) => item.id === categoryId);
        holder.replaceWith(renderAnswerCell(entity, category, Math.max(0, entityIndex), Math.max(0, categoryIndex)));
        requestAnimationFrame(positionInlinePanels);
      }

      function refreshAnswerCellsForCategory(categoryId) {
        (currentCase.entities || []).forEach((entity) => refreshAnswerCell(entity.id, categoryId));
      }

      function updateEntityIdentityDisplay(entityId) {
        const node = [...app.querySelectorAll(".entity-cell")].find((cell) => cell.dataset.entityId === entityId);
        const entity = getEntity(entityId);
        if (!node || !entity) return;
        const entityIndex = (currentCase.entities || []).findIndex((item) => item.id === entityId);
        const revealed = isEntityNameRevealed(entityId);
        node.classList.toggle("identity-hidden", !revealed);
        const name = node.querySelector(".entity-name");
        let title = node.querySelector(".entity-title");
        if (name) name.textContent = getEntityDisplayName(entity, Math.max(0, entityIndex));
        const titleText = revealed ? (entity.title || entity.description || "") : "";
        if (titleText && !title) {
          const text = node.querySelector(".entity-text");
          title = createEl("div", "entity-title");
          if (text) text.append(title);
        }
        if (title) {
          if (titleText) title.textContent = titleText;
          else title.remove();
        }
      }

      function renderClueArea() {
        const panel = createEl("div", "panel clue-panel");
        const head = createEl("div", "section-head");
        head.append(createEl("h2", "", "证据桌"));
        const stats = createEl("div", "actions end");
        stats.append(createEl("span", "pill", "剩余提示：" + Math.max(0, getMaxHints() - progress.hints)));
        head.append(stats);
        const wrap = createEl("div", "clue-wrap");
        const clues = getDisplayClues();
        const perPage = getCluePageSize();
        const totalPages = Math.max(1, Math.ceil(clues.length / perPage));
        cluePage = clamp(cluePage, 0, totalPages - 1);
        if (progress) progress.cluePage = cluePage;
        const pageStatus = createEl("span", "pill");
        pageStatus.dataset.clueScrollPage = "true";
        pageStatus.textContent = "第" + (cluePage + 1) + "/" + totalPages + "组";
        stats.append(pageStatus);
        const scroll = createEl("div", "clue-scroll");
        const grid = createEl("div", "clue-grid");
        const visibleCount = Math.min(3, Math.max(1, clues.length || 1));
        const gap = window.innerWidth < 700 ? 4 : 8;
        grid.style.setProperty("--clue-gap", gap + "px");
        grid.style.setProperty("--clue-card-basis", "calc((100% - " + ((visibleCount - 1) * gap) + "px) / " + visibleCount + ")");
        clues.forEach((clue) => grid.append(renderClueCard(clue)));
        if (!clues.length) grid.append(createEl("div", "notice warn", "当前没有可显示的线索。"));
        scroll.append(grid);
        bindClueScroll(scroll, totalPages);
        restoreClueScroll(scroll, totalPages);
        wrap.append(scroll);
        panel.append(head, wrap);
        return panel;
      }

      function setCluePage(next, totalPages) {
        cluePage = clamp(next, 0, Math.max(0, totalPages - 1));
        if (progress) {
          progress.cluePage = cluePage;
          progress.clueScrollLeft = -1;
          saveProgress();
        }
        refreshGameView({ archive: false, clues: true });
      }

      function bindClueScroll(scroll, totalPages) {
        let startX = 0;
        let startLeft = 0;
        let tracking = false;
        let moved = false;
        let saveTimer = 0;
        scroll.addEventListener("pointerdown", (event) => {
          if (event.button !== undefined && event.button !== 0) return;
          tracking = true;
          moved = false;
          startX = event.clientX;
          startLeft = scroll.scrollLeft;
          scroll.classList.add("dragging");
          if (scroll.setPointerCapture) scroll.setPointerCapture(event.pointerId);
        });
        scroll.addEventListener("pointermove", (event) => {
          if (!tracking) return;
          const delta = event.clientX - startX;
          if (Math.abs(delta) > 3) moved = true;
          if (moved) {
            scroll.scrollLeft = startLeft - delta;
            event.preventDefault();
          }
        });
        scroll.addEventListener("pointerup", (event) => {
          if (!tracking) return;
          tracking = false;
          scroll.classList.remove("dragging");
          saveClueScrollPosition(scroll, totalPages);
          if (moved) {
            scroll.dataset.dragged = "true";
            window.setTimeout(() => delete scroll.dataset.dragged, 80);
          }
        });
        scroll.addEventListener("pointercancel", () => {
          tracking = false;
          scroll.classList.remove("dragging");
        });
        scroll.addEventListener("click", (event) => {
          if (scroll.dataset.dragged === "true") {
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);
        scroll.addEventListener("scroll", () => {
          updateClueScrollIndicator(scroll, totalPages);
          clearTimeout(saveTimer);
          saveTimer = window.setTimeout(() => saveClueScrollPosition(scroll, totalPages), 180);
        });
      }

      function restoreClueScroll(scroll, totalPages) {
        window.requestAnimationFrame(() => {
          const savedLeft = progress && Number.isFinite(Number(progress.clueScrollLeft)) ? Number(progress.clueScrollLeft) : 0;
          scroll.scrollLeft = savedLeft >= 0 ? savedLeft : cluePage * scroll.clientWidth;
          updateClueScrollIndicator(scroll, totalPages);
        });
      }

      function saveClueScrollPosition(scroll, totalPages) {
        if (!progress) return;
        progress.clueScrollLeft = scroll.scrollLeft;
        progress.cluePage = clamp(getCluePageFromScroll(scroll), 0, Math.max(0, totalPages - 1));
        cluePage = progress.cluePage;
        updateClueScrollIndicator(scroll, totalPages);
        saveProgress();
      }

      function updateClueScrollIndicator(scroll, totalPages) {
        const page = clamp(getCluePageFromScroll(scroll), 0, Math.max(0, totalPages - 1));
        cluePage = page;
        const label = app.querySelector("[data-clue-scroll-page='true']");
        if (label) label.textContent = "第" + (page + 1) + "/" + totalPages + "组";
      }

      function getDisplayClues() {
        return (currentCase.clues || [])
          .filter((clue) => progress.clueStatus[clue.id] !== "hidden")
          .sort(compareDisplayClues);
      }

      function compareDisplayClues(a, b) {
        const statusRank = { used: 0, partial: 1, visible: 1 };
        const sa = progress.clueStatus[a.id] || "hidden";
        const sb = progress.clueStatus[b.id] || "hidden";
        if (statusRank[sa] !== statusRank[sb]) return statusRank[sa] - statusRank[sb];
        return compareCluePriority(a, b);
      }

      function compareCluePriority(a, b) {
        const pa = Number.isFinite(Number(a.priority)) ? Number(a.priority) : 0;
        const pb = Number.isFinite(Number(b.priority)) ? Number(b.priority) : 0;
        if (pa !== pb) return pa - pb;
        return getClueIndex(a.id) - getClueIndex(b.id);
      }

      function getClueIndex(id) {
        return (currentCase && currentCase.clues ? currentCase.clues : []).findIndex((clue) => clue.id === id);
      }

      function setCluePageForClue(clueId) {
        const clues = getDisplayClues();
        const index = clues.findIndex((clue) => clue.id === clueId);
        if (index < 0) return;
        cluePage = Math.floor(index / getCluePageSize());
        if (progress) {
          progress.cluePage = cluePage;
          progress.clueScrollLeft = -1;
        }
      }

      function renderClueCard(clue) {
        const status = progress.clueStatus[clue.id] || "hidden";
        const text = clue.text || "";
        const lengthClass = getClueLengthClass(text);
        const card = createEl("article", "clue-card " + status + " " + lengthClass + (newClueIds.has(clue.id) ? " new" : ""));
        card.append(createEl("span", "clue-text", text));
        return card;
      }

      function getClueLengthClass(text) {
        const length = String(text || "").trim().length;
        if (length <= 34) return "clue-short";
        if (length <= 72) return "clue-medium";
        if (length <= 124) return "clue-long";
        return "clue-xlong";
      }

      function focusRelatedCells(clue) {
        clearTimeout(highlight.timer);
        highlight.cells = new Set(Array.isArray(clue.relatedCells) ? clue.relatedCells : []);
        highlight.entities = new Set();
        highlight.categories = new Set();
        highlight.cells.forEach((id) => {
          const parts = splitCellId(id);
          if (parts) {
            highlight.entities.add(parts.entityId);
            highlight.categories.add(parts.categoryId);
          }
        });
        highlight.timer = window.setTimeout(() => {
          highlight.cells.clear();
          highlight.entities.clear();
          highlight.categories.clear();
          if (view === "game") refreshGameView();
        }, HIGHLIGHT_DURATION);
        playSound("clue");
        refreshGameView();
      }

      function openOptionModal(entityId, categoryId) {
        if (!progress || progress.failed || progress.completed) return;
        const previous = selectedCell ? { entityId: selectedCell.entityId, categoryId: selectedCell.categoryId } : null;
        selectedCell = { entityId, categoryId, errorMessage: "" };
        optionPage = 0;
        lastFocused = document.activeElement;
        playSound("openOption");
        if (previous) refreshAnswerCell(previous.entityId, previous.categoryId);
        refreshAnswerCell(entityId, categoryId);
        showInlineOptions(entityId, categoryId, "");
      }

      // 答案验证：正确后填入并锁定，错误时不写入格子。
      function verifyAnswer(entityId, categoryId, optionId) {
        if (!progress || progress.failed || progress.completed) return;
        const expected = currentCase.solution && currentCase.solution[entityId] && currentCase.solution[entityId][categoryId];
        if (expected === optionId) {
          const id = cellId(entityId, categoryId);
          if (!progress.correctCells.includes(id)) progress.correctCells.push(id);
          updateEntityRevealState();
          updateClueStates();
          checkStoryEvents();
          selectedCell = null;
          removeInlineOptions();
          saveProgress();
          playSound("success");
          refreshAnswerCellsForCategory(categoryId);
          updateEntityIdentityDisplay(entityId);
          refreshGameView({ archive: false, clues: true });
          updateGameTopbar();
          flashCell(id);
          if (progress.correctCells.length >= getTotalCells(currentCase)) completeCase();
        } else {
          progress.errors += 1;
          saveProgress();
          playSound("error");
          flashWrongOption(categoryId, optionId);
          if (progress.errors >= getFailureLimit()) {
            failCase();
            return;
          }
          selectedCell = { entityId, categoryId, errorMessage: "证据不吻合，请重新检查线索" };
          refreshAnswerCell(entityId, categoryId);
          showInlineOptions(entityId, categoryId, selectedCell.errorMessage);
          updateGameTopbar();
        }
      }

      function flashCell(id) {
        requestAnimationFrame(() => {
          const holder = [...app.querySelectorAll(".answer-cell-wrap")].find((node) => node.dataset.cellId === id);
          const node = holder && holder.querySelector(".cell.correct");
          if (!node) return;
          const original = node.textContent;
          node.textContent = "✓ 证据吻合";
          node.classList.add("flash-correct");
          setTimeout(() => {
            node.textContent = original;
            node.classList.remove("flash-correct");
          }, 700);
        });
      }

      function flashWrongOption(categoryId, optionId) {
        requestAnimationFrame(() => {
          const node = [...app.querySelectorAll(".inline-option")].find((btn) => btn.dataset.categoryId === categoryId && btn.dataset.optionId === optionId);
          if (!node) return;
          node.classList.add("wrong-flash");
          window.setTimeout(() => node.classList.remove("wrong-flash"), 680);
        });
      }

      // 线索状态：根据 completeAfter 和 unlockAfter 更新 visible、partial、used。
      function updateClueStates() {
        const correct = new Set(progress.correctCells);
        let changed = false;
        (currentCase.clues || []).forEach((clue) => {
          const status = progress.clueStatus[clue.id] || "hidden";
          if (status === "visible" || status === "partial") {
            const list = Array.isArray(clue.completeAfter) ? clue.completeAfter : [];
            if (list.length) {
              const count = list.filter((id) => correct.has(id)).length;
              const complete = matchCells(list, correct, clue.completeMode || "all");
              if (complete && status !== "used") {
                progress.clueStatus[clue.id] = "used";
                changed = true;
                playSound("clueUsed");
              } else if (count > 0 && !complete && status !== "partial") {
                progress.clueStatus[clue.id] = "partial";
                changed = true;
              }
            }
          }
        });
        if (normalizeClueActivity(currentCase, progress)) changed = true;
        if (changed) saveProgress();
      }

      function normalizeClueActivity(caseItem, state) {
        if (!caseItem || !state || !state.clueStatus) return false;
        const clues = caseItem.clues || [];
        const correct = new Set(state.correctCells || []);
        let changed = false;
        const active = clues.filter((clue) => {
          const status = state.clueStatus[clue.id] || "hidden";
          return status === "visible" || status === "partial";
        }).sort(compareCluePriority);
        while (active.length > MAX_ACTIVE_CLUES) {
          const clue = active.pop();
          if (!clue) break;
          state.clueStatus[clue.id] = "hidden";
          changed = true;
        }
        const activeCount = () => clues.filter((clue) => {
          const status = state.clueStatus[clue.id] || "hidden";
          return status === "visible" || status === "partial";
        }).length;
        const candidates = clues
          .filter((clue) => (state.clueStatus[clue.id] || "hidden") === "hidden" && isClueUnlocked(clue, correct))
          .sort(compareCluePriority);
        candidates.forEach((clue) => {
          if (activeCount() >= MAX_ACTIVE_CLUES) return;
          state.clueStatus[clue.id] = getUnlockedClueDisplayStatus(clue, correct);
          const liveUpdate = state === progress && view === "game";
          if (liveUpdate) {
            newClueIds.add(clue.id);
            setCluePageForClue(clue.id);
          }
          changed = true;
          if (liveUpdate) {
            playSound("newClue");
            window.setTimeout(() => {
              newClueIds.delete(clue.id);
              if (view === "game") refreshGameView({ archive: false, clues: true });
            }, 1800);
          }
        });
        return changed;
      }

      function getUnlockedClueDisplayStatus(clue, correct) {
        const list = Array.isArray(clue.completeAfter) ? clue.completeAfter : [];
        if (!list.length) return "visible";
        const complete = matchCells(list, correct, clue.completeMode || "all");
        if (complete) return "used";
        return list.some((id) => correct.has(id)) ? "partial" : "visible";
      }

      function isClueUnlocked(clue, correct) {
        if (clue.initial === true) return true;
        const list = Array.isArray(clue.unlockAfter) ? clue.unlockAfter : [];
        return list.length && matchCells(list, correct, clue.unlockMode || "all");
      }

      function matchCells(list, correct, mode) {
        if (!list.length) return false;
        return mode === "any" ? list.some((id) => correct.has(id)) : list.every((id) => correct.has(id));
      }

      function getClueProgressText(clue) {
        const list = Array.isArray(clue.completeAfter) ? clue.completeAfter : [];
        const count = list.filter((id) => progress.correctCells.includes(id)).length;
        return "进度 " + count + "/" + list.length + " 项";
      }

      // 剧情事件触发：只显示一次，不改变答案或线索。
      function checkStoryEvents() {
        const count = progress.correctCells.length;
        (currentCase.storyEvents || []).slice().sort((a, b) => Number(a.triggerAfterCorrectCells || 0) - Number(b.triggerAfterCorrectCells || 0)).forEach((eventItem) => {
          if (progress.storyEventsShown.includes(eventItem.id)) return;
          if (count >= Number(eventItem.triggerAfterCorrectCells)) {
            progress.storyEventsShown.push(eventItem.id);
            saveProgress();
            showStoryToast(eventItem.text || "");
          }
        });
      }

      function showStoryToast(text) {
        if (!text) return;
        clearTimeout(toastTimer);
        toastLayer.setAttribute("aria-hidden", "false");
        toastLayer.classList.add("open");
        clearNode(toastLayer);
        const card = createEl("div", "toast-card");
        const body = createEl("div", "stack");
        body.append(createEl("span", "pill new", "剧情进展"));
        body.append(createEl("p", "subtle", text));
        card.append(body);
        toastLayer.onclick = (event) => {
          if (event.target === toastLayer) closeToast();
        };
        toastLayer.append(card);
        playSound("story");
        toastTimer = window.setTimeout(closeToast, 6800);
      }

      function closeToast() {
        clearTimeout(toastTimer);
        toastLayer.onclick = null;
        toastLayer.classList.remove("open");
        toastLayer.setAttribute("aria-hidden", "true");
        clearNode(toastLayer);
      }

      function checkStalledClues() {
        if (!currentCase || !progress || progress.completed || progress.failed) return;
        if (progress.correctCells.length >= getTotalCells(currentCase)) return;
        const statuses = Object.values(progress.clueStatus || {});
        const hasActive = statuses.includes("visible") || statuses.includes("partial");
        const correct = new Set(progress.correctCells);
        const canUnlock = (currentCase.clues || []).some((clue) => {
          if (progress.clueStatus[clue.id] !== "hidden") return false;
          const list = Array.isArray(clue.unlockAfter) ? clue.unlockAfter : [];
          return list.some((id) => !correct.has(id));
        });
        if (!hasActive && !canUnlock) {
          showStoryToast("当前资料的线索流程无法继续，请教师检查资料包。");
        }
      }

      function useHint() {
        if (!currentCase || !progress || progress.failed || progress.completed) return;
        const maxHints = getMaxHints();
        if (progress.hints >= maxHints) {
          showStoryToast("提示次数已用完。");
          return;
        }
        const clue = getDisplayClues().find((item) => (progress.clueStatus[item.id] === "visible" || progress.clueStatus[item.id] === "partial") && Array.isArray(item.relatedCells) && item.relatedCells.length);
        if (!clue) {
          showStoryToast("当前没有可用于高亮的线索。");
          return;
        }
        progress.hints += 1;
        saveProgress();
        focusRelatedCells(clue);
      }

      function getFailureLimit() {
        return Math.max(1, Math.ceil(getTotalCells(currentCase) * 3 / 4));
      }

      function failCase() {
        pauseCaseTimer();
        progress.failed = true;
        progress.failedAt = Date.now();
        selectedCell = null;
        removeInlineOptions();
        saveProgress();
        renderFailure();
      }

      function renderFailure() {
        setPage("failure");
        closeToast();
        const page = createEl("section", "page");
        page.append(renderTopbar(currentCase && currentCase.title ? currentCase.title : "调查失败", "错误次数达到本案限制。", [
          soundToggle()
        ]));
        const shell = createEl("div", "center-shell");
        const card = createEl("div", "panel stack failure-card");
        card.append(createEl("div", "failure-title", "游戏失败"));
        card.append(createEl("p", "subtle", "请回到案件简报，重新整理线索后再开始调查。"));
        card.append(button("重新调查", "primary", () => {
          if (currentCase) resetCaseProgress(currentCase.id);
          progress = null;
          renderCaseIntro();
        }));
        shell.append(card);
        page.append(shell);
        app.replaceChildren(page);
      }

      function completeCase() {
        if (progress.failed) return;
        pauseCaseTimer();
        progress.completed = true;
        progress.completedAt = Date.now();
        saveProgress();
        playSound("complete");
        window.setTimeout(renderCompletion, 520);
      }

      function renderCompletion() {
        setPage("completion");
        closeToast();
        const page = createEl("section", "page completion-page");
        page.append(renderTopbar("结案报告", currentCase.title || "", [
          soundToggle(),
          button("案件大厅", "ghost", renderCaseLobby)
        ]));
        const shell = createEl("div", "shell");
        const panel = createEl("div", "panel stack");
        const hero = createEl("div", "completion-hero");
        hero.append(createEl("div", "completion-stamp", "调查完成"));
        const heroMain = createEl("div", "completion-hero-main");
        const stats = createEl("div", "completion-stats-grid");
        stats.append(labeledText("完成时间", formatDuration(getElapsedMs())));
        stats.append(labeledText("错误次数", String(progress.errors)));
        stats.append(labeledText("提示次数", String(progress.hints)));
        stats.append(labeledText("最终星级", getStarLevel()));
        const completionText = currentCase.narrative && currentCase.narrative.completion ? currentCase.narrative.completion : "";
        if (completionText) stats.append(labeledText("结案说明", completionText));
        if (completionText && stats.lastElementChild) stats.lastElementChild.classList.add("completion-note-cell");
        heroMain.append(stats);
        hero.append(heroMain);
        panel.append(hero);

        panel.append(renderResultPage());

        const summary = normalizeSummary(currentCase.knowledgeSummary);
        if (summary.length) {
          const summaryCard = createEl("div", "item-card completion-section");
          summaryCard.append(createEl("h2", "", "课程重点知识"));
          const list = createEl("div", "summary-list");
          summary.forEach((line) => list.append(createEl("p", "summary-line", line)));
          summaryCard.append(list);
          panel.append(summaryCard);
        }

        const actions = createEl("div", "actions");
        const nextCase = getNextCase();
        if (isPackageCompleted()) {
          actions.append(button("进入尾声剧情", "primary", () => renderEndingStory()));
        } else {
          actions.append(button("下一宗案件", "primary", () => openCaseIntro(nextCase.id), { disabled: !nextCase }));
        }
        actions.append(button("返回案件大厅", "ghost", renderCaseLobby));
        actions.append(button("重新调查", "danger", () => {
          resetCaseProgress(currentCase.id);
          startCase();
        }));
        if (actions.lastElementChild) actions.lastElementChild.remove();
        panel.append(actions);
        shell.append(panel);
        page.append(shell);
        app.replaceChildren(page);
      }

      function trapFocus(container) {
        const focusable = [...container.querySelectorAll("button, [href], input, textarea, select, [tabindex]:not([tabindex='-1'])")].filter((node) => !node.disabled);
        if (focusable.length) focusable[0].focus();
        container.addEventListener("keydown", (event) => {
          if (event.key !== "Tab" || focusable.length < 2) return;
          const first = focusable[0];
          const last = focusable[focusable.length - 1];
          if (event.shiftKey && document.activeElement === first) {
            event.preventDefault();
            last.focus();
          } else if (!event.shiftKey && document.activeElement === last) {
            event.preventDefault();
            first.focus();
          }
        });
      }

      function isEntityNameRevealed(entityId) {
        if (!currentCase || !progress || progress.completed) return true;
        if (Array.isArray(progress.revealedEntities) && progress.revealedEntities.includes(entityId)) return true;
        return shouldRevealEntityName(entityId);

      function shouldRevealEntityName(entityId) {
        if (!currentCase || !progress) return false;
        const settings = getEngineSettings(currentCase).nameReveal;
        if (!settings.enabled || !settings.autoReveal) return true;
        const categories = currentCase.categories || [];
        if (!categories.length) return true;
        const confirmed = categories.filter((category) => progress.correctCells.includes(cellId(entityId, category.id))).length;
        const required = Math.max(1, Math.ceil(categories.length * settings.threshold));
        return settings.comparison === "gt" ? confirmed > required : confirmed >= required;
      }

      function updateEntityRevealState() {
